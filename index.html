
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&family=Roboto:ital,wght@1,900&family=Noto+Sans+SC:wght@700&family=Noto+Sans+Arabic:wght@700&family=Noto+Sans+Devanagari:wght@700&display=swap" rel="stylesheet">
    <title>HK WORLDBANK OFFICIAL</title>
    <style>
        :root { --gold: #FFD700; --cyan: #00f2ea; --red: #FF3B30; --green: #00FF00; --dark-bg: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--dark-bg); color: white; text-align: center; font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 15px; position: relative; }

        /* [핵심] 언어 선택기 (사진 속 위치 그대로 유지) */
        .top-nav { display: flex; justify-content: flex-end; padding: 5px 0; }
        .lang-select { background: #1a1a1a; color: #fff; border: 1.5px solid var(--gold); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; outline: none; }

        /* 브랜드 헤더 (글자 크기 자동 맞춤 적용) */
        .brand-section { margin-top: 10px; margin-bottom: 25px; }
        .brand-main { color: var(--gold); font-size: calc(2.2rem + 1vw); font-weight: 900; letter-spacing: -2px; line-height: 1.1; word-break: break-all; }

        /* 자산 정보 섹션 (사진 데이터 그대로 반영) */
        .ledger-title { color: var(--gold); font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; }
        .asset-val { font-family: 'Roboto', sans-serif; font-size: calc(3.5rem + 3vw); color: var(--gold); font-weight: 900; font-style: italic; line-height: 0.9; letter-spacing: -3px; }
        .asset-unit { font-size: 2.2rem; color: var(--gold); font-weight: 900; margin-bottom: 12px; }
        .gcv-badge { border: 2.5px solid var(--green); color: var(--green); padding: 10px 25px; border-radius: 35px; font-size: 1.1rem; font-weight: 900; display: inline-block; margin-bottom: 30px; background: rgba(0,255,0,0.08); max-width: 90%; word-break: break-all; }

        /* 6대 핵심 메뉴 (자동 맞춤 그리드) */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .menu-item { background: #111; border: 1.2px solid #333; padding: calc(15px + 1vh) 5px; border-radius: 15px; font-size: 0.9rem; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 8px; height: 100%; justify-content: center; }
        .menu-item.active { border: 3px solid var(--gold); color: var(--gold); box-shadow: 0 0 15px rgba(255,215,0,0.15); }
        .menu-icon { font-size: 1.3rem; }

        /* 스테이킹 수익금 전광판 (사진 속 88조 반영) */
        .staking-info-box { background: #000; border: 2px solid #444; border-radius: 15px; padding: 20px; margin-bottom: 25px; text-align: center; max-width: 95%; margin-left: auto; margin-right: auto; }
        .staking-label { color: var(--gold); font-size: 0.9rem; font-weight: bold; margin-bottom: 8px; display: block; }
        .staking-val { font-size: calc(1.5rem + 1.5vw); color: #fff; font-weight: 900; letter-spacing: 1px; word-break: break-all; }

        /* 주요 실행 버튼 (자동 맞춤 크기) */
        .action-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .act-btn { padding: 18px 0; border-radius: 12px; font-weight: 900; font-size: 1rem; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .btn-qty { background: #E6D4E7; color: #000; }
        .btn-swap { background: #f39c12; color: #fff; }
        .btn-lp { background: #27ae60; color: #fff; }

        /* 글로벌 고객지원센터 및 소셜 버튼 (사진 속 디자인 그대로 유지) */
        .full-btn { width: 100%; padding: 22px; border-radius: 18px; font-weight: 900; margin-bottom: 12px; border: none; font-size: calc(1rem + 0.5vw); text-decoration: none; display: flex; align-items: center; justify-content: center; background: var(--red); color: white; gap: 10px; box-shadow: 0 5px 20px rgba(255,0,0,0.2); }
        .social-row { display: flex; gap: 12px; margin-bottom: 40px; justify-content: center; }
        .soc-btn { flex: 1; max-width: 200px; padding: 18px; border-radius: 12px; font-weight: bold; text-decoration: none; color: white; border: 2px solid #333; font-size: 1.1rem; text-align: center; display: block; }

        /* 보안 정보 (사진 하단과 동일하게) */
        .sec-box { background: rgba(0,242,234,0.03); border: 1.5px dashed #005555; padding: 25px; border-radius: 20px; text-align: left; font-size: 0.95rem; color: var(--cyan); line-height: 2; width: 100%; }
        .sec-title { display: block; font-weight: 900; font-size: 1.1rem; margin-bottom: 15px; color: var(--cyan); letter-spacing: 0.5px; }

        /* [추가] 모바일 기기별 글자 크기 최적화 (모친폰용) */
        @media screen and (max-width: 360px) {
            .asset-val { font-size: 4rem; }
            .brand-main { font-size: 2rem; }
            .menu-item { font-size: 0.8rem; padding: 12px 2px; }
            .staking-val { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
