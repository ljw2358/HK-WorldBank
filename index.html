<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK - UBI Global Hub</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --bg: #000000; --card: #121212; --gold: #FFD700;
            --neon-st: #00FFCC; --neon-lp: #FF00FF; --neon-green: #39FF14; --neon-blue: #00BFFF;
        }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; }
 
        /* 언어 바 */
        .lang-bar { text-align: right; margin-bottom: 20px; position: sticky; top: 10px; z-index: 2000; }
        #langSelect { background: #111; color: var(--gold); border: 2px solid var(--gold); padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 140px; }

        header { text-align: center; margin-bottom: 25px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 0 0 15px rgba(255,215,0,0.6); }
        #txt-ledger { font-weight: bold; margin-top: 15px; font-size: 1.1rem; background: linear-gradient(90deg, #00FFCC, #FF00FF, #39FF14); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
       
        .pi-display { font-size: 2.5rem; font-weight: bold; margin: 10px 0; color: #fff; }
        .val-box { background: rgba(57, 255, 20, 0.1); color: var(--neon-green); padding: 8px 20px; border: 1px solid var(--neon-green); border-radius: 50px; display: inline-block; font-weight: bold; font-size: 1rem; margin-top: 10px; }

        .rate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; width: 100%; }
        .rate-card { background: var(--card); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #333; }
       
        /* GCV 섹션 디자인 */
        .gcv-section { text-align: center; margin: 20px 0; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid #333; }
        #gcv-title { color: var(--gold); font-size: 24px; font-weight: bold; margin: 0; }
        #gcv-value { color: #fff; font-size: 18px; margin-top: 5px; }

        /* 로그인 버튼 */
        .hkwb-btn { width: 100%; padding: 20px; background: linear-gradient(45deg, #673ab7, #9c27b0); color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 20px; box-shadow: 0 4px 15px rgba(156, 39, 176, 0.4); margin: 15px 0; }

        /* 버튼 그리드 */
        .main-btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; width: 100%; }
        .m-btn { padding: 15px 5px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 0.85rem; background: #333; color: white; }

        .social-box { display: flex; gap: 10px; margin: 20px 0; width: 100%; }
        .social-link { flex: 1; padding: 15px; text-align: center; border-radius: 12px; text-decoration: none; font-weight: bold; color: white; }
        .yt-btn { background: #FF0000; }
        .tk-btn { background: #000; border: 1px solid #fff; }

        #ai-bot { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--neon-lp); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 20px var(--neon-lp); cursor: pointer; z-index: 2999; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select id="langSelect" onchange="updateAllLanguage()">
            <option value="ko">한국어 🇰🇷</option><option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option><option value="ja">日本語 🇯🇵</option>
            <option value="vi">Tiếng Việt 🇻🇳</option><option value="es">Español 🇪🇸</option>
            <option value="fr">Français 🇫🇷</option><option value="de">Deutsch 🇩🇪</option>
            <option value="pt">Português 🇵🇹</option><option value="ru">Русский 🇷🇺</option>
            <option value="it">Italiano 🇮🇹</option><option value="tr">Türkçe 🇹🇷</option>
            <option value="hi">हिन्दी 🇮🇳</option><option value="id">Bahasa Indonesia 🇮🇩</option>
        </select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-ledger">메인 자산 통합 원장</div>
        <div class="pi-display"><span id="main-pi">412.3141</span> <span style="color:var(--gold)">Pi</span></div>
        <div class="val-box">$ <span id="main-val">129,540,600</span> (GCV)</div>
    </header>

    <div class="rate-grid">
        <div class="rate-card"><div id="txt-st-label" style="color:var(--neon-st);">스테이킹 이율</div><div id="live-st">17.38%</div></div>
        <div class="rate-card"><div id="txt-lp-label" style="color:var(--neon-lp);">유동성 수익</div><div id="live-lp">28.12%</div></div>
    </div>

    <div class="gcv-section">
        <h2 id="gcv-title">GCV 314,159$</h2>
        <p id="gcv-value">$129,549,802,314,159</p>
    </div>

    <button onclick="loginWithPi()" class="hkwb-btn">
        HKWB 로그인 (Pi Network)
    </button>
    <div class="main-btn-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px;">
        <button class="m-btn" id="m1" style="background:#1a1a1a; color:#fff; border:1px solid #333; padding:15px 5px; border-radius:12px; font-weight:bold;" onclick="alert('송금 준비중')">송금</button>
        <button class="m-btn" id="m2" style="background:#1a1a1a; color:#fff; border:1px solid #333; padding:15px 5px; border-radius:12px; font-weight:bold;" onclick="alert('결제 준비중')">결제</button>
        <button class="m-btn" id="m3" style="background:#1a1a1a; color:#fff; border:1px solid #333; padding:15px 5px; border-radius:12px; font-weight:bold;" onclick="alert('예치 준비중')">예치</button>
        <button class="m-btn" id="m4" style="background:#1a1a1a; color:#fff; border:1px solid #333; padding:15px 5px; border-radius:12px; font-weight:bold;" onclick="alert('보상 준비중')">보상</button>
        <button class="m-btn" id="m5" style="background:linear-gradient(45deg, #FFD700, #FFA500); color:#000; border:none; padding:15px 5px; border-radius:12px; font-weight:bold;" onclick="alert('기본소득 지급 대상 확인 중')">기본소득</button>
        <button class="m-btn" id="m6" style="background:#1a1a1a; color:#fff; border:1px solid #333; padding:15px 5px; border-radius:12px; font-weight:bold;" onclick="alert('스왑 준비중')">스왑</button>
    </div>
    <div class="main-btn-grid">
        <button class="m-btn" id="b1" onclick="runEngine('pi', 1)">PI 수량</button>
        <button class="m-btn" id="b2" onclick="alert('DEX 준비중')">DEX 스왑</button>
        <button class="m-btn" id="b3" onclick="alert('LP 준비중')">LP 공급</button>
    </div>

    <div class="social-box">
        <a href="https://www.youtube.com/@Hyekong2025" class="social-link yt-btn">YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" class="social-link tk-btn">TikTok</a>
    </div>

    <div style="text-align:center; font-size:0.7rem; color:#444; margin-bottom:20px;">Official Support: support@hkwb.ai.kr</div>
</div>

<div id="ai-bot" onclick="alert('반갑습니다 혜공 형님! 자산을 안전하게 보호 중입니다.')">AI</div>

<script>
    const Pi = window.Pi;
    Pi.init({ version: "1.5", sandbox: true });

    let piBalance = 412.3141;
    let baseVal = 129540600;

    const i18n = {
        ko: { ledger: "메인 자산 통합 원장", st: "스테이킹 이율", lp: "유동성 수익", b1: "PI 수량", b2: "DEX 스왑", b3: "LP 공급" },
        en: { ledger: "Main Asset Ledger", st: "Staking APR", lp: "Liquidity Yield", b1: "PI Qty", b2: "DEX Swap", b3: "LP Supply" },
        zh: { ledger: "资产综合账本", st: "质押利率", lp: "流动性收益", b1: "PI数量", b2: "DEX交换", b3: "LP供应" }
    };

    async function loginWithPi() {
        try {
            const scopes = ['username', 'payments'];
            const user = await Pi.authenticate(scopes, (payment) => { console.log("미완료 결제:", payment); });
            alert(user.user.username + " 형님, HKWB 방문을 환영합니다!");
        } catch (err) {
            alert("Pi Browser로 접속하시거나 로그인을 확인해주세요!");
        }
    }

    function updateAllLanguage() {
        const lang = document.getElementById('langSelect').value;
        const d = i18n[lang] || i18n.en;
        document.getElementById('txt-ledger').innerText = d.ledger;
        document.getElementById('txt-st-label').innerText = d.st;
        document.getElementById('txt-lp-label').innerText = d.lp;
        document.getElementById('b1').innerText = d.b1; 
        document.getElementById('b2').innerText = d.b2; 
        document.getElementById('b3').innerText = d.b3;
    }

    function runEngine(type, amount) {
        piBalance -= amount;
        document.getElementById('main-pi').innerText = piBalance.toFixed(4);
        alert(amount + " Pi가 처리되었습니다.");
    }

    setInterval(() => {
        document.getElementById('main-pi').innerText = (piBalance + (Math.random() * 0.001)).toFixed(4);
        document.getElementById('main-val').innerText = (baseVal + Math.floor(Math.random() * 10000)).toLocaleString();
        document.getElementById('live-st').innerText = (17 + Math.random()).toFixed(2) + '%';
        document.getElementById('live-lp').innerText = (28 + Math.random()).toFixed(2) + '%';
    }, 1500);

    window.onload = updateAllLanguage;
</script>

</body>
</html>
