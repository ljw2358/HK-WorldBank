<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK - UBI Global Hub</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --gold: #FFD700; --soft-gold: #FFFACD; --neon-green: #39FF14; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; }
        
        /* 언어 선택 (상단 한글 제거) */
        .lang-bar { text-align: right; margin-bottom: 20px; }
        #langSelect { background: #111; color: var(--gold); border: 1px solid var(--gold); padding: 8px; border-radius: 8px; font-weight: bold; width: 160px; }

        header { text-align: center; margin-bottom: 20px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 0 0 15px rgba(255,215,0,0.6); }
        #txt-ledger { font-weight: bold; margin-top: 10px; font-size: 1.1rem; color: #00FFCC; }

        /* 자산 및 LP 유동성 */
        .pi-display { font-size: 2.8rem; font-weight: bold; margin: 10px 0; text-align: center; }
        .gcv-section { text-align: center; margin-bottom: 20px; background: #111; padding: 15px; border-radius: 20px; border: 1px solid #333; }
        #lp-total { font-size: 1.4rem; font-weight: 900; color: #fff; margin-top: 10px; }

        /* 6대 금융 메뉴 (연한 노란색 아이콘) */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .m-btn { padding: 15px 5px; border-radius: 15px; border: 1px solid #333; background: #1a1a1a; color: #fff; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: bold; }
        .m-btn i { font-size: 1.5rem; color: var(--soft-gold); } /* 연한 노란색 적용 */
        .gold-btn { background: linear-gradient(45deg, #FFD700, #FFA500) !important; color: #000 !important; }
        .gold-btn i { color: #000 !important; }

        /* AI 지원센터 및 챗봇 */
        .center-btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 1.1rem; background: linear-gradient(45deg, #ff4d6d, #ff758c); color: white; cursor: pointer; margin-bottom: 10px; }
        #chatBox { display: none; background: #1a1a1a; border: 2px solid #ff4d6d; border-radius: 20px; padding: 15px; margin-bottom: 20px; text-align: left; }
        #chatContent { height: 120px; overflow-y: auto; font-size: 0.9rem; margin-bottom: 10px; }

        /* 소셜 & FAQ */
        .social-grid { display: flex; gap: 10px; margin-bottom: 15px; }
        .social-btn { flex: 1; padding: 12px; border-radius: 10px; text-align: center; text-decoration: none; color: white; font-weight: bold; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .faq-box { background: #0a0a0a; border-radius: 15px; border: 1px solid #444; padding: 15px; margin-bottom: 20px; }
        .faq-q { color: var(--gold); font-weight: bold; cursor: pointer; font-size: 0.9rem; margin-bottom: 5px; }
        .faq-a { color: #ccc; font-size: 0.8rem; display: none; padding: 10px 0; border-bottom: 1px solid #222; }

        /* 로그인 버튼 (최하단) */
        .login-btn { width: 100%; padding: 20px; border-radius: 15px; border: none; font-weight: bold; font-size: 1.2rem; background: linear-gradient(45deg, #673ab7, #9c27b0); color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select id="langSelect" onchange="changeLang()">
            <option value="ko">한국어 🇰🇷</option><option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option><option value="ja">日本語 🇯🇵</option>
            <option value="vi">Tiếng Việt 🇻🇳</option><option value="id">Bahasa ID 🇮🇩</option>
            <option value="ph">Tagalog 🇵🇭</option><option value="in">Hindi 🇮🇳</option>
            <option value="th">Thai 🇹🇭</option><option value="ru">Русский 🇷🇺</option>
            <option value="fr">Français 🇫🇷</option><option value="de">Deutsch 🇩🇪</option>
            </select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-ledger">메인 자산 통합 원장</div>
        <div class="pi-display"><span id="main-pi">412.3141</span> <span style="color:var(--gold)">Pi</span></div>
    </header>

    <div class="gcv-section">
        <span id="txt-lp-label" style="color:var(--neon-green); font-size:0.9rem;">전체 유동성 LP 공급</span>
        <div id="lp-total">$ 88,432,159,375</div>
    </div>

    <div class="grid">
        <button class="m-btn" onclick="runEngine(10)"><i class="fas fa-paper-plane"></i><span id="m1">송금</span></button>
        <button class="m-btn" onclick="runEngine(5)"><i class="fas fa-credit-card"></i><span id="m2">결제</span></button>
        <button class="m-btn" onclick="runEngine(-50)"><i class="fas fa-piggy-bank"></i><span id="m3">예치</span></button>
        <button class="m-btn" onclick="runEngine(-20)"><i class="fas fa-gift"></i><span id="m4">보상</span></button>
        <button class="m-btn gold-btn" onclick="runEngine(-100)"><i class="fas fa-hand-holding-dollar"></i><span id="m5">기본소득</span></button>
        <button class="m-btn" onclick="alert('Swap Active')"><i class="fas fa-sync"></i><span id="m6">스왑</span></button>
    </div>

    <button id="txt-center-btn" class="center-btn" onclick="toggleChat()">글로벌 AI 지원센터</button>
    
    <div id="chatBox">
        <div style="color:#ff4d6d; font-weight:bold; margin-bottom:10px;">HKWB AI 챗봇</div>
        <div id="chatContent"><p id="ai-greet" style="color:var(--gold)">[AI]: 혜공 형님, 무엇을 도와드릴까요?</p></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chatInput" style="flex:1; background:#000; border:1px solid #444; color:#fff; padding:8px; border-radius:8px;">
            <button onclick="sendChat()" style="background:#ff4d6d; border:none; color:#fff; padding:8px 15px; border-radius:8px;">전송</button>
        </div>
    </div>

    <div class="social-grid">
        <a href="https://www.youtube.com/@Hyekong2025" class="social-btn" style="background:#FF0000;"><i class="fab fa-youtube"></i>YouTube</a>
        <a href="https://www.tiktok.com/@hyekong2025" class="social-btn" style="background:#000; border:1px solid #fff;"><i class="fab fa-tiktok"></i>TikTok</a>
    </div>

    <div class="faq-box" id="faqContainer">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:10px;">▼ FAQ (Top 20)</div>
        </div>

    <button onclick="loginWithPi()" class="login-btn">HKWB 로그인 (Pi Network)</button>
</div>

<script>
    // Pi SDK 강제 초기화
    const Pi = window.Pi;
    try { Pi.init({ version: "1.5", sandbox: true }); } catch(e) { console.log("Pi SDK Load Error"); }

    let piBalance = 412.3141;
    let baseLp = 88432648647;

    const langData = {
        ko: { ledger: "메인 자산 통합 원장", lp: "전체 유동성 LP 공급", m1:"송금", m2:"결제", m3:"예치", m4:"보상", m5:"기본소득", m6:"스왑", center:"글로벌 AI 지원센터", greet:"[AI]: 혜공 형님, 무엇을 도와드릴까요?", login:"HKWB 로그인 (Pi Network)" },
        en: { ledger: "Main Asset Ledger", lp: "Total LP Liquidity", m1:"Transfer", m2:"Pay", m3:"Deposit", m4:"Reward", m5:"UBI", m6:"Swap", center:"Global AI Support", greet:"[AI]: How can I help you, Leader?", login:"HKWB Login (Pi Network)" }
    };

    const faqData = [
        { q: "UBI란?", a: "전 인류 조건 없는 기본소득 지급 시스템입니다." },
        { q: "GCV 가치는?", a: "1 Pi = 314,159$ 글로벌 합의 가격입니다." },
        { q: "보안?", a: "256비트 양자 암호화로 보호됩니다." },
        { q: "출금?", a: "메인넷 오픈 후 즉시 가능합니다." }
    ];

    function changeLang() {
        const l = document.getElementById('langSelect').value;
        const d = langData[l] || langData.en;
        document.getElementById('txt-ledger').innerText = d.ledger;
        document.getElementById('txt-lp-label').innerText = d.lp;
        for(let i=1; i<=6; i++) document.getElementById('m'+i).innerText = d['m'+i];
        document.getElementById('txt-center-btn').innerText = d.center;
        document.getElementById('ai-greet').innerText = d.greet;
        document.querySelector('.login-btn').innerText = d.login;
    }

    function runEngine(amount) {
        piBalance -= amount;
        document.getElementById('main-pi').innerText = piBalance.toFixed(4);
        alert(Math.abs(amount) + " Pi 처리 완료 (Testnet)");
    }

    async function loginWithPi() {
        try {
            const user = await Pi.authenticate(['username', 'payments'], (p) => {});
            alert(user.user.username + " 형님, 로그인 성공!");
        } catch (e) { alert("Pi Browser 앱으로 접속하셔야 실제 로그인이 작동합니다!"); }
    }

    function toggleChat() { const c = document.getElementById('chatBox'); c.style.display = c.style.display === 'none' ? 'block' : 'none'; }
    function sendChat() {
        const input = document.getElementById('chatInput');
        const content = document.getElementById('chatContent');
        if(input.value) {
            content.innerHTML += `<p>[나]: ${input.value}</p>`;
            setTimeout(() => { content.innerHTML += `<p style="color:var(--gold)">[AI]: 형님, '${input.value}' 처리 중입니다.</p>`; }, 800);
            input.value = "";
        }
    }

    // FAQ 렌더링
    const faqContainer = document.getElementById('faqContainer');
    faqData.forEach((item, index) => {
        faqContainer.innerHTML += `
            <div class="faq-q" onclick="document.getElementById('faq${index}').style.display = (document.getElementById('faq${index}').style.display == 'block' ? 'none' : 'block')">Q: ${item.q}</div>
            <div class="faq-a" id="faq${index}">${item.a}</div>
        `;
    });

    setInterval(() => {
        document.getElementById('lp-total').innerText = "$ " + (baseLp + Math.floor(Math.random()*100000)).toLocaleString();
    }, 1500);

    window.onload = changeLang;
</script>
</body>
</html>
