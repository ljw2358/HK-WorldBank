<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK - Global Edition</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --hk-gold: #FFD700; --hk-dark: #000; --hk-green: #00FF00; --hk-cyan: #00FFFF; }
        body { background-color: var(--hk-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 430px; display: flex; flex-direction: column; align-items: center; }

        /* 상단 네비게이션 */
        .top-nav { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #111; padding: 10px; border-radius: 12px; box-sizing: border-box; }
        .pay-progress { color: var(--hk-green); font-weight: 900; font-size: 13px; letter-spacing: 1px; }
        .lang-select { background: #000; color: var(--hk-gold); border: 1px solid var(--hk-gold); padding: 5px 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .brand { font-size: 34px; font-weight: 900; color: var(--hk-gold); margin: 20px 0; text-shadow: 0 0 10px rgba(255,215,0,0.3); }

        /* 자산 카드 */
        .asset-card { width: 100%; background: linear-gradient(145deg, #111, #000); border: 1px solid #333; border-radius: 25px; padding: 30px 15px; text-align: center; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .asset-val { font-size: 44px; font-weight: 900; margin: 15px 0; color: #fff; }
        .gcv-badge { color: var(--hk-green); border: 1.5px solid var(--hk-green); padding: 8px 20px; border-radius: 50px; font-size: 14px; font-weight: bold; display: inline-block; }

        /* 6대 메뉴 그리드 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; margin-bottom: 20px; }
        .menu-item { background: #161616; padding: 22px 5px; border-radius: 18px; text-align: center; border: 1px solid #222; cursor: pointer; transition: all 0.2s ease; }
        .menu-item:active { background: #333; transform: translateY(3px); }
        .menu-item i { font-size: 28px; color: var(--hk-gold); margin-bottom: 12px; display: block; }
        .menu-text { font-size: 13px; font-weight: 800; letter-spacing: -0.5px; }

        /* 하단 액션 버튼 */
        .big-num { font-size: 34px; font-weight: 900; margin: 20px 0; letter-spacing: 2px; color: #eee; }
        .btn-row { width: 100%; display: flex; gap: 10px; margin-bottom: 15px; }
        .act-btn { flex: 1; padding: 18px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .act-btn:active { opacity: 0.7; }

        /* SNS 링크 */
        .sns-btn { flex: 1; padding: 16px; border-radius: 15px; text-decoration: none; color: white; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; }

        /* 보안 섹션 */
        .security-box { background: #0a0a0a; border-left: 4px solid var(--hk-cyan); border-radius: 12px; padding: 20px; width: 100%; text-align: left; margin-top: 15px; box-sizing: border-box; }
        .sec-title { color: var(--hk-cyan); font-weight: 900; margin-bottom: 15px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .sec-list { font-size: 13px; color: #999; line-height: 1.8; list-style: none; padding: 0; margin: 0; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-nav">
        <div class="pay-progress"><i class="fas fa-shield-alt"></i> STEP: <span id="pay-count">0</span>/10</div>
        <select class="lang-select" id="langSelect" onchange="runLanguageEngine()">
            <option value="ko">KOREA 🇰🇷</option>
            <option value="en">USA 🇺🇸</option>
            <option value="cn">CHINA 🇨🇳</option>
            <option value="jp">JAPAN 🇯🇵</option>
            <option value="vn">VIETNAM 🇻🇳</option>
            <option value="id">INDONESIA 🇮🇩</option>
            <option value="ph">PHILIPPINES 🇵🇭</option>
            <option value="th">THAILAND 🇹🇭</option>
            <option value="my">MALAYSIA 🇲🇾</option>
            <option value="in">INDIA 🇮🇳</option>
            <option value="ru">RUSSIA 🇷🇺</option>
            <option value="de">GERMANY 🇩🇪</option>
            <option value="fr">FRANCE 🇫🇷</option>
            <option value="es">SPAIN 🇪🇸</option>
            <option value="pt">PORTUGAL 🇵🇹</option>
        </select>
    </div>

    <div class="brand">HK WORLD BANK</div>

    <div class="asset-card">
        <div id="t-asset" style="color:var(--hk-gold); font-weight:bold; font-size: 14px;">TOTAL ASSETS (GCV STANDARD)</div>
        <div class="asset-val">400.0212 <span style="font-size:22px; color:var(--hk-gold);">Pi</span></div>
        <div class="gcv-badge">VALUE: $ 125,663,600</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="startPay('송금')"><i class="fas fa-paper-plane"></i><div class="menu-text" id="m1">송금</div></div>
        <div class="menu-item" onclick="startPay('결제')"><i class="fas fa-shopping-cart"></i><div class="menu-text" id="m2">결제</div></div>
        <div class="menu-item" onclick="startPay('예치')"><i class="fas fa-piggy-bank"></i><div class="menu-text" id="m3">예치</div></div>
        <div class="menu-item" onclick="startPay('보상')"><i class="fas fa-gift"></i><div class="menu-text" id="m4">보상</div></div>
        <div class="menu-item" onclick="startPay('기본소득')"><i class="fas fa-hand-holding-usd"></i><div class="menu-text" id="m5">기본소득</div></div>
        <div class="menu-item" onclick="startPay('스왑')"><i class="fas fa-sync"></i><div class="menu-text" id="m6">스왑</div></div>
    </div>

    <div class="big-num">88,410,819,601</div>

    <div class="btn-row">
        <button class="act-btn" style="background:#fff; color:#000;" id="b1">PI 수량</button>
        <button class="act-btn" style="background:var(--hk-gold); color:#000;" onclick="startPay('SWAP')">SWAP</button>
        <button class="act-btn" style="background:var(--hk-green); color:#000;" id="b3">LP 공급</button>
    </div>

    <div class="btn-row">
        <a href="https://www.youtube.com/@hkgroup" target="_blank" class="sns-btn" style="background:#f00;"><i class="fab fa-youtube"></i> YOUTUBE</a>
        <a href="https://www.tiktok.com/@hkgroup" target="_blank" class="sns-btn" style="background:#000; border:1px solid #333;"><i class="fab fa-tiktok"></i> TIKTOK</a>
    </div>

    <div class="security-box">
        <div class="sec-title" id="t-sec"><i class="fas fa-user-shield"></i> HK QUANTUM SHIELD ACTIVE</div>
        <ul class="sec-list">
            <li id="s1">◈ 개인정보보호법 준수: 양자 암호화 보안 적용</li>
            <li id="s2">◈ Form of Private: 자산 보호 프로토콜 가동</li>
            <li id="s3">◈ HK-ROBOT: AI 실시간 위협 탐지 및 암호화</li>
        </ul>
    </div>
</div>

<script>
    let pCount = 0;
    try { Pi.init({ version: "2.0", sandbox: false }); } catch(e) {}

    // 10회 결제 로직
    async function startPay(memo) {
        if(pCount >= 10) { alert("Mission Complete!"); return; }
        try {
            await Pi.createPayment({ amount: 1.0, memo: `HK WB ${memo} (${pCount+1}/10)`, metadata: { step: pCount+1 } }, {
                onReadyForServerApproval: (id) => console.log(id),
                onReadyForServerCompletion: (id, txid) => {
                    pCount++;
                    document.getElementById('pay-count').innerText = pCount;
                    alert(`${pCount}/10 완료!`);
                },
                onError: (e) => alert("Wallet Error")
            });
        } catch (e) { alert("Pi Browser Required"); }
    }

    // 15개국 언어 엔진 데이터
    const langData = {

        en: { asset: "TOTAL ASSETS (GCV)", m1:"Send", m2:"Pay", m3:"Stake", m4:"Reward", m5:"UBI", m6:"Swap", b1:"Pi Qty", b3:"LP Supply", sec:"HK QUANTUM SHIELD ACTIVE", s1:"◈ Privacy Act: Quantum Security", s2:"◈ Asset Protection Protocol Active", s3:"◈ HK-ROBOT: AI Threat Detection" },
        cn: { asset: "总资产 (GCV)", m1:"转账", m2:"支付", m3:"存款", m4:"奖励", m5:"基本收入", m6:"交换", b1:"Pi 数量", b3:"LP 供应", sec:"HK 量子盾激活", s1:"◈ 遵守隐私法：量子加密", s2:"◈ 资产保护协议：运行中", s3:"◈ HK-机器人：AI 实时检测" },
        jp: { asset: "総資産 (GCV基準)", m1:"送金", m2:"決済", m3:"預金", m4:"報酬", m5:"基本所得", m6:"スワップ", b1:"Pi 数量", b3:"LP 供給", sec:"HK 量子シールド有効", s1:"◈ プライバシー法: 量子暗号適用", s2:"◈ 資産保護プロトコル稼働中", s3:"◈ HK-ROBOT: AI リアルタイム検知" },
        vn: { asset: "TỔNG TÀI SẢN (GCV)", m1:"Gửi", m2:"Thanh toán", m3:"Gửi tiết kiệm", m4:"Thưởng", m5:"Thu nhập", m6:"Hoán đổi", b1:"Pi Qty", b3:"Cung cấp LP", sec:"LÁ CHẮN LƯỢNG TỬ HK", s1:"◈ Bảo mật lượng tử được áp dụng", s2:"◈ Giao thức tài sản đang chạy", s3:"◈ HK-ROBOT: AI phát hiện" },

        ph: { asset: "KABUUANG ASSET (GCV)", m1:"Ipadala", m2:"Magbayad", m3:"I-stake", m4:"Gantimpala", m5:"UBI", m6:"I-swap", b1:"Pi Qty", b3:"LP Supply", sec:"HK QUANTUM SHIELD AKTIBO", s1:"◈ Privacy Act: Quantum Security", s2:"◈ Asset Protection Protocol Aktibo", s3:"◈ HK-ROBOT: AI Threat Detection" },
        th: { asset: "สินทรัพย์รวม (GCV)", m1:"ส่ง", m2:"จ่าย", m3:"ฝาก", m4:"รางวัล", m5:"รายได้พื้นฐาน", m6:"สวอป", b1:"จำนวน Pi", b3:"LP Supply", sec:"HK QUANTUM SHIELD เปิดใช้งาน", s1:"◈ ความปลอดภัยควอนตัม", s2:"◈ โปรโตคอลการปกป้องสินทรัพย์", s3:"◈ HK-ROBOT: การตรวจจับภัยคุกคาม" },
        my: { asset: "JUMLAH ASET (GCV)", m1:"Hantar", m2:"Bayar", m3:"Simpan", m4:"Ganjaran", m5:"UBI", m6:"Tukar", b1:"Kuantiti Pi", b3:"Bekalan LP", sec:"HK QUANTUM SHIELD AKTIF", s1:"◈ Akta Privasi: Keselamatan Kuantum", s2:"◈ Protokol Perlindungan Aset Aktif", s3:"◈ HK-ROBOT: Pengesanan Ancaman AI" },
        in: { asset: "कुल संपत्ति (GCV)", m1:"भेजें", m2:"भुगतान", m3:"जमा", m4:"पुरस्कार", m5:"आय", m6:"स्वैप", b1:"Pi मात्रा", b3:"LP आपूर्ति", sec:"HK क्वांटम शील्ड सक्रिय", s1:"◈ गोपनीयता अधिनियम: क्वांटम सुरक्षा", s2:"◈ संपत्ति सुरक्षा प्रोटोकॉल सक्रिय", s3:"◈ HK-ROBOT: AI खतरा पहचान" },
        ru: { asset: "ОБЩИЕ АКТИВЫ (GCV)", m1:"Отправить", m2:"Оплатить", m3:"Депозит", m4:"Награда", m5:"Доход", m6:"Обмен", b1:"Pi Кол-во", b3:"LP Поставка", sec:"HK QUANTUM SHIELD АКТИВЕН", s1:"◈ Конфиденциальность: Квантовая защита", s2:"◈ Протокол защиты активов", s3:"◈ HK-ROBOT: AI обнаружение угроз" },
        de: { asset: "GESAMTVERMÖGEN (GCV)", m1:"Senden", m2:"Zahlen", m3:"Sparen", m4:"Belohnung", m5:"BGE", m6:"Swap", b1:"Pi Menge", b3:"LP Angebot", sec:"HK QUANTUM SHIELD AKTIV", s1:"◈ Datenschutz: Quantensicherheit", s2:"◈ Assets Schutzprotokoll Aktiv", s3:"◈ HK-ROBOT: AI-Bedrohungserkennung" },
        fr: { asset: "ACTIFS TOTAUX (GCV)", m1:"Envoyer", m2:"Payer", m3:"Dépôt", m4:"Prime", m5:"RBH", m6:"Swap", b1:"Qté Pi", b3:"Offre LP", sec:"HK QUANTUM SHIELD ACTIF", s1:"◈ Confidentialité : Sécurité Quantique", s2:"◈ Protocole de Protection des Actifs", s3:"◈ HK-ROBOT : Détection de Menaces IA" },
        es: { asset: "ACTIVOS TOTALES (GCV)", m1:"Enviar", m2:"Pagar", m3:"Depositar", m4:"Recompensa", m5:"Renta", m6:"Canje", b1:"Cant. Pi", b3:"Suministro LP", sec:"HK QUANTUM SHIELD ACTIVO", s1:"◈ Privacidad: Seguridad Cuántica", s2:"◈ Protocolo de Protección de Activos", s3:"◈ HK-ROBOT: Detección de Amenazas IA" },
        pt: { asset: "ATIVOS TOTAIS (GCV)", m1:"Enviar", m2:"Pagar", m3:"Depositar", m4:"Recompensa", m5:"Renda", m6:"Troca", b1:"Qtd Pi", b3:"Oferta LP", sec:"HK QUANTUM SHIELD ATIVO", s1:"◈ Privacidade: Segurança Quântica", s2:"◈ Protocolo de Proteção de Ativos", s3:"◈ HK-ROBOT: Detecção de Ameaças IA" }
    };

    function runLanguageEngine() {
        const l = document.getElementById('langSelect').value;
        const d = langData[l] || langData.en;
        document.getElementById('t-asset').innerText = d.asset;
        document.getElementById('m1').innerText = d.m1; document.getElementById('m2').innerText = d.m2; document.getElementById('m3').innerText = d.m3;
        document.getElementById('m4').innerText = d.m4; document.getElementById('m5').innerText = d.m5; document.getElementById('m6').innerText = d.m6;
        document.getElementById('b1').innerText = d.b1; document.getElementById('b3').innerText = d.b3;
        document.getElementById('t-sec').innerHTML = `<i class="fas fa-user-shield"></i> ` + d.sec;
        document.getElementById('s1').innerText = d.s1; document.getElementById('s2').innerText = d.s2; document.getElementById('s3').innerText = d.s3;
    }
</script>
</body>
</html>
