<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --hk-gold: #FFD700; --hk-dark: #000; --hk-green: #00FF00; --hk-cyan: #00F2FF; }
        * { box-sizing: border-box; margin: 0; padding: 0; word-break: keep-all; } /* 단어 정렬 */
        body { background-color: var(--hk-dark); color: white; font-family: sans-serif; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 480px; padding: 15px; }

        /* 상단 언어 선택 */
        .top-nav { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .lang-select { background: #111; color: var(--hk-gold); border: 1px solid var(--hk-gold); padding: 5px; border-radius: 5px; font-size: 12px; }

        .brand { font-size: 28px; font-weight: 900; color: var(--hk-gold); margin: 15px 0; }

        /* 자산 카드 */
        .asset-card { background: #0d0d0d; border-radius: 25px; padding: 40px 10px; text-align: center; border: 1px solid #222; margin-bottom: 20px; }
        .asset-val { font-size: 45px; font-weight: 900; margin: 10px 0; }
        .gcv-badge { display: inline-block; padding: 6px 15px; border-radius: 20px; border: 1px solid var(--hk-green); color: var(--hk-green); font-size: 14px; }

        /* 6구 메뉴 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .menu-box { background: #111; padding: 20px 5px; border-radius: 12px; text-align: center; border: 1px solid #222; }
        .menu-box i { font-size: 24px; margin-bottom: 8px; display: block; }
        .menu-box span { font-size: 14px; font-weight: bold; }

        /* 스테이킹 바 */
        .stake-bar { background: #0a0a0a; border-left: 4px solid var(--hk-gold); padding: 15px; margin-bottom: 20px; border-radius: 0 10px 10px 0; }
        .stake-num { font-size: 24px; font-weight: 900; }

        /* 3개 버튼 (SNS 위) */
        .action-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .act-btn { flex: 1; padding: 15px 5px; border-radius: 10px; border: none; font-weight: 900; font-size: 14px; }
        .b-white { background: #fff; } .b-gold { background: var(--hk-gold); } .b-green { background: #00c853; color: #fff; }

        .cs-btn { width: 100%; padding: 15px; background: #ff4444; color: #fff; border: none; border-radius: 10px; font-weight: 900; margin-bottom: 15px; }
        .sns-row { display: flex; gap: 10px; margin-bottom: 30px; }
        .sns-btn { flex: 1; padding: 12px; border-radius: 10px; text-decoration: none; color: #fff; text-align: center; font-weight: bold; font-size: 14px; }

        /* 푸터 예치 APY */
        footer { text-align: center; border-top: 1px solid #222; padding-top: 30px; }
        .apy-main { color: var(--hk-gold); font-size: 32px; font-weight: 900; margin-bottom: 20px; }
        .sec-msg { color: #888; font-size: 14px; font-weight: bold; line-height: 1.6; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-nav">
        <select class="lang-select" id="langSel" onchange="applyLang()">
            <option value="ko">한국어</option><option value="en">English</option>
            <option value="zh">中文</option><option value="ar">العربية</option>
            <option value="hi">हिन्दी</option><option value="es">Español</option>
            <option value="pt">Português</option><option value="uk">Українська</option>
            <option value="ja">日本語</option><option value="ru">Русский</option>
            <option value="vi">Tiếng Việt</option><option value="th">ไทย</option>
            <option value="de">Deutsch</option><option value="fr">Français</option>
            <option value="it">Italiano</option>
        </select>
    </div>

    <div class="brand">HK WORLD BANK</div>

    <div class="asset-card">
        <div id="txt-ledger">메인 자산 통합 원장</div>
        <div class="asset-val">400.0212 <span style="color:var(--hk-gold); font-size:0.5em;">Pi</span></div>
        <div class="gcv-badge" id="txt-gcv">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="menu-grid">
        <div class="menu-box"><i class="fas fa-paper-plane" style="color:#007AFF"></i><span data-k="send">송금</span></div>
        <div class="menu-box"><i class="fas fa-shopping-cart" style="color:orange"></i><span data-k="pay">결제</span></div>
        <div class="menu-box"><i class="fas fa-piggy-bank" style="color:var(--hk-gold)"></i><span data-k="save">예치</span></div>
        <div class="menu-box"><i class="fas fa-gift" style="color:red"></i><span data-k="reward">보상</span></div>
        <div class="menu-box"><i class="fas fa-balance-scale" style="color:var(--hk-purple)"></i><span data-k="ubi">기본소득</span></div>
        <div class="menu-box"><i class="fas fa-sync-alt" style="color:var(--hk-cyan)"></i><span data-k="swap2">스왑</span></div>
    </div>

    <div class="stake-bar">
        <div style="color:var(--hk-gold); font-size:12px; font-weight:bold;" id="txt-stkhead">STAKING 31.4%</div>
        <div class="stake-num">88,401,819,601</div>
    </div>

    <div class="action-row">
        <button class="act-btn b-white" id="btn-pi">PI 수량</button>
        <button class="act-btn b-gold" id="btn-swap">SWAP</button>
        <button class="act-btn b-green" id="btn-lp">LP 공급</button>
    </div>

    <button class="cs-btn" id="btn-cs">글로벌 고객지원센터</button>

    <div class="sns-row">
        <a href="#" class="sns-btn" style="background:#f00;">YOUTUBE</a>
        <a href="#" class="sns-btn" style="background:#000; border:1px solid #333;">TIKTOK</a>
    </div>

    <footer>
        <div class="apy-main" id="txt-apy">예치 (APY 31.4%)</div>
        <div class="sec-msg" id="txt-msg">"HK WorldBank는 고객님의 자산을 양자 암호 기술로 안전하게 보호합니다."</div>
        <a href="#" style="color:#555; text-decoration:none; font-size:12px;" id="txt-policy">개인정보처리방안</a>
    </footer>
</div>

    function applyLang() {
        const lang = document.getElementById('langSel').value;
        const d = i18n[lang];
        document.getElementById('txt-ledger').innerText = d.ledger;
        document.getElementById('txt-gcv').innerText = d.gcv;
        document.getElementById('btn-pi').innerText = d.pi;
        document.getElementById('btn-swap').innerText = d.swap;
        document.getElementById('btn-lp').innerText = d.lp;
        document.getElementById('btn-cs').innerText = d.cs;
        document.getElementById('txt-stkhead').innerText = d.stk;
        document.getElementById('txt-apy').innerText = d.apy;
        document.getElementById('txt-msg').innerText = d.msg;
        document.getElementById('txt-policy').innerText = d.policy;
        document.querySelectorAll('[data-k]').forEach(el => el.innerText = d[el.getAttribute('data-k')]);

</script>
</body>
</html>
