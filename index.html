<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        /* 기본 레이아웃 및 중앙 정렬 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: #000; color: #fff; 
            font-family: 'Apple SD Gothic Neo', sans-serif; overflow-x: hidden; 
            display: flex; justify-content: center; top: 0px !important;
        }

        /* 구글 로고 숨기기 및 Language 버튼 이쁘게 */
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon { display: none !important; }
        .goog-te-gadget-simple {
            background-color: #1a1a1a !important; border: 1px solid #ffc107 !important;
            padding: 8px 15px !important; border-radius: 20px !important;
            font-size: 0.85rem !important; color: #fff !important;
        }
        .goog-te-gadget-simple span { color: #fff !important; }
        .goog-te-menu-value img { display: none !important; }
        .goog-te-menu-value span:first-child { font-size: 0 !important; }
        .goog-te-menu-value span:first-child::before { content: "Language"; font-size: 0.85rem; font-weight: bold; }
        body { position: static !important; }

        .wrapper {
            width: 100%; max-width: 450px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 25px 20px; position: relative;
        }

        #google_translate_element { align-self: flex-end; margin-bottom: 20px; z-index: 9999; }

        /* 브랜드 및 카드 디자인 */
        .brand { width: 100%; color: #ffc107; font-size: 1.6rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 25px; text-align: left; }
        
        .card {
            width: 100%; background: linear-gradient(145deg, #1a1a1a, #000); border-radius: 20px;
            padding: 30px 20px; text-align: center; border: 1px solid #333; margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .main-ledger-label { color: #ffc107; font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; opacity: 0.9; }
        .balance { font-size: 2.8rem; font-weight: 800; margin: 5px 0; letter-spacing: -1px; }
        .gcv-badge {
            display: inline-block; background: rgba(0, 230, 118, 0.1); border: 1px solid #00e676; color: #00e676;
            padding: 6px 15px; border-radius: 50px; font-size: 0.8rem; font-weight: bold; margin-top: 15px;
        }

        /* 그리드 버튼 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-bottom: 25px; }
        .btn {
            background: #222; padding: 20px 5px; border-radius: 12px;
            text-align: center; font-weight: bold; font-size: 0.95rem; cursor: pointer; border: 1px solid #333; color: #fff;
            text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.98); background: #333; }

        /* 입력창 및 유동성풀 */
        .input-box { width: 100%; margin-bottom: 20px; }
        .input-label { color: #00e676; font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; display: block; text-align: left; }
        .num-field {
            width: 100%; padding: 18px; background: #111; border: 1px solid #444;
            border-radius: 15px; color: #fff; font-size: 1.4rem; text-align: center; outline: none; font-weight: bold;
        }

        /* 강조 색상 */
        .btn-yellow { background: #ffc107; color: #000; border: none; }
        .btn-green { background: #00e676; color: #000; border: none; }
        .btn-pink { background: #ff4081; grid-column: span 2; margin-top: 5px; border: none; }
        
        .policy-section { width: 100%; margin-top: 40px; border-top: 1px solid #222; padding-top: 25px; font-size: 0.8rem; color: #666; line-height: 1.6; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="google_translate_element"></div>
    <div class="brand">HK WORLD BANK</div>

    <div class="card">
        <div class="main-ledger-label">메인자산통합원장</div>
        <div class="balance">00.0247 <span style="font-size:1.3rem; color:#888;">Pi</span></div>
        <div class="gcv-badge">Value: $ 125,663,600 (GCV)</div>
    </div>

    <div class="grid">
        <div class="btn" onclick="payStep10()">🛒 결제 (TEST)</div>
        <div class="btn">💰 예치 (APY 31.4%)</div>
        <div class="btn">🌍 기본소득</div>
        <div class="btn">🔄 스왑</div>
    </div>

    <div class="input-box">
        <label class="input-label">유동성풀 (수량 입력)</label>
        <input type="number" id="lp_val" class="num-field" placeholder="0.00">
    </div>

    <div class="grid">
        <div class="btn btn-yellow">SWAP</div>
        <div class="btn btn-green" onclick="confirmLP()">유동성풀 공급</div>
        <a href="https://www.youtube.com/@HKWorldBank" target="_blank" rel="noopener noreferrer" class="btn" style="background:#cc0000;">▶ YOUTUBE</a>
        <a href="https://www.tiktok.com/@hkworldbank" target="_blank" rel="noopener noreferrer" class="btn" style="background:#000; border:1px solid #444;">♪ TIKTOK</a>
        <div class="btn btn-pink">🎧 Global Support Center</div>
    </div>

    <div class="policy-section">
        <b style="color:#ffc107; display:block; margin-bottom:10px; font-size:0.9rem;">Terms & Privacy Policy</b>
        1. HK WorldBank 이용 시 모든 디지털 자산 정책에 동의하는 것으로 간주됩니다.<br>
        2. 귀하의 자산은 HK Quantum Shield 보안 시스템에 의해 안전하게 보호됩니다.
    </div>
</div>

<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: false });

    async function payStep10() {
        try {
            await Pi.authenticate(['payments']);
            for(let i=1; i<=10; i++) {
                await Pi.createPayment({ amount: 0.0001, memo: "HKWB 결제 테스트 #"+i }, {
                    onReadyForServerApproval: (id) => {}, onReadyForServerCompletion: (id, tx) => {},
                    onCancel: () => {}, onError: () => {}
                });
                await new Promise(r => setTimeout(r, 1000));
            }
        } catch (e) { alert("인증 실패"); }
    }

    function confirmLP() {
        const amt = document.getElementById('lp_val').value;
        if(!amt) return alert("수량을 입력해주세요.");
        alert(amt + " Pi 유동성풀 공급 완료");
    }

    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'ko',
            /* 형님 요청 20개국 정밀 순서 고정 */
            includedLanguages: 'ko,en,ar,hi,es,pt,uk,ja,ru,vi,th,de,fr,it,tr,id,pl,nl,bn,zh-CN',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
    }
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
