<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK-WorldBank | Multi-Language Global Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #000a1a; color: #fff; overflow-x: hidden; }

        /* 상단 네비게이션 */
        header {
            position: fixed; top: 0; width: 100%; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; background: rgba(0, 10, 26, 0.9); backdrop-filter: blur(10px);
        }
        .logo { font-weight: 900; font-size: 1.2rem; color: #fff; text-decoration: none; }
        .lang-select { font-size: 0.9rem; border: 1px solid #d4af37; padding: 4px 10px; border-radius: 20px; color: #d4af37; }

        /* 메인 비주얼 */
        .hero {
            height: 70vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 0 20px;
            background: linear-gradient(rgba(0,10,26,0.7), #000a1a), url('https://images.unsplash.com/photo-1526303328194-725532917b18?auto=format&fit=crop&w=1000&q=80');
            background-size: cover; background-position: center;
        }
        .hero h1 { font-size: 2.8rem; font-weight: 900; line-height: 1.1; margin-bottom: 15px; letter-spacing: -1px; }
        .hero p { color: #aaa; font-size: 1rem; margin-bottom: 30px; }

        /* 주요 서비스 (송금, 결제, 예치) */
        .services {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; padding: 20px; margin-top: -50px;
        }
        .service-card {
            background: #001c3d; padding: 20px 10px; border-radius: 12px;
            text-align: center; border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .service-card i { font-size: 1.5rem; display: block; margin-bottom: 10px; }
        .service-card h3 { font-size: 0.9rem; font-weight: 600; color: #d4af37; }
        .service-card p { font-size: 0.75rem; color: #888; margin-top: 5px; }

        /* 30개 언어 지원 바 */
        .lang-bar {
            background: #d4af37; color: #000a1a; padding: 10px;
            font-size: 0.8rem; font-weight: 700; text-align: center;
            margin-top: 30px; overflow: hidden; white-space: nowrap;
        }
        .marquee { display: inline-block; animation: scroll 20s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">HK-WorldBank</a>
        <div class="lang-select">🌐 30+ Languages</div>
    </header>

    <section class="hero">
        <h1>Global Sovereign<br>Finance</h1>
        <p>전 세계 어디서나 안전하고 빠른 디지털 금융</p>
        <div class="services">
            <div class="service-card">
                <i>💸</i>
                <h3>송금</h3>
                <p>Remittance</p>
            </div>
            <div class="service-card">
                <i>💳</i>
                <h3>결제</h3>
                <p>Payment</p>
            </div>
            <div class="service-card">
                <i>🏦</i>
                <h3>예치</h3>
                <p>Deposit</p>
            </div>
        </div>
    </section>

    <div class="lang-bar">
        <div class="marquee">
            English • 한국어 • 日本語 • 中文 • Français • Deutsch • Español • Tiếng Việt • ภาษาไทย • Русский • ...and 20 more languages supported
        </div>
    </div>

</body>
</html>
