<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --hk-gold: #FFD700; --hk-dark: #000; --hk-green: #00FF00; --hk-blue: #007AFF; --hk-cyan: #00FFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; word-break: keep-all; outline: none; }
        body { background-color: var(--hk-dark); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 480px; padding: 20px; }

        /* 언어 선택 (15개국 국기) */
        .top-nav { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .lang-select { background: #111; color: var(--hk-gold); border: 1px solid var(--hk-gold); padding: 5px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }

        .brand { font-size: 32px; font-weight: 900; color: var(--hk-gold); margin: 20px 0; letter-spacing: -1px; text-align: center; }

        /* 자산 정보 */
        .asset-card { background: linear-gradient(180deg, #1a1a1a, #000); border-radius: 25px; padding: 40px 15px; text-align: center; border: 1px solid #333; margin-bottom: 25px; }
        .asset-val { font-size: 50px; font-weight: 900; margin: 10px 0; }
        .gcv-badge { display: inline-block; padding: 8px 20px; border-radius: 50px; border: 1.5px solid var(--hk-green); color: var(--hk-green); font-size: 15px; font-weight: bold; }

        /* 6구역 메뉴 */
        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .grid-box { background: #111; padding: 25px 5px; border-radius: 15px; text-align: center; border: 1px solid #222; cursor: pointer; }
        .grid-box i { font-size: 30px; margin-bottom: 10px; display: block; }
        .grid-box span { font-size: 14px; font-weight: bold; }

        /* SNS 버튼 */
        .sns-row { display: flex; gap: 10px; margin-bottom: 25px; }
        .sns-btn { flex: 1; padding: 15px; border-radius: 12px; text-decoration: none; color: #fff; text-align: center; font-weight: 900; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        .yt-bg { background: #f00; }
        .tk-bg { background: #000; border: 1px solid #444; }

        /* 보안 섹션 */
        .security-deep { background: rgba(255, 255, 255, 0.05); border: 1px solid #333; border-radius: 20px; padding: 20px; margin-bottom: 30px; text-align: left; }
        .sec-title { color: var(--hk-cyan); font-weight: 900; margin-bottom: 15px; font-size: 16px; }
        .sec-list { list-style: none; }
        .sec-list li { font-size: 13px; color: #eee; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 10px; }

        /* 모달 (결제 및 보안) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        .modal-box { background: #1a1a1a; width: 85%; max-width: 360px; padding: 30px; border-radius: 20px; border: 1px solid var(--hk-gold); text-align: center; }
        .modal-input { width: 100%; padding: 15px; margin-top: 10px; background:#000; border:1px solid #333; color:#fff; text-align:center; border-radius:10px; font-size:24px; font-weight:bold; }
        .pass-area { width: 100%; height: 100px; background:#000; color:var(--hk-gold); border:1px solid #444; border-radius:10px; padding:12px; font-size:14px; margin-top:15px; resize:none; }
        .confirm-btn { width: 100%; padding: 15px; background: var(--hk-gold); border: none; border-radius: 10px; font-weight: 900; margin-top: 20px; cursor: pointer; color: #000; font-size: 18px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-nav">
        <select class="lang-select" id="langSel">
            <option value="ko">한국어 🇰🇷</option><option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option><option value="ar">العربية 🇸🇦</option>
            <option value="hi">हिन्दी 🇮🇳</option><option value="es">Español 🇪🇸</option>
            <option value="pt">Português 🇧🇷</option><option value="uk">Українська 🇺🇦</option>
            <option value="ja">日本語 🇯🇵</option><option value="ru">Русский 🇷🇺</option>
            <option value="vi">Tiếng Việt 🇻🇳</option><option value="th">ไทย 🇹🇭</option>
            <option value="de">Deutsch 🇩🇪</option><option value="fr">Français 🇫🇷</option>
            <option value="it">Italiano 🇮🇹</option>
        </select>
    </div>

    <div class="brand">HK WORLD BANK</div>

    <div class="asset-card">
        <div style="color:var(--hk-gold); font-weight:bold; margin-bottom:10px;">메인 자산 통합 원장</div>
        <div class="asset-val">400.0212 <span style="color:var(--hk-gold); font-size:0.5em;">Pi</span></div>
        <div class="gcv-badge">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="grid-6">
        <div class="grid-box" onclick="alert('송금 시스템 가동 중')"><i class="fas fa-paper-plane" style="color:var(--hk-blue)"></i><span>송금</span></div>
        <div class="grid-box" onclick="openPay()"><i class="fas fa-shopping-cart" style="color:#FF9500"></i><span>결제</span></div>
        <div class="grid-box" onclick="alert('예치 페이지로 이동')"><i class="fas fa-piggy-bank" style="color:var(--hk-gold)"></i><span>예치</span></div>
        <div class="grid-box" onclick="alert('보상을 확인하세요')"><i class="fas fa-gift" style="color:#FF3B30"></i><span>보상</span></div>
        <div class="grid-box" onclick="alert('기본소득 지급 중')"><i class="fas fa-balance-scale" style="color:#AF52DE"></i><span>기본소득</span></div>
        <div class="grid-box" onclick="alert('스왑 기능을 실행합니다')"><i class="fas fa-rotate" style="color:var(--hk-cyan)"></i><span>스왑</span></div>
    </div>

    <div class="sns-row">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="sns-btn yt-bg"><i class="fab fa-youtube"></i> YOUTUBE</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="sns-btn tk-bg"><i class="fab fa-tiktok"></i> TIKTOK</a>
    </div>

    <div class="security-deep">
        <div class="sec-title">HK QUANTUM SHIELD ACTIVE</div>
        <ul class="sec-list">
            <li>개인정보보호법 준수: 양자 암호화 보안 적용</li>
            <li>자산 보호 프로토콜 가동 중</li>
            <li>HK-ROBOT: AI 실시간 위협 탐지 중</li>
        </ul>
    </div>
</div>

<div id="payModal" class="modal">
    <div class="modal-box">
        <h2 style="color:var(--hk-gold); margin-bottom:10px;">PI 결제</h2>
        <input type="number" id="payAmount" placeholder="0.00 Pi" class="modal-input">
        <button class="confirm-btn" onclick="goToAuth()">결제 승인</button>
        <p style="margin-top:15px; color:#555; cursor:pointer;" onclick="closeModal()">취소</p>
    </div>
</div>

<div id="authModal" class="modal">
    <div class="modal-box">
        <h2 style="color:var(--hk-gold); margin-bottom:5px;">보안 인증</h2>
        <p style="font-size:12px; color:#aaa;">24단어 비밀구절을 입력하세요</p>
        <textarea id="passphrase" class="pass-area" placeholder="계정 보안을 위해 비밀구절이 필요합니다"></textarea>
        <button class="confirm-btn" onclick="completePay()">인증 및 결제 완료</button>
        <p style="margin-top:15px; color:#555; cursor:pointer;" onclick="closeModal()">취소</p>
    </div>
</div>

<script>
    let testCount = 0;
    function openPay() { document.getElementById('payModal').style.display = 'flex'; }
    function closeModal() { 
        document.getElementById('payModal').style.display = 'none'; 
        document.getElementById('authModal').style.display = 'none'; 
    }
    
    function goToAuth() {
        if(document.getElementById('payAmount').value > 0) {
            document.getElementById('payModal').style.display = 'none';
            document.getElementById('authModal').style.display = 'flex';
        } else { alert('수량을 입력해 주세요'); }
    }

    function completePay() {
        const pass = document.getElementById('passphrase').value;
        const amt = document.getElementById('payAmount').value;
        if(pass.trim().length > 15) {
            testCount++;
            alert(amt + ' Test-Pi 결제 승인 완료 (테스트 ' + testCount + '/10회)');
            if(testCount >= 10) alert('10회 안정성 테스트를 모두 완료하였습니다');
            closeModal();
        } else { alert('정확한 비밀구절을 입력해 주세요'); }
    }
</script>
</body>
</html>
