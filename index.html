<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Oswald:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --gold: #FFD700; --green: #39FF14; --orange: #FF8C00; --white: #FFF; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--white); font-family: 'Noto Sans KR', sans-serif; display: flex; flex-direction: column; align-items: center; width: 100%; overflow-x: hidden; }
        .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; padding-bottom: 20px; }

        /* ✅ 초정밀 언어 선택 박스 (우측 상단) */
        .header-top { width: 100%; padding: 12px 15px 5px 0; display: flex; justify-content: flex-end; box-sizing: border-box; }
        .lang-border { border: 1px solid var(--gold); padding: 2px 4px; border-radius: 3px; background: rgba(255, 215, 0, 0.05); }
        .lang-select { background: transparent; color: var(--gold); border: none; font-size: 10px; font-weight: bold; outline: none; cursor: pointer; }

        .brand-title { font-family: 'Oswald', sans-serif; font-size: 34px; color: var(--gold); text-align: center; margin: 0; line-height: 1.1; letter-spacing: 0.5px; }
        .secure-node { color: var(--green); font-size: 10px; text-align: center; margin-bottom: 12px; font-weight: bold; }

        /* 메인 자산 섹션 */
        .asset-box { width: 92%; text-align: center; margin-bottom: 15px; position: relative; }
        .apr-tag { color: var(--green); font-weight: bold; font-size: 11px; position: absolute; right: 10px; top: -5px; }
        .ledger-label { color: var(--gold); font-size: 14px; margin-bottom: 5px; display: block; }
        .balance-main { font-size: 42px; font-weight: 800; margin: 8px 0; }
        .balance-main span { color: var(--orange); font-size: 20px; }
        .gcv-border { border: 1.5px solid var(--green); border-radius: 50px; padding: 8px; color: var(--green); font-weight: bold; font-size: 14px; display: inline-block; width: 88%; box-sizing: border-box; }

        /* ✅ 6대 메뉴 (사진과 동일 아이콘 구성) */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 92%; margin: 20px 0; }
        .menu-item { text-align: center; }
        .menu-item i { font-size: 24px; color: #4facfe; margin-bottom: 8px; display: block; } /* 사진 속 푸른빛 아이콘 재현 */
        .menu-item .fa-gift { color: #ff4d4d; } /* 보상은 붉은색 */
        .menu-item .fa-scale-balanced { color: var(--gold); } /* 소득은 금색 */
        .menu-item .fa-rotate { color: #00e5ff; } /* 스왑은 하늘색 */
        .menu-item span { font-size: 11px; color: #fff; font-weight: bold; }

        /* 유동성 섹션 */
        .liquidity-box { width: 90%; padding-left: 12px; border-left: 4px solid var(--gold); align-self: flex-start; margin-left: 5%; margin-bottom: 15px; }
        .liq-label { color: var(--orange); font-size: 14px; font-weight: bold; margin-bottom: 4px; }
        .liq-amount { font-size: 24px; font-weight: bold; letter-spacing: 0.5px; }
        .shield-status { color: #00e5ff; font-size: 11px; font-weight: bold; margin-top: 4px; }

        /* 하단 버튼 */
        .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 92%; margin-bottom: 15px; }
        .btn { padding: 11px 0; border-radius: 7px; font-weight: bold; font-size: 12px; border: none; color: #fff; cursor: pointer; }
        .btn-dark { background: #1a1a1a; border: 1px solid var(--gold); }
        .btn-orange { background: var(--orange); }
        .btn-green { background: #28a745; }

        /* ✅ 슬림 고객센터 배너 (배너 축소 요청 반영) */
        .cs-slim-banner { width: 92%; background: linear-gradient(to right, #ff4e50, #f9d423); color: #fff; padding: 8px; border-radius: 6px; text-align: center; font-weight: bold; text-decoration: none; font-size: 13px; display: block; margin-bottom: 8px; }
        .official-email { font-size: 11px; color: #aaa; text-align: center; margin-bottom: 15px; }

        .sns-box { display: flex; justify-content: center; gap: 40px; width: 92%; }
        .sns-link { text-align: center; text-decoration: none; color: #fff; }
        .sns-link i { font-size: 28px; margin-bottom: 5px; }

        footer { margin-top: 25px; text-align: center; font-size: 8.5px; color: #444; line-height: 1.5; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div class="container">
    <header class="header-top">
        <div class="lang-border">
            <select class="lang-select" onchange="changeLanguage(this.value)">
                <option value="KO">KR (한국어)</option>
                <option value="EN">EN (English)</option>
                <option value="JP">JP (日本語)</option>
                <option value="CN">CN (简体中文)</option>
            </select>
        </div>
    </header>

    <h1 class="brand-title" id="txt-title">HK WORLD BANK</h1>
    <div class="secure-node">🚀 SECURE NODE: HK-V190-SUPREME</div>

    <div class="asset-box">
        <div class="apr-tag">APR 31.4%</div>
        <span class="ledger-label" id="txt-ledger">메인 자산 통합 원장</span>
        <div class="balance-main">400.0000 <span>Pi</span></div>
        <div class="gcv-border" id="txt-gcv">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><i class="fa-solid fa-plane-departure"></i><span id="m1">송금</span></div>
        <div class="menu-item"><i class="fa-solid fa-bag-shopping"></i><span id="m2">결제</span></div>
        <div class="menu-item"><i class="fa-solid fa-image"></i><span id="m3">예치</span></div>
        <div class="menu-item"><i class="fa-solid fa-gift"></i><span id="m4">보상</span></div>
        <div class="menu-item"><i class="fa-solid fa-scale-balanced"></i><span id="m5">소득</span></div>
        <div class="menu-item"><i class="fa-solid fa-rotate"></i><span id="m6">스왑</span></div>
    </div>

    <div class="liquidity-box">
        <div class="liq-label" id="txt-liq-label">유동성 풀 총액 ($)</div>
        <div class="liq-amount">88,401,773,756</div>
        <div class="shield-status" id="txt-shield">HK_퀀텀_쉴드_시스템_작동중</div>
    </div>

    <div class="btn-group">
        <button class="btn btn-dark" id="b1">Pi 수량</button>
        <button class="btn btn-orange" id="b2">SWAP</button>
        <button class="btn btn-green" id="b3">LP 공급</button>
    </div>

    <a href="#" class="cs-slim-banner" id="txt-cs">🎧 24/7 글로벌 고객지원센터</a>
    <div class="official-email">공식 문의: info@hkwb.co.kr</div>

    <div class="sns-box">
        <a href="#" class="sns-link"><i class="fa-brands fa-youtube" style="color:#ff0000;"></i></a>
        <a href="#" class="sns-link"><i class="fa-brands fa-tiktok"></i></a>
    </div>

    <footer>
        © 2026 HK GROUP GLOBAL HEGEMONY.<br>
        CHAIRMAN LEE JAEWAN. ALL RIGHTS RESERVED.
    </footer>
</div>

<script>
    // ✅ 언어 변동 엔진 (즉각 변환)
    function changeLanguage(lang) {
        const translations = {
            'KO': { ledger: '메인 자산 통합 원장', gcv: '가치 평가: $ 125,663,600 (GCV)', m1: '송금', m2: '결제', m3: '예치', m4: '보상', m5: '소득', m6: '스왑', liq: '유동성 풀 총액 ($)', shield: 'HK_퀀텀_쉴드_시스템_작동중', cs: '🎧 24/7 글로벌 고객지원센터', b1: 'Pi 수량' },
            'EN': { ledger: 'Main Asset Ledger', gcv: 'Value: $ 125,663,600 (GCV)', m1: 'Send', m2: 'Pay', m3: 'Staking', m4: 'Reward', m5: 'Income', m6: 'Swap', liq: 'Total Liquidity ($)', shield: 'HK_Quantum_Shield_Active', cs: '🎧 24/7 Global Support', b1: 'Pi Qty' },
            'JP': { ledger: 'メイン資産統合台帳', gcv: '評価額: $ 125,663,600 (GCV)', m1: '送金', m2: '決済', m3: '預金', m4: '報酬', m5: '所得', m6: 'スワップ', liq: '流動性プール総額 ($)', shield: 'HK_クォンタム_シールド_稼동中', cs: '🎧 24/7 グローバルサポート', b1: 'Pi 数量' },
            'CN': { ledger: '主资产合并账本', gcv: '估值: $ 125,663,600 (GCV)', m1: '转账', m2: '支付', m3: '存款', m4: '奖励', m5: '收益', m6: '交换', liq: '流动性池总额 ($)', shield: 'HK_量子屏蔽_运行中', cs: '🎧 24/7 全球客服中心', b1: 'Pi 数量' }
        };
        const t = translations[lang];
        document.getElementById('txt-ledger').innerText = t.ledger;
        document.getElementById('txt-gcv').innerText = t.gcv;
        document.getElementById('m1').innerText = t.m1; document.getElementById('m2').innerText = t.m2;
        document.getElementById('m3').innerText = t.m3; document.getElementById('m4').innerText = t.m4;
        document.getElementById('m5').innerText = t.m5; document.getElementById('m6').innerText = t.m6;
        document.getElementById('txt-liq-label').innerText = t.liq;
        document.getElementById('txt-shield').innerText = t.shield;
        document.getElementById('txt-cs').innerText = t.cs;
        document.getElementById('b1').innerText = t.b1;
    }
</script>
</body>
</html>
