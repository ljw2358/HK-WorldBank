<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WorldBank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --hk-gold: #FFD700;
            --hk-dark: #000000;
            --hk-gray: #1a1a1a;
            --hk-red: #FF0000;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--hk-dark);
            color: white;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            -webkit-user-select: none;
        }

        /* 언어 선택 상단 바 */
        .top-nav {
            display: flex;
            justify-content: flex-end;
            padding: 10px 15px;
            background: #111;
        }
        .lang-select {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }

        /* 헤더 섹션 */
        header {
            text-align: center;
            padding: 30px 20px;
        }
        .brand-name {
            font-size: 28px;
            font-weight: 900;
            color: var(--hk-gold);
            letter-spacing: -1px;
            margin-bottom: 5px;
        }
        .sub-text {
            font-size: 13px;
            color: #888;
            letter-spacing: 1px;
        }

        /* 메인 자산 카드 (스크린샷 반영) */
        .asset-card {
            margin: 0 20px;
            padding: 25px;
            background: linear-gradient(145deg, #111, #222);
            border-radius: 20px;
            text-align: center;
            border: 1px solid #333;
        }
        .asset-title { font-size: 14px; color: #aaa; margin-bottom: 10px; }
        .asset-value { font-size: 36px; font-weight: bold; color: white; }
        .asset-unit { color: var(--hk-gold); margin-left: 5px; }
        .gcv-box {
            display: inline-block;
            margin-top: 15px;
            padding: 5px 15px;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            border-radius: 20px;
            color: #00ff00;
            font-size: 14px;
        }

        /* 버튼 그리드 */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 20px;
        }
        .menu-item {
            background: #1a1a1a;
            padding: 15px 5px;
            border-radius: 10px;
            text-align: center;
            font-size: 12px;
            border: 1px solid #222;
        }
        .menu-item i { display: block; font-size: 20px; margin-bottom: 8px; color: var(--hk-gold); }

        /* 스테이킹 정보 */
        .staking-info {
            margin: 0 20px;
            padding: 15px;
            border-left: 4px solid var(--hk-gold);
            background: #111;
        }
        .staking-info div { font-size: 12px; color: var(--hk-gold); font-weight: bold; }
        .staking-info h2 { margin: 5px 0; font-size: 24px; }

        /* 하단 액션 버튼 */
        .action-btns {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 14px;
        }
        .btn-white { background: white; color: black; }
        .btn-gold { background: var(--hk-gold); color: black; }
        .btn-green { background: #00c853; color: white; }

        /* 유튜브 & 틱톡 섹션 */
        .social-section {
            padding: 20px;
            display: flex;
            gap: 10px;
        }
        .social-btn {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: bold;
            color: white;
        }
        .yt-btn { background: var(--hk-red); }
        .tt-btn { background: #000; border: 1px solid #444; }
        .social-btn i { margin-right: 8px; font-size: 18px; }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 11px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <select class="lang-select">
            <option>KR 🇰🇷</option>
            <option>EN 🇺🇸</option>
            <option>JP 🇯🇵</option>
        </select>
    </div>

    <header>
        <div class="brand-name">HK WORLD BANK</div>
        <div class="sub-text">GLOBAL INDUSTRIAL LEADER</div>
    </header>

    <div class="asset-card">
        <div class="asset-title">메인 자산 통합 원장</div>
        <div class="asset-value">400.0212<span class="asset-unit">Pi</span></div>
        <div class="gcv-box">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><i class="fas fa-paper-plane"></i>송금</div>
        <div class="menu-item"><i class="fas fa-shopping-cart"></i>결제</div>
        <div class="menu-item"><i class="fas fa-coins"></i>예치</div>
        <div class="menu-item"><i class="fas fa-gift"></i>보상</div>
        <div class="menu-item"><i class="fas fa-balance-scale"></i>기본소득</div>
        <div class="menu-item"><i class="fas fa-sync"></i>스왑</div>
    </div>

    <div class="staking-info">
        <div>STAKING 31.4% | 유동성 풀 $</div>
        <h2>88,401,819,601</h2>
    </div>

    <div class="action-btns">
        <button class="btn btn-white">PI 수량</button>
        <button class="btn btn-gold">SWAP</button>
        <button class="btn btn-green">LP 공급</button>
    </div>

    <div class="social-section">
        <a href="https://www.youtube.com/@유튜브아이디" class="social-btn yt-btn">
            <i class="fab fa-youtube"></i> YOUTUBE
        </a>
        <a href="https://www.tiktok.com/@틱톡아이디" class="social-btn tt-btn">
            <i class="fab fa-tiktok"></i> TIKTOK
        </a>
    </div>

    <footer>
        &copy; 2026 HK GROUP. All Rights Reserved.<br>
        Powered by HK-WorldBank Ecosystem
    </footer>

</body>
</html>
