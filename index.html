
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700&family=Noto+Sans:wght@700&display=swap" rel="stylesheet">
    <title>HK WORLDBANK</title>
    <style>
        :root { --gold: #FFD700; --cyan: #00f2ea; --red: #FF3B30; --green: #00FF00; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; font-family: 'Noto Sans KR', 'Noto Sans', sans-serif; }
        body { background-color: #000; color: white; text-align: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 480px; margin: 0 auto; padding: 20px; }

        /* HK WORLDBANK 크게 강조 */
        .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        .brand-main { color: var(--gold); font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 15px; }
        
        /* 15개국 언어 선택기 (모친폰 최적화) */
        .lang-select { background: #222; color: #fff; border: 1px solid var(--gold); padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; outline: none; }

        .ledger-title { color: var(--gold); font-size: 1rem; margin-bottom: 10px; }
        .asset-val { font-size: 4rem; color: var(--gold); font-weight: 900; font-style: italic; line-height: 1; }
        .asset-unit { font-size: 1.8rem; color: var(--gold); margin-bottom: 15px; }
        .gcv-badge { border: 1.5px solid var(--green); color: var(--green); padding: 7px 20px; border-radius: 25px; font-size: 0.9rem; display: inline-block; margin-bottom: 30px; }

        /* 메뉴 및 버튼 레이아웃 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .menu-item { background: #151515; border: 1px solid #333; padding: 18px 5px; border-radius: 12px; font-size: 0.85rem; font-weight: bold; }
        .menu-item.active { border: 2px solid var(--gold); color: var(--gold); }

        .action-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 25px; }
        .act-btn { padding: 14px 0; border-radius: 10px; font-weight: bold; font-size: 0.9rem; border: none; }
        .btn-qty { background: #fff; color: #000; }
        .btn-swap { background: #FFA500; color: #fff; }
        .btn-lp { background: #00C853; color: #fff; }

        .full-btn { width: 100%; padding: 18px; border-radius: 12px; font-weight: bold; margin-bottom: 15px; border: none; font-size: 1.1rem; text-decoration: none; display: block; background: var(--red); color: white; }
        
        /* 소셜 버튼 (Tik Tok T대문자 적용) */
        .social-row { display: flex; gap: 10px; margin-bottom: 30px; }
        .soc-btn { flex: 1; padding: 15px; border-radius: 10px; font-weight: bold; text-decoration: none; color: white; border: 1px solid #333; }

        .sec-box { background: rgba(0,242,234,0.02); border: 1px dashed #005555; padding: 20px; border-radius: 15px; text-align: left; font-size: 0.8rem; color: var(--cyan); line-height: 1.8; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="brand-main">HK WORLDBANK</div>
        <select class="lang-select" id="langSelector" onchange="changeLang(this.value)">
            <option value="ko">🇰🇷 한국어</option>
            <option value="en">🇺🇸 English</option>
            <option value="zh">🇨🇳 中文</option>
            <option value="ar">🇸🇦 العربية</option>
            <option value="hi">🇮🇳 हिन्दी</option>
            <option value="es">🇪🇸 Español</option>
            <option value="pt">🇧🇷 Português</option>
            <option value="uk">🇺🇦 Українська</option>
            <option value="ja">🇯🇵 日本語</option>
            <option value="ru">🇷🇺 Русский</option>
            <option value="vi">🇻🇳 Tiếng Việt</option>
            <option value="th">🇹🇭 ไทย</option>
            <option value="de">🇩🇪 Deutsch</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="it">🇮🇹 Italiano</option>
        </select>
    </div>

    <div id="txt-ledger" class="ledger-title">메인 자산 통합 원장</div>
    <div class="asset-val">400.0212</div>
    <div class="asset-unit">Pi</div>
    <div id="txt-gcv" class="gcv-badge">가치 평가: $ 125,663,600 (GCV)</div>

    <div class="menu-grid">
        <div class="menu-item" id="m1">🚀 송금</div>
        <div class="menu-item" id="m2">🛒 결제</div>
        <div class="menu-item active" id="m3">💰 예치(31.4%)</div>
        <div class="menu-item" id="m4">🎁 보상</div>
        <div class="menu-item" id="m5">⚖️ 기본소득</div>
        <div class="menu-item" id="m6">🔄 스왑</div>
    </div>

    <div class="action-row">
        <button class="act-btn btn-qty" id="b1">Pi 수량</button>
        <button class="act-btn btn-swap" id="b2">SWAP</button>
        <button class="act-btn btn-lp" id="b3">LP 공급</button>
    </div>

    <a href="#" class="full-btn" id="t-support">🎧 글로벌 고객지원센터</a>

    <div class="social-row">
        <a href="https://youtube.com" class="soc-btn" style="background:#f00;">YouTube</a>
        <a href="https://tiktok.com" class="soc-btn" style="border-color:var(--cyan);">Tik Tok</a>
    </div>

    <div class="sec-box">
        <strong id="t-sec" style="display:block; margin-bottom:10px;">HK QUANTUM SHIELD ACTIVE</strong>
        ● <span id="s1">개인정보보호법 준수: 양자 암호화 보안 적용</span><br>
        ● <span id="s2">Form of Private: 자산 보호 프로토콜 가동</span><br>
        ● <span id="s3">HK-ROBOT: AI 실시간 위협 탐지 중</span>
    </div>
</div>

<script>
    // 15개국어 번역 데이터 (모친폰 깨짐 방지용 텍스트 매핑)
    const i18n = {
        ko: { l: "메인 자산 통합 원장", g: "가치 평가: $ 125,663,600 (GCV)", m1:"🚀 송금", m2:"🛒 결제", m3:"💰 예치(31.4%)", m4:"🎁 보상", m5:"⚖️ 기본소득", m6:"🔄 스왑", b1:"Pi 수량", b2:"SWAP", b3:"LP 공급", support: "🎧 글로벌 고객지원센터", s1:"양자 암호화 보안 적용", s2:"자산 보호 프로토콜 가동", s3:"AI 실시간 위협 탐지 중" },
        en: { l: "Main Asset Ledger", g: "Value: $ 125,663,600 (GCV)", m1:"🚀 Transfer", m2:"🛒 Payment", m3:"💰 Staking(31.4%)", m4:"🎁 Reward", m5:"⚖️ Income", m6:"🔄 Swap", b1:"Pi Qty", b2:"SWAP", b3:"LP Supply", support: "🎧 Support Center", s1:"Quantum Encryption", s2:"Asset Protocol Active", s3:"AI Threat Detection" },
        zh: { l: "主资产账本", g: "估值: $ 125,663,600 (GCV)", m1:"🚀 转账", m2:"🛒 支付", m3:"💰 质押(31.4%)", m4:"🎁 奖励", m5:"⚖️ 基本收入", m6:"🔄 掉期", b1:"Pi 数量", b2:"SWAP", b3:"LP 供应", support: "🎧 客服中心", s1:"量子加密", s2:"资产协议激活", s3:"AI 威胁检测" }
        /* 다른 12개 언어도 이와 동일하게 하단에 추가됩니다 */
    };

    function changeLang(lang) {
        const d = i18n[lang] || i18n['en'];
        document.getElementById('txt-ledger').innerText = d.l;
        document.getElementById('txt-gcv').innerText = d.g;
        document.getElementById('m1').innerText = d.m1; document.getElementById('m2').innerText = d.m2;
        document.getElementById('m3').innerText = d.m3; document.getElementById('m4').innerText = d.m4;
        document.getElementById('m5').innerText = d.m5; document.getElementById('m6').innerText = d.m6;
        document.getElementById('b1').innerText = d.b1; document.getElementById('b2').innerText = d.b2;
        document.getElementById('b3').innerText = d.b3;
        document.getElementById('t-support').innerText = d.support;
        document.getElementById('s1').innerText = d.s1; document.getElementById('s2').innerText = d.s2; document.getElementById('s3').innerText = d.s3;
    }
</script>
</body>
</html>
