<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK GLOBAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .gradient-border { border: 2px solid; border-image: linear-gradient(to right, #00ff00, #008000) 1; }
        .btn-card { background-color: #1a1a1a; border-radius: 12px; transition: 0.3s; }
        .btn-card:hover { background-color: #333; transform: translateY(-2px); }
        .gcv-tag { color: #00ff00; border: 1px solid #00ff00; border-radius: 20px; padding: 2px 12px; font-size: 0.8rem; }
        .staking-info { border-left: 4px solid #f1c40f; padding-left: 10px; }
        #language-select { background: #1a1a1a; color: white; border: 1px solid #333; font-size: 0.75rem; }
    </style>
</head>
<body class="max-w-md mx-auto pb-10">

    <header class="p-4 flex justify-between items-center">
        <h1 class="text-xl font-black text-yellow-500 tracking-tighter">HK WORLD BANK</h1>
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-globe text-sm"></i>
            <select id="language-select" class="rounded px-1 py-0.5">
                <option value="en">EN</option>
                <option value="ko">KR</option>
                <option value="zh">CN</option>
                <option value="ar">AR</option>
                <option value="hi">IN</option>
                <option value="es">ES</option>
                <option value="pt">BR</option>
                <option value="uk">UA</option>
                <option value="ja">JP</option>
                <option value="ru">RU</option>
                <option value="vi">VN</option>
                <option value="th">TH</option>
                <option value="de">DE</option>
                <option value="fr">FR</option>
                <option value="it">IT</option>
                </select>
        </div>
    </header>

    <section class="px-6 py-4 text-center">
        <p class="text-gray-400 text-sm mb-1">메인 자산 통합 원장</p>
        <h2 class="text-5xl font-bold mb-2">400.0212 <span class="text-2xl text-yellow-500">Pi</span></h2>
        <div class="inline-block gcv-tag font-bold">가치 평가: $ 125,663,600 (GCV)</div>
    </section>

    <section class="grid grid-cols-3 gap-3 px-4 mt-6">
        <button class="btn-card p-4 flex flex-col items-center">
            <i class="fa-solid fa-rocket text-red-500 mb-2"></i>
            <span class="text-xs">송금</span>
        </button>
        <button class="btn-card p-4 flex flex-col items-center">
            <i class="fa-solid fa-cart-shopping text-gray-400 mb-2"></i>
            <span class="text-xs">결제</span>
        </button>
        <button class="btn-card p-4 flex flex-col items-center">
            <i class="fa-solid fa-piggy-bank text-yellow-500 mb-2"></i>
            <span class="text-xs font-bold text-yellow-500">예치</span>
        </button>
        <button class="btn-card p-4 flex flex-col items-center">
            <i class="fa-solid fa-gift text-red-400 mb-2"></i>
            <span class="text-xs">보상</span>
        </button>
        <button class="btn-card p-4 flex flex-col items-center">
            <i class="fa-solid fa-scale-balanced text-blue-400 mb-2"></i>
            <span class="text-xs text-nowrap">기본소득</span>
        </button>
        <button class="btn-card p-4 flex flex-col items-center">
            <i class="fa-solid fa-rotate text-cyan-400 mb-2"></i>
            <span class="text-xs">스왑</span>
        </button>
    </section>

    <section class="mt-8 px-6">
        <div class="staking-info mb-4">
            <p class="text-yellow-500 text-xs font-bold uppercase tracking-widest">Staking 31.4% | 유동성 풀 $</p>
            <h3 class="text-3xl font-bold tracking-tight">88,401,819,601</h3>
        </div>
        
        <div class="flex gap-2 mb-4">
            <button class="flex-1 bg-white text-black font-bold py-3 rounded-lg text-sm">Pi 수량</button>
            <button class="flex-1 bg-yellow-500 text-black font-bold py-3 rounded-lg text-sm">SWAP</button>
            <button class="flex-1 bg-green-500 text-white font-bold py-3 rounded-lg text-sm text-nowrap px-1">LP 공급</button>
        </div>
    </section>

    <section class="px-4 mb-4">
        <button class="w-full bg-red-500 py-4 rounded-xl flex justify-center items-center gap-2 font-bold shadow-lg shadow-red-900/20">
            <i class="fa-solid fa-headset"></i>
            글로벌 고객지원센터
        </button>
    </section>

    <section class="px-4 flex gap-2">
        <a href="#" class="flex-1 bg-red-600 py-3 rounded-lg flex justify-center items-center gap-2 font-bold uppercase italic tracking-tighter">
            <i class="fa-brands fa-youtube"></i> YOUTUBE
        </a>
        <a href="#" class="flex-1 bg-black border border-gray-700 py-3 rounded-lg flex justify-center items-center gap-2 font-bold uppercase tracking-tighter">
            <i class="fa-brands fa-tiktok"></i> TIKTOK
        </a>
    </section>

    <footer class="mt-10 px-6 text-center text-[10px] text-gray-500">
        <p class="mb-2">© 2026 HK GROUP GLOBAL MANAGEMENT GROUP</p>
        <p class="mb-4">CHAIRMAN LEE JAE-WAN [HK-FIGURE]</p>
        <div class="flex justify-center items-center gap-2 text-cyan-400 font-bold border border-cyan-900/50 py-2 rounded-full bg-cyan-950/10">
            <i class="fa-solid fa-shield-halved"></i>
            HK_QUANTUM_SHIELD_ACTIVE
        </div>
        <p class="mt-4 opacity-50">본 플랫폼은 개인정보보호법 및 퀀텀 암호화 보안 체계를 준수합니다.</p>
    </footer>

</body>
</html>
