<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - Global Alpha</title>
    <style>
        :root {
            --bg: #000000;
            --card: #111111;
            --gold: #FFD700;
            --neon-st: #00FFCC; /* 스테이킹 칼라 */
            --neon-lp: #FF00FF; /* 유동성 수익 칼라 */
            --neon-green: #39FF14;
            --neon-blue: #00BFFF;
        }

        body {
            margin: 0; padding: 0; background: var(--bg); color: white;
            font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; }

        /* 다국어 선택기 */
        .lang-bar { text-align: right; margin-bottom: 20px; }
        #langSelect { 
            background: #222; color: var(--gold); border: 2px solid var(--gold); 
            padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        header { text-align: center; margin-bottom: 25px; }
        .title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; }
        #txt-ledger { color: #888; margin-top: 10px; font-size: 0.9rem; }

        /* 1, 2. 실시간 스테이킹/유동성 수익 문구 칼라화 */
        .rate-grid { display: flex; gap: 10px; margin-bottom: 15px; }
        .rate-card { flex: 1; background: var(--card); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #222; }
        .st-label { color: var(--neon-st); font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; text-shadow: 0 0 5px var(--neon-st); }
        .lp-label { color: var(--neon-lp); font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; text-shadow: 0 0 5px var(--neon-lp); }
        .st-val { color: var(--neon-st); font-size: 1.6rem; font-weight: bold; }
        .lp-val { color: var(--neon-lp); font-size: 1.6rem; font-weight: bold; }

        /* 전체 유동성 LP 공급 */
        .lp-total-box { border: 2px solid var(--neon-green); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; }
        #lp-total-num { color: var(--neon-green); font-size: 1.8rem; font-weight: 1000; }

        /* 고객지원센터 버튼 */
        .center-btn {
            width: 100%; background: #222; color: white; padding: 18px; border-radius: 15px;
            border: 2px solid var(--gold); font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 15px;
        }

        /* 3, 9. FAQ 1~11번 노출 */
        .faq-section { display: none; background: #111; border-radius: 20px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .faq-item { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .faq-q { color: var(--gold); font-weight: bold; font-size: 0.95rem; margin-bottom: 8px; }
        .faq-a { color: #ccc; font-size: 0.85rem; line-height: 1.5; }

        /* 소셜 미디어 */
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .soc-btn { padding: 14px; border-radius: 10px; text-align: center; text-decoration: none; color: white; font-weight: bold; }

        /* 4. AI 비서 (인사말 빼고 AI만 노출) */
        #ai-bot {
            position: fixed; bottom: 40px; right: 20px; width: 65px; height: 65px;
            background: #FF00FF; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-weight: bold; box-shadow: 0 0 20px #FF00FF;
            cursor: pointer; z-index: 1000; animation: float 3s infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        
        /* 메시지 입력창 */
        #chat-box {
            display: none; position: fixed; bottom: 120px; right: 20px; width: 280px;
            background: white; border-radius: 15px; padding: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }
        #chat-box input { width: 100%; border: 1px solid #ddd; padding: 10px; border-radius: 8px; box-sizing: border-box; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select id="langSelect" onchange="changeLanguage()">
            <option value="ko">한국어 🇰🇷</option>
            <option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option>
            <option value="ja">日本語 🇯🇵</option>
            <option value="vi">Tiếng Việt 🇻🇳</option>
            </select>
    </div>

    <header>
        <h1 class="title">HK WORLD BANK</h1>
        <div id="txt-ledger">메인 자산 통합 원장</div>
        <div style="font-size: 2.8rem; font-weight: bold; margin: 10px 0;">412.5545 <span style="color:var(--gold)">Pi</span></div>
        <div style="background: var(--neon-green); color: black; padding: 5px 15px; border-radius: 50px; display: inline-block; font-weight: bold;">Value: $ 314,159 (GCV)</div>
    </header>

    <div class="rate-grid">
        <div class="rate-card">
            <div id="txt-st-label" class="st-label">실시간 스테이킹 이율</div>
            <div class="st-val" id="live-st">17.38%</div>
        </div>
        <div class="rate-card">
            <div id="txt-lp-label" class="lp-label">실시간 유동성 수익</div>
            <div class="lp-val" id="live-lp">24.44%</div>
        </div>
    </div>

    <div class="lp-total-box">
        <div id="txt-total-lp" style="font-size:0.9rem; margin-bottom:10px;">전체 유동성 LP 공급</div>
        <div id="lp-total-num">$ 88,429,580,205</div>
    </div>

    <button class="center-btn" id="txt-center-btn" onclick="toggleFaq()">글로벌 AI 고객지원센터</button>

    <div class="faq-section" id="faqBox">
        <div id="faq-list">
            </div>
        <p style="text-align:center; font-size:0.85rem; color:var(--neon-blue); margin-top:20px; font-weight:bold;">Support@hkwb.ai.kr</p>
    </div>

    <div class="social-grid">
        <a href="https://www.youtube.com/@Hyekong2025" class="soc-btn" style="background:#FF0000">YOUTUBE</a>
        <a href="https://www.tiktok.com/@hyekong2025" class="soc-btn" style="background:#333; border:1px solid #444">TIKTOK</a>
    </div>
</div>

<div id="ai-bot" onclick="openChat()">AI</div>

<div id="chat-box">
    <div id="txt-ai-ask" style="color:black; font-weight:bold; margin-bottom:10px; font-size:0.9rem;">무엇을 도와 드릴까요?</div>
    <input type="text" id="userMsg" placeholder="Message...">
    <button onclick="closeChat()" style="margin-top:10px; width:100%; padding:8px; background:#111; color:white; border:none; border-radius:5px; cursor:pointer;">Close</button>
</div>

<script>
    // 5, 6, 7. 글로벌 언어 팩 (1~11 FAQ 포함)
    const i18n = {
        ko: {
            ledger: "메인 자산 통합 원장", st: "실시간 스테이킹 이율", lp: "실시간 유동성 수익", total: "전체 유동성 LP 공급",
            center: "글로벌 AI 고객지원센터", ai: "무엇을 도와 드릴까요?",
            faqs: [
                {q: "1. 현재 시스템의 구동 환경은?", a: "본 플랫폼은 현재 테스트 파이(Test-Pi) 기반으로 최적화 구동 중입니다."},
                {q: "2. 계정 보안은 안전한가요?", a: "HK 양자 방패 시스템이 24시간 실시간으로 자산을 보호합니다."},
                {q: "3. 노드 운영 수익 지급 방식은?", a: "메인넷 연동 후 자동 스마트 계약에 의해 실시간 정산됩니다."},
                {q: "4. 입출금 수수료 정책", a: "파이 네트워크 표준 프로토콜에 따라 최소한의 수수료가 적용됩니다."},
                {q: "5. 글로벌 파이 결제 매장 안내", a: "HK 월드뱅크 제휴 매장에서 즉시 결제가 가능하도록 준비 중입니다."},
                {q: "6. HK 양자 방패 V30의 특징", a: "양자 컴퓨터의 공격을 방어하는 최신 암호화 알고리즘입니다."},
                {q: "7. 스테이킹 기간 설정", a: "유연한 스테이킹 정책으로 기간별 가중 수익을 제공합니다."},
                {q: "8. 유동성 풀(LP) 참여 방법", a: "자산 탭에서 유동성 공급 버튼을 통해 쉽게 참여 가능합니다."},
                {q: "9. 고객센터 운영 시간", a: "AI 기반 글로벌 센터로 24시간 전 세계 언어 대응 중입니다."},
                {q: "10. Pi 네트워크 생태계 기여", a: "HK 그룹은 파이의 유틸리티 확장을 최우선 목표로 합니다."},
                {q: "11. UBI재원과 이율 재원은 어떻게 만드나요?", a: "독자적인 유동성 알고리즘과 글로벌 AI 인프라 수익 모델을 결합하여 창출하며, 이는 혜공 형님의 핵심 금융 공학 설계입니다."}
            ]
        },
        en: {
            ledger: "Main Asset Ledger", st: "Staking APR", lp: "Liquidity Yield", total: "Total LP Supply",
            center: "Global AI Support Center", ai: "How can I help you?",
            faqs: [
                {q: "1. Operating Environment", a: "Currently optimized for the Test-Pi network."},
                {q: "11. How to create UBI funds?", a: "Created by combining unique liquidity algorithms and global AI models. This is Hyekong's core financial engineering."}
            ]
        }
    };

    function changeLanguage() {
        const lang = document.getElementById('langSelect').value;
        const d = i18n[lang] || i18n.en;

        document.getElementById('txt-ledger').innerText = d.ledger;
        document.getElementById('txt-st-label').innerText = d.st;
        document.getElementById('txt-lp-label').innerText = d.lp;
        document.getElementById('txt-total-lp').innerText = d.total;
        document.getElementById('txt-center-btn').innerText = d.center;
        document.getElementById('txt-ai-ask').innerText = d.ai;

        const list = document.getElementById('faq-list');
        list.innerHTML = "";
        d.faqs.forEach(f => {
            list.innerHTML += `<div class="faq-item"><div class="faq-q">${f.q}</div><div class="faq-a">${f.a}</div></div>`;
        });
    }

    function toggleFaq() {
        const box = document.getElementById('faqBox');
        box.style.display = (box.style.display === 'block') ? 'none' : 'block';
    }

    function openChat() {
        document.getElementById('chat-box').style.display = 'block';
        document.getElementById('userMsg').focus();
    }

    function closeChat() {
        document.getElementById('chat-box').style.display = 'none';
    }

    // 2초마다 실시간 수치 변동
    setInterval(() => {
        document.getElementById('live-st').innerText = (17 + Math.random()).toFixed(2) + '%';
        document.getElementById('live-lp').innerText = (24 + Math.random()).toFixed(2) + '%';
        let val = 88429580205 + Math.floor(Math.random() * 80000);
        document.getElementById('lp-total-num').innerText = '$ ' + val.toLocaleString();
    }, 2000);

    // 초기 언어 설정
    changeLanguage();
</script>
</body>
</html>
