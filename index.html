<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --y: #f39c12; --gold: #ffd700; --green: #00ff00; --dark: #000; }
        body { background: var(--dark); color: #fff; font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .main-container { width: 100%; max-width: 450px; min-height: 100vh; background: #000; padding: 20px; box-sizing: border-box; }

        /* 헤더 영역 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { color: var(--y); font-size: 24px; font-weight: 900; }
        .lang-btn { border: 1px solid var(--y); color: var(--y); padding: 5px 15px; border-radius: 10px; font-size: 12px; }

        /* 메인 자산 카드 */
        .asset-card { background: #111; border-radius: 30px; padding: 30px 20px; text-align: center; border: 1px solid #222; margin-bottom: 25px; }
        .node-info { color: var(--green); font-size: 12px; font-weight: bold; text-align: left; margin-bottom: 20px; display: flex; align-items: center; }
        .asset-title { color: var(--y); font-size: 16px; margin-bottom: 15px; }
        .pi-val { font-size: 45px; font-weight: 900; color: #fff; border-bottom: 2px solid var(--y); display: inline-block; padding-bottom: 5px; }
        .pi-val span { color: var(--y); font-size: 30px; margin-left: 10px; }
        .gcv-box { border: 2px solid var(--green); border-radius: 50px; padding: 15px; margin-top: 25px; color: var(--green); font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .gcv-box:active { background: rgba(0, 255, 0, 0.1); }

        /* 아이콘 그리드 */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .item { background: #111; border-radius: 20px; padding: 20px 10px; text-align: center; cursor: pointer; border: 1px solid #222; }
        .item:active { border-color: var(--y); }
        .item .icon { font-size: 25px; display: block; margin-bottom: 10px; }
        .item .label { font-size: 14px; color: #fff; font-weight: bold; }

        /* 하단 유동성 풀 정보 */
        .staking-info { border-left: 4px solid var(--y); padding-left: 15px; text-align: left; margin-top: 30px; }
        .apr { color: var(--y); font-size: 18px; font-weight: 900; margin-bottom: 5px; }
        .pool-title { color: var(--y); font-size: 12px; margin-bottom: 15px; }
        .ledger-val { font-size: 34px; font-weight: 900; color: #fff; letter-spacing: 1px; }
        .shield { color: #00ccff; font-size: 11px; font-weight: bold; margin-top: 10px; }

        /* 유튜브 & 틱톡 대형 버튼 */
        .social-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px; }
        .social-btn { background: #111; border-radius: 20px; padding: 25px; text-align: center; text-decoration: none; border: 1px solid #222; }
        .social-btn .label { display: block; color: #fff; font-size: 14px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <div class="logo">HK WORLD BANK</div>
        <div class="lang-btn">KR (한국어)</div>
    </div>

    <div class="asset-card">
        <div class="node-info">🚀 SECURE NODE: HK-V190-SUPREME</div>
        <div class="asset-title">메인 자산 통합 원장</div>
        <div class="pi-val">400.0000 <span>Pi</span></div>
        <div class="gcv-box" onclick="realDeposit()">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="grid">
        <div class="item">🚀<span class="label">송금</span></div>
        <div class="item">🛒<span class="label">결제</span></div>
        <div class="item" onclick="realDeposit()" style="background:#1a1a1a; border-color:var(--y);"><span style="font-size: 25px;">💿</span><span class="label">예치</span></div>
        <div class="item">🎁<span class="label">보상</span></div>
        <div class="item">⚖️<span class="label">소득</span></div>
        <div class="item">🔄<span class="label">스왑</span></div>
    </div>

    <div class="staking-info">
        <div class="apr">STAKING APR 31.4%</div>
        <div class="pool-title">유동성 풀 $</div>
        <div class="ledger-val">88,401,773,756</div>
        <div class="shield">HK_퀀텀_쉴드_활성</div>
    </div>

    <div class="social-grid">
        <a href="https://youtube.com/@HK-Group" class="social-btn">🔴<span class="label">hyekong2025</span></a>
        <a href="https://tiktok.com/@HK-Group" class="social-btn">🎵<span class="label">hyekong2025</span></a>
    </div>

    <div style="color:#333; font-size: 10px; text-align: center; margin-top: 40px; line-height: 1.5;">
        © 2026 HK GROUP GLOBAL MANAGEMENT. GCV<br>CHAIRMAN LEE JAE-WAN. ALL RIGHTS RESERVED.
    </div>
</div>

<script>
    // 실전 파이 블록체인 초기화
    Pi.init({ version: "2.0", sandbox: false });

    async function realDeposit() {
        try {
            const payment = await Pi.createPayment({
                amount: 1.0, // 일단 테스트로 1Pi 세팅, 400개 하려면 400.0으로 수정
                memo: "HK WORLD BANK REAL DEPOSIT",
                metadata: { type: "real", user: "HK_CHAIRMAN" }
            }, {
                onReadyForServerApproval: (id) => console.log("서버 승인 대기:", id),
                onReadyForServerCompletion: (id, txid) => alert("✅ 실전 예치 완료!\nTXID: " + txid),
                onCancel: (id) => alert("예치가 취소되었습니다."),
                onError: (error) => alert("파이 브라우저에서 실행해 주세요.")
            });
        } catch (err) {
            alert("파이 브라우저 접속이 필요합니다.");
        }
    }
</script>

</body>
</html>
