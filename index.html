<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFB400; --green: #00E676; --red: #FF5252; --bg: #000; --yt: #FF0000; --tk: #010101; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; min-height: 100vh; padding: 20px; position: relative; }

        /* 헤더 섹션 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .brand h1 { color: var(--gold); font-size: 1.8rem; margin: 0; font-weight: 900; text-shadow: 0 0 10px rgba(255,180,0,0.3); }
        .node-status { color: var(--green); font-size: 0.8rem; font-weight: bold; margin-top: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #lang { background: #1a1a1a; color: var(--gold); border: 1px solid var(--gold); padding: 5px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; }

        /* 자산 대시보드 */
        .asset-card { background: linear-gradient(145deg, #111, #050505); border-radius: 25px; padding: 30px 15px; text-align: center; border: 1px solid #222; margin-bottom: 25px; }
        .asset-title { color: var(--gold); font-size: 1rem; font-weight: 700; margin-bottom: 15px; }
        .pi-main { font-size: 3.5rem; font-weight: 900; margin-bottom: 15px; color: #fff; }
        .gcv-box { background: rgba(0,230,118,0.1); border: 2px solid var(--green); border-radius: 50px; padding: 10px 20px; color: var(--green); font-size: 1.1rem; font-weight: 900; display: inline-block; }

        /* 메뉴 그리드 */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .item { background: #0c0c0c; border-radius: 15px; padding: 20px 5px; text-align: center; border: 1px solid #1a1a1a; transition: 0.3s; }
        .item:active { transform: scale(0.95); background: #151515; }
        .icon { font-size: 1.6rem; display: block; margin-bottom: 10px; }
        .label { font-size: 0.9rem; font-weight: 700; }

        /* 스테이킹 & 정보 */
        .info-panel { border-left: 5px solid var(--gold); background: #0a0a0a; padding: 15px; margin-bottom: 25px; border-radius: 0 15px 15px 0; }
        .st-title { color: var(--gold); font-size: 0.9rem; font-weight: 900; margin-bottom: 5px; }
        .pool-val { font-size: 2rem; font-weight: 900; letter-spacing: -1px; }

        /* 핵심 액션 버튼 */
        .action-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .btn { border-radius: 10px; padding: 15px 5px; font-size: 0.9rem; font-weight: 900; border: none; cursor: pointer; color: #000; }

        /* 고객지원 */
        .cs-btn { background: var(--red); color: #fff; border-radius: 15px; padding: 20px; text-align: center; font-size: 1.2rem; font-weight: 900; margin-bottom: 25px; cursor: pointer; border: none; width: 100%; box-shadow: 0 5px 15px rgba(255,82,82,0.3); }

        /* ✨ 유튜브 & 틱톡 - 프리미엄 디자인 ✨ */
        .social-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 40px; }
        .social-link { text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 15px; border-radius: 18px; color: #fff; font-weight: 900; font-size: 1.1rem; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .yt-btn { background: #FF0000; border: 1px solid #FF4444; }
        .tk-btn { background: #000; border: 1.5px solid #fff; }
        
        .social-link img { width: 24px; height: 24px; margin-right: 10px; }
        .social-link:active { transform: translateY(3px); }

        .footer { text-align: center; font-size: 0.8rem; color: #444; border-top: 1px solid #111; padding: 30px 0 60px; line-height: 1.8; }
        .chairman { color: #888; font-weight: 700; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="brand">
            <h1>HK WORLD BANK</h1>
            <div class="node-status">🚀 SECURE NODES: ACTIVE</div>
        </div>
        <select id="lang" onchange="changeLang(this.value)">
            <option value="KR">🇰🇷 KR</option>
            <option value="US">🇺🇸 US</option>
            <option value="CN">🇨🇳 CN</option>
            <option value="AR">🇸🇦 AR</option>
            <option value="VN">🇻🇳 VN</option>
        </select>
    </div>

    <div class="asset-card">
        <div id="t_ledger" class="asset-title">메인 자산 통합 원장</div>
        <div class="pi-main"><span id="pi_val">400.0211</span> <span style="font-size:1.5rem; color:var(--gold);">Pi</span></div>
        <div id="t_gcv" class="gcv-box">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="grid">
        <div class="item"><span class="icon">🚀</span><span id="m1" class="label">송금</span></div>
        <div class="item"><span class="icon">🛒</span><span id="m2" class="label">결제</span></div>
        <div class="item"><span class="icon">📀</span><span id="m3" class="label">예치</span></div>
        <div class="item"><span class="icon">🎁</span><span id="m4" class="label">보상</span></div>
        <div class="item"><span class="icon">⚖️</span><span id="m5" class="label">기본소득</span></div>
        <div class="item"><span class="icon">🔄</span><span id="m6" class="label">스왑</span></div>
    </div>

    <div class="info-panel">
        <div id="t_st" class="st-title">STAKING 31.4% | 유동성 풀 $</div>
        <div id="pool_val" class="pool-val">88,401,818,262</div>
    </div>

    <div class="action-btns">
        <button id="b1" class="btn" style="background:#fff;">Pi 수량</button>
        <button id="b2" class="btn" style="background:var(--gold);">SWAP</button>
        <button id="b3" class="btn" style="background:var(--green);">LP 공급</button>
    </div>

    <button id="b_cs" class="cs-btn">🎧 글로벌 고객지원센터</button>

    <div class="social-container">
        <a href="https://www.youtube.com/@hyekong2025" target="_blank" class="social-link yt-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" alt="YT"> YOUTUBE
        </a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="social-link tk-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/TikTok_logo_unwrapped.svg" alt="TK"> TIKTOK
        </a>
    </div>

    <div class="footer">
        © 2026 HK GROUP GLOBAL MANAGEMENT. GCV<br>
        <div class="chairman">CHAIRMAN LEE JAE-WAN [HK-ROBOTICS]</div>
        <div style="color: #00E6F6; font-size: 0.7rem; margin-top: 10px;">🛡️ HK_QUANTUM_SHIELD_ACTIVE</div>
    </div>
</div>

<script>
    const data = {
        'KR': ['메인 자산 통합 원장', '가치 평가', '송금', '결제', '예치', '보상', '기본소득', '스왑', '유동성 풀', 'Pi 수량', 'LP 공급', '글로벌 고객지원센터'],
        'US': ['Main Asset Ledger', 'Evaluation', 'Send', 'Pay', 'Deposit', 'Reward', 'UBI', 'Swap', 'Liquidity Pool', 'Pi Qty', 'LP Supply', 'Global Support Center'],
        'CN': ['资产总账', '价值评估', '转账', '支付', '存款', '奖励', '基本收入', '互换', '流动性池', 'Pi 数量', 'LP 供应', '全球客服中心'],
        'AR': ['دفتر الأصول', 'تقييم', 'إرسال', 'دفع', 'إيداع', 'مكافأة', 'دخل', 'تبادل', 'مجمع السيولة', 'كمية Pi', 'توريد LP', 'مركز الدعم'],
        'VN': ['Sổ cái tài sản', 'Giá trị', 'Gửi tiền', 'Thanh toán', 'Gửi', 'Thưởng', 'Thu nhập', 'Hoán đổi', 'Bể thanh khoản', 'Số lượng', 'Cung급 LP', 'Trung tâm hỗ trợ']
    };

    function changeLang(l) {
        const s = data[l];
        document.getElementById('t_ledger').innerText = s[0];
        document.getElementById('t_gcv').innerText = s[1] + ': $ 125,663,600 (GCV)';
        document.getElementById('m1').innerText = s[2]; document.getElementById('m2').innerText = s[3];
        document.getElementById('m3').innerText = s[4]; document.getElementById('m4').innerText = s[5];
        document.getElementById('m5').innerText = s[6]; document.getElementById('m6').innerText = s[7];
        document.getElementById('t_st').innerText = 'STAKING 31.4% | ' + s[8] + ' $';
        document.getElementById('b1').innerText = s[9]; document.getElementById('b2').innerText = s[7];
        document.getElementById('b3').innerText = s[10];
        document.getElementById('b_cs').innerText = '🎧 ' + s[11];
    }

    let p = 400.0211; let v = 88401818262;
    setInterval(() => {
        p += 0.0001; v += Math.floor(Math.random()*2000);
        document.getElementById('pi_val').innerText = p.toFixed(4);
        document.getElementById('pool_val').innerText = v.toLocaleString();
    }, 1500);
</script>
</body>
</html>
