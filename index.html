<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --hk-gold: #FFD700; --hk-dark: #000000; --hk-green: #00FF00;
            --hk-red: #FF0000; --hk-cyan: #00F2FF;
        }
        /* [핵심] 단어 정렬 최적화: 단어 단위로 줄바꿈 방지 */
        * { box-sizing: border-box; margin: 0; padding: 0; word-break: keep-all; overflow-wrap: break-word; }
        
        body { background-color: var(--hk-dark); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 480px; padding: 15px; position: relative; }

        /* 1. 언어 선택 (우측 상단 작게) */
        .top-nav { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .lang-box { 
            background: #111; color: var(--hk-gold); border: 1px solid var(--hk-gold); 
            padding: 5px 10px; border-radius: 6px; font-size: 13px; font-weight: bold;
        }

        .brand-logo { font-size: 30px; font-weight: 900; color: var(--hk-gold); margin: 15px 0; }

        /* 2. 통합 원장 대시보드 */
        .asset-card {
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            border-radius: 25px; padding: 45px 15px; text-align: center;
            border: 1px solid #333; margin-bottom: 20px;
        }
        .asset-title { color: var(--hk-gold); font-size: 16px; margin-bottom: 12px; font-weight: bold; }
        .asset-amount { font-size: 50px; font-weight: 900; letter-spacing: -1px; }
        .gcv-tag { 
            display: inline-block; padding: 8px 20px; border-radius: 50px; 
            border: 1.5px solid var(--hk-green); color: var(--hk-green); 
            font-size: 15px; font-weight: bold; margin-top: 20px;
        }

        /* 3. 6구 메뉴 그리드 (정밀 정렬) */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .menu-box { background: #111; padding: 25px 5px; border-radius: 15px; text-align: center; border: 1px solid #222; }
        .menu-box i { font-size: 28px; margin-bottom: 12px; display: block; }
        .menu-box span { font-size: 15px; font-weight: bold; white-space: nowrap; }

        /* 4. 스테이킹 현황 */
        .stake-info { 
            background: #0a0a0a; border-left: 5px solid var(--hk-gold); 
            padding: 20px; margin-bottom: 25px; border-radius: 0 12px 12px 0;
        }
        .stake-label { color: var(--hk-gold); font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .stake-value { font-size: 28px; font-weight: 900; }

        /* 5. [핵심] 3개 버튼 (유튜브/틱톡 위 배치) */
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .action-btn { flex: 1; padding: 18px 5px; border-radius: 12px; border: none; font-weight: 900; font-size: 15px; }
        .b-white { background: #fff; color: #000; }
        .b-gold { background: var(--hk-gold); color: #000; }
        .b-green { background: #00c853; color: #fff; }

        /* 6. 고객센터 및 소셜 */
        .cs-wide { 
            width: 100%; padding: 18px; background: #ff4444; color: #fff; 
            border: none; border-radius: 12px; font-weight: 900; font-size: 16px; margin-bottom: 15px;
        }
        .sns-row { display: flex; gap: 10px; margin-bottom: 40px; }
        .sns-item { flex: 1; padding: 15px; border-radius: 12px; text-decoration: none; color: #fff; text-align: center; font-weight: 900; font-size: 15px; }

        /* 7. 최하단 예치 및 보안 문구 */
        .footer-sec { text-align: center; border-top: 1px solid #222; padding-top: 40px; }
        .apy-text { color: var(--hk-gold); font-size: 42px; font-weight: 900; margin-bottom: 25px; }
        .security-msg { color: #888; font-size: 16px; font-weight: bold; line-height: 1.6; margin-bottom: 25px; padding: 0 10px; }
        .policy-link { color: #444; text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-nav">
        <select class="lang-box" onchange="translatePage(this.value)">
            <option value="ko">한국어</option><option value="en">English</option>
            <option value="zh">中文</option><option value="ar">العربية</option>
            <option value="hi">हिन्दी</option><option value="es">Español</option>
            <option value="pt">Português</option><option value="uk">Українська</option>
            <option value="ja">日本語</option><option value="ru">Русский</option>
            <option value="vi">Tiếng Việt</option><option value="th">ไทย</option>
            <option value="de">Deutsch</option><option value="fr">Français</option>
            <option value="it">Italiano</option>
        </select>
    </div>

    <div class="brand-logo">HK WORLD BANK</div>

    <div class="asset-card">
        <div class="asset-title" id="t-ledger">메인 자산 통합 원장</div>
        <div class="asset-amount">400.0212 <span style="color:var(--hk-gold); font-size:0.5em;">Pi</span></div>
        <div class="gcv-tag" id="t-gcv">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="menu-grid">
        <div class="menu-box"><i class="fas fa-paper-plane" style="color:#007AFF"></i><span data-k="send">송금</span></div>
        <div class="menu-box"><i class="fas fa-shopping-cart" style="color:#FF9500"></i><span data-k="pay">결제</span></div>
        <div class="menu-box"><i class="fas fa-piggy-bank" style="color:var(--hk-gold)"></i><span data-k="save">예치</span></div>
        <div class="menu-box"><i class="fas fa-gift" style="color:#FF3B30"></i><span data-k="reward">보상</span></div>
        <div class="menu-box"><i class="fas fa-balance-scale" style="color:#AF52DE"></i><span data-k="ubi">기본소득</span></div>
        <div class="menu-box"><i class="fas fa-rotate" style="color:var(--hk-cyan)"></i><span data-k="swap2">스왑</span></div>
    </div>

    <div class="stake-info">
        <div class="stake-label">STAKING 31.4% | 유동성 풀 $</div>
        <div class="stake-value">88,401,819,601</div>
    </div>

    <div class="btn-group">
        <button class="action-btn b-white" id="b-pi">PI 수량</button>
        <button class="action-btn b-gold" id="b-swap">SWAP</button>
        <button class="action-btn b-green" id="b-lp">LP 공급</button>
    </div>

    <button class="cs-wide" id="t-cs">글로벌 고객지원센터</button>

    <div class="sns-row">
        <a href="#" class="sns-item" style="background:#f00;">YOUTUBE</a>
        <a href="#" class="sns-item" style="background:#000; border:1px solid #333;">TIKTOK</a>
    </div>

    <footer class="footer-sec">
        <div class="apy-text" id="t-apy">예치 (APY 31.4%)</div>
        <div class="security-msg" id="t-msg">
            "HK WorldBank는 고객님의 자산을<br>양자 암호 기술로 안전하게 보호합니다."
        </div>
        <a href="#" class="policy-link" id="t-policy">개인정보처리방안</a>
        <p style="margin-top:30px; font-size:10px; color:#222;">&copy; 2026 HK GROUP. All Rights Reserved.</p>
    </footer>
</div>

<script>
    const translations = {
        ko: { ledger: "메인 자산 통합 원장", gcv: "가치 평가: $ 125,663,600 (GCV)", send: "송금", pay: "결제", save: "예치", reward: "보상", ubi: "기본소득", swap2: "스왑", pi: "PI 수량", swap: "SWAP", lp: "LP 공급", cs: "글로벌 고객지원센터", apy: "예치 (APY 31.4%)", msg: '"HK WorldBank는 고객님의 자산을 양자 암호 기술로 안전하게 보호합니다."', policy: "개인정보처리방안" },
        en: { ledger: "Unified Asset Ledger", gcv: "Evaluation: $ 125,663,600 (GCV)", send: "Send", pay: "Payment", save: "Deposit", reward: "Reward", ubi: "UBI", swap2: "Swap", pi: "PI Balance", swap: "SWAP", lp: "LP Supply", cs: "Global CS Center", apy: "Deposit (APY 31.4%)", msg: '"HK WorldBank secures your assets with quantum encryption."', policy: "Privacy Policy" }
        /* 15개국어 데이터 자동 확장 구조 */
    };

    function translatePage(lang) {
        const d = translations[lang] || translations['en'];
        document.getElementById('t-ledger').innerText = d.ledger;
        document.getElementById('t-gcv').innerText = d.gcv;
        document.getElementById('b-pi').innerText = d.pi;
        document.getElementById('b-swap').innerText = d.swap;
        document.getElementById('b-lp').innerText = d.lp;
        document.getElementById('t-cs').innerText = d.cs;
        document.getElementById('t-apy').innerText = d.apy;
        document.getElementById('t-msg').innerText = d.msg;
        document.getElementById('t-policy').innerText = d.policy;
        document.querySelectorAll('[data-k]').forEach(el => el.innerText = d[el.getAttribute('data-k')]);
    }
</script>
</body>
</html>
