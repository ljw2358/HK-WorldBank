<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - Global Industrial Leader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --hk-gold: #FFD700; --hk-dark: #000000; --hk-green: #00FF00;
            --hk-red: #FF0000; --hk-cyan: #00F2FF; --hk-purple: #AF52DE;
        }
        body { background-color: var(--hk-dark); color: white; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* 헤더 섹션 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .logo { font-size: clamp(24px, 5vw, 36px); font-weight: 900; color: var(--hk-gold); line-height: 1.2; }
        .lang-select { background: #111; color: white; border: 1px solid #444; padding: 8px 15px; border-radius: 5px; }

        /* 자산 보드 */
        .asset-board { background: #0a0a0a; border-radius: 20px; padding: 40px 20px; text-align: center; border: 1px solid #222; margin-bottom: 30px; }
        .ledger-title { color: var(--hk-gold); font-size: 18px; margin-bottom: 10px; }
        .balance { font-size: clamp(40px, 8vw, 80px); font-weight: 900; }
        .unit { color: var(--hk-gold); font-size: 0.5em; margin-left: 5px; }
        .gcv-tag { display: inline-block; border: 1px solid var(--hk-green); color: var(--hk-green); padding: 10px 25px; border-radius: 50px; font-weight: bold; margin-top: 20px; font-size: 18px; }

        /* 메뉴 그리드 (보상, 기본소득, 스왑 포함) */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .menu-item { background: #111; padding: 25px 10px; border-radius: 15px; text-align: center; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .menu-item:hover { border-color: var(--hk-gold); background: #1a1a1a; }
        .menu-item i { font-size: 28px; margin-bottom: 12px; display: block; }
        .menu-item span { font-size: 16px; font-weight: bold; color: #fff; }

        /* SNS 버튼 (유튜브 & 틱톡) */
        .sns-group { display: flex; gap: 15px; margin-bottom: 30px; }
        .sns-btn { flex: 1; padding: 18px; border-radius: 10px; text-decoration: none; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 18px; }
        .btn-yt { background: var(--hk-red); }
        .btn-tk { background: #000; border: 1px solid #444; }

        /* 퀀텀 실드 보안 섹션 */
        .shield-box { border: 1px solid var(--hk-cyan); border-radius: 15px; padding: 25px; background: rgba(0, 242, 255, 0.03); margin-bottom: 40px; }
        .shield-header { color: var(--hk-cyan); font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .shield-list { list-style: none; padding: 0; margin: 0; color: #bbb; line-height: 2; font-size: 15px; }

        /* 하단 강조 섹션 */
        .footer-highlight { text-align: center; border-top: 1px solid #222; padding-top: 30px; }
        .apy-text { color: var(--hk-gold); font-size: clamp(28px, 5vw, 40px); font-weight: 900; margin-bottom: 20px; }
        .policy-links { margin-top: 20px; }
        .policy-links a { color: #666; text-decoration: none; font-size: 14px; margin: 0 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">HK WORLD BANK</div>
        <select class="lang-select">
            <option>한국어 🇰🇷</option>
            <option>English 🇺🇸</option>
        </select>
    </div>

    <div class="asset-board">
        <div class="ledger-title">메인 자산 통합 원장</div>
        <div class="balance">400.0212 <span class="unit">Pi</span></div>
        <div class="gcv-tag">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><i class="fas fa-paper-plane" style="color:#007AFF"></i><span>송금</span></div>
        <div class="menu-item"><i class="fas fa-shopping-cart" style="color:#FF9500"></i><span>결제</span></div>
        <div class="menu-item"><i class="fas fa-piggy-bank" style="color:var(--hk-gold)"></i><span>예치</span></div>
        <div class="menu-item"><i class="fas fa-gift" style="color:#FF3B30"></i><span>보상</span></div>
        <div class="menu-item"><i class="fas fa-balance-scale" style="color:var(--hk-purple)"></i><span>기본소득</span></div>
        <div class="menu-item"><i class="fas fa-sync-alt" style="color:var(--hk-cyan)"></i><span>스왑</span></div>
    </div>

    <div class="sns-group">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="sns-btn btn-yt">
            <i class="fab fa-youtube"></i> YOUTUBE
        </a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="sns-btn btn-tk">
            <i class="fab fa-tiktok"></i> TIKTOK
        </a>
    </div>

    <div class="shield-box">
        <div class="shield-header"><i class="fas fa-shield-halved"></i> HK QUANTUM SHIELD ACTIVE</div>
        <ul class="shield-list">
            <li>• 개인정보보호법 준수: 양자 암호화 보안 적용</li>
            <li>• Form of Private: 자산 보호 프로토콜 가동</li>
            <li>• HK-ROBOT: AI 실시간 위협 탐지 중</li>
        </ul>
    </div>

    <div class="footer-highlight">
        <div class="apy-text">예치 (APY 31.4%)</div>
        <div class="policy-links">
            <a href="#">개인정보처리방안</a> | 
            <a href="#">이용약관</a> | 
            <a href="#">보안정책</a>
        </div>
    </div>
</div>

</body>
</html>
