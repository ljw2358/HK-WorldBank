<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK - GLOBAL SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFB400; --green: #00E676; --red: #FF5252; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }

        /* PC에서도 화면이 퍼지지 않게 하고, 모바일에서는 꽉 차게 */
        .container { width: 100%; max-width: 480px; min-height: 100vh; padding: 15px; display: flex; flex-direction: column; position: relative; }

        /* 언어 선택: 우측 상단 소형화 */
        .header-nav { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .brand-box h1 { color: var(--gold); font-size: 1.6rem; margin: 0; font-weight: 900; letter-spacing: -0.5px; }
        .node-st { color: var(--green); font-size: 0.75rem; font-weight: bold; margin-top: 3px; }
        
        #langSel { 
            background: #111; color: var(--gold); border: 1px solid var(--gold);
            padding: 3px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; outline: none;
        }

        /* 메인 자산 박스: 글자 크기 최적화 (너무 크지 않게) */
        .asset-box { 
            background: linear-gradient(145deg, #0f0f0f, #181818); 
            border-radius: 20px; padding: 25px 15px; text-align: center; 
            border: 1px solid #222; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
        }
        #lb_ledger { color: var(--gold); font-size: 0.9rem; margin-bottom: 10px; font-weight: 700; opacity: 0.9; }
        .pi-val { font-size: 3.2rem; font-weight: 900; border-bottom: 4px solid var(--gold); display: inline-block; margin-bottom: 12px; line-height: 1; }
        .gcv-badge { border: 1.5px solid var(--green); border-radius: 30px; padding: 6px 15px; color: var(--green); font-size: 0.95rem; font-weight: 900; display: inline-block; }

        /* 메뉴 그리드 (6개 아이콘) */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .menu-item { background: #111; border-radius: 12px; padding: 18px 5px; text-align: center; border: 1px solid #222; }
        .m-icon { font-size: 1.5rem; display: block; margin-bottom: 8px; }
        .m-text { font-size: 0.85rem; font-weight: bold; }

        /* 스테이킹 바 */
        .pool-bar { border-left: 4px solid var(--gold); padding: 10px 15px; background: rgba(255,180,0,0.05); margin-bottom: 20px; }
        #lb_pool { color: var(--gold); font-size: 0.85rem; font-weight: 900; margin-bottom: 3px; }
        .pool-num { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.5px; }

        /* 하단 액션 버튼 3개 */
        .action-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .btn-act { border-radius: 8px; padding: 12px 2px; font-size: 0.85rem; font-weight: 900; border: none; cursor: pointer; }

        /* 고객지원 (레드) */
        .cs-btn { background: var(--red); border-radius: 12px; padding: 18px; text-align: center; font-size: 1.1rem; font-weight: 900; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(255,82,82,0.2); }

        /* SNS & 링크 */
        .sns-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        .sns-btn { background: #111; border-radius: 10px; padding: 12px; text-align: center; border: 1px solid #333; text-decoration: none; color: #fff; font-size: 0.85rem; font-weight: bold; }

        .footer { text-align: center; font-size: 0.75rem; color: #555; border-top: 1px solid #222; padding: 20px 0 50px; line-height: 1.6; }
        .shield { color: #00E6F6; font-size: 0.65rem; font-weight: bold; margin-top: 5px; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-nav">
        <div class="brand-box">
            <h1>HK WORLD BANK</h1>
            <div class="node-st">🚀 SECURE NODES: ACTIVE</div>
        </div>
        <select id="langSel" onchange="applyLanguage(this.value)">
            <option value="KR">KR</option><option value="US">US</option><option value="CN">CN</option>
            <option value="JP">JP</option><option value="VN">VN</option><option value="PH">PH</option>
            <option value="ID">ID</option><option value="TH">TH</option><option value="IN">IN</option>
            <option value="AR">AR</option><option value="RU">RU</option><option value="FR">FR</option>
            <option value="DE">DE</option><option value="BR">BR</option><option value="TR">TR</option>
        </select>
    </div>

    <div class="asset-box">
        <div id="t1">메인 자산 통합 원장</div>
        <div class="pi"><span id="pi_num">400.0211</span> <span style="font-size:1.2rem; color:var(--gold);">Pi</span></div><br>
        <div id="t2" class="gcv-badge">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><span class="m-icon">🚀</span><span id="m1" class="m-text">송금</span></div>
        <div class="menu-item"><span class="m-icon">🛒</span><span id="m2" class="m-text">결제</span></div>
        <div class="menu-item"><span class="m-icon">📀</span><span id="m3" class="m-text">예치</span></div>
        <div class="menu-item"><span class="m-icon">🎁</span><span id="m4" class="m-text">리워드</span></div>
        <div class="menu-item"><span class="m-icon">⚖️</span><span id="m5" class="m-text">기본소득</span></div>
        <div class="menu-item"><span class="m-icon">🔄</span><span id="m6" class="m-text">스왑</span></div>
    </div>

    <div class="pool-bar">
        <div id="t3" style="color:var(--gold); font-size:0.8rem; font-weight:900;">STAKING 31.4% | 유동성 풀 $</div>
        <div id="pool_num" class="pool-num">88,401,818,262</div>
        <div class="shield">🛡️ HK_QUANTUM_SHIELD_ACTIVE</div>
    </div>

    <div class="action-row">
        <button id="b1" class="btn-act" style="background:#222; color:#fff;">Pi 수량</button>
        <button id="b2" class="btn-act" style="background:var(--gold); color:#000;">SWAP</button>
        <button id="b3" class="btn-act" style="background:var(--green); color:#000;">LP 공급</button>
    </div>

    <div id="b_cs" class="cs-btn">🎧 글로벌 고객지원센터</div>

    <div class="sns-row">
        <a href="https://www.youtube.com/@hyekong2025" target="_blank" class="sns-btn"><span style="color:red">▶</span> YOUTUBE</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="sns-btn">♪ TIKTOK</a>
    </div>

    <div class="footer">
        © 2026 HK GROUP GLOBAL MANAGEMENT. GCV<br>
        <strong>CHAIRMAN LEE JAE-WAN</strong>. ALL RIGHTS RESERVED.
    </div>
</div>

<script>
    const langData = {

        'US': ['Main Asset Ledger', 'Evaluation', 'Send', 'Pay', 'Deposit', 'Reward', 'UBI', 'Swap', 'Liquidity Pool', 'Pi Qty', 'LP Supply', 'Global Support Center'],
        'CN': ['资产总账', '价值评估', '转账', '支付', '存款', '奖励', '基本收入', '互换', '流动性池', 'Pi 数量', 'LP 供应', '全球客服中心'],
        'JP': ['資産台帳', '価値評価', '送金', '決済', '預金', '報酬', '所得', 'スワップ', '流動性', 'Pi 数量', 'LP 供給', 'サポートセンター'],
        'VN': ['Sổ cái tài sản', 'Giá trị', 'Gửi tiền', 'Thanh toán', 'Gửi', 'Thưởng', 'Thu nhập', 'Hoán đổi', 'Bể thanh khoản', 'Số lượng', 'Cung cấp LP', 'Trung tâm hỗ trợ'],
        'PH': ['Pangunahing Ledger', 'Ebalwasyon', 'Ipadala', 'Magbayad', 'Deposito', 'Gantimpala', 'UBI', 'Swap', 'Liquidity Pool', 'Dami ng Pi', 'LP Supply', 'Customer Support'],
        'ID': ['Buku Besar', 'Evaluasi', 'Kirim', 'Bayar', 'Setoran', 'Hadiah', 'UBI', 'Swap', 'Pool Likuiditas', 'Jumlah Pi', 'Pasokan LP', 'Layanan Pelanggan'],
        'TH': ['บัญชีหลัก', 'การประเมินค่า', 'ส่ง', 'จ่าย', 'ฝาก', 'รางวัล', 'รายได้', 'สลับ', 'พูลสภาพคล่อง', 'จำนวน Pi', 'จัดหา LP', 'ศูนย์บริการลูกค้า'],
        'IN': ['मुख्य लेजर', 'मूल्यांकन', 'भेजें', 'भुगतान', 'जमा', 'पुरस्कार', 'UBI', 'स्वैप', 'तरलता पूल', 'Pi मात्रा', 'LP आपूर्ति', 'सहायता केंद्र'],
        'AR': ['دفتر الأصول', 'تقييم', 'إرسال', 'دفع', 'إيداع', 'مكافأة', 'دخل', 'تبادل', 'مجمع السيولة', 'كمية Pi', 'توريد LP', 'مركز الدعم'],
        'RU': ['Главная книга', 'Оценка', 'Отправить', 'Оплата', 'Депозит', 'Награда', 'Доход', 'Обмен', 'Ликвидность', 'Кол-во Pi', 'LP Поставка', 'Техподдержка'],
        'FR': ['Grand Livre', 'Évaluation', 'Envoyer', 'Payer', 'Dépôt', 'Récompense', 'UBI', 'Swap', 'Pool Liquidité', 'Qté Pi', 'Offre LP', 'Centre Support'],
        'DE': ['Hauptbuch', 'Bewertung', 'Senden', 'Zahlen', 'Einlage', 'Belohnung', 'UBI', 'Swap', 'Pool', 'Pi Menge', 'LP Angebot', 'Support Center'],
        'BR': ['Livro Principal', 'Avaliação', 'Enviar', 'Pagar', 'Depósito', 'Prêmio', 'Renda', 'Troca', 'Pool', 'Qtd Pi', 'Suporte LP', 'Suporte'],
        'TR': ['Ana Defter', 'Değerleme', 'Gönder', 'Öde', 'Mevduat', 'Ödül', 'UBI', 'Takas', 'Likit Havuzu', 'Pi Miktarı', 'LP Arzı', 'Destek Merkezi']
    };

    function applyLanguage(l) {
        const s = langData[l] || langData['US'];
        document.getElementById('t1').innerText = s[0];
        document.getElementById('t2').innerText = s[1] + ': $ 125,663,600 (GCV)';
        document.getElementById('m1').innerText = s[2]; document.getElementById('m2').innerText = s[3];
        document.getElementById('m3').innerText = s[4]; document.getElementById('m4').innerText = s[5];
        document.getElementById('m5').innerText = s[6]; document.getElementById('m6').innerText = s[7];
        document.getElementById('t3').innerText = 'STAKING 31.4% | ' + s[8] + ' $';
        document.getElementById('b1').innerText = s[9]; document.getElementById('b2').innerText = s[7];
        document.getElementById('b3').innerText = s[10];
        document.getElementById('b_cs').innerText = '🎧 ' + s[11];
    }

    let p = 400.0211; let v = 88401818262;
    setInterval(() => {
        p += 0.0001; v += Math.floor(Math.random()*1500);
        document.getElementById('pi_num').innerText = p.toFixed(4);
        document.getElementById('pool_num').innerText = v.toLocaleString();
    }, 1800);
</script>
</body>
</html>
