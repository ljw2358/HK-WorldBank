<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK - Global Industrial Leader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --hk-gold: #FFD700; --hk-dark: #000000; --hk-green: #00FF00;
            --hk-red: #FF0000; --hk-cyan: #00F2FF; --hk-purple: #AF52DE;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--hk-dark); color: white; font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .wrapper { width: 100%; max-width: 1200px; padding: 40px 20px; }

        /* 상단 헤더 */
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #222; }
        .logo { font-size: clamp(24px, 4vw, 36px); font-weight: 900; color: var(--hk-gold); }
        .lang-select { background: #111; color: white; border: 1px solid var(--hk-gold); padding: 8px 15px; border-radius: 8px; cursor: pointer; }

        /* 자산 대시보드 */
        .dashboard { background: #0a0a0a; margin: 30px 0; padding: 60px 20px; border-radius: 30px; text-align: center; border: 1px solid #333; }
        .ledger-title { color: var(--hk-gold); font-size: 20px; margin-bottom: 15px; font-weight: bold; }
        .balance { font-size: clamp(40px, 10vw, 90px); font-weight: 900; }
        .unit { color: var(--hk-gold); font-size: 0.5em; margin-left: 10px; }
        .gcv-badge { display: inline-block; padding: 12px 35px; border-radius: 50px; border: 1px solid var(--hk-green); color: var(--hk-green); font-size: 22px; font-weight: bold; margin-top: 20px; }

        /* [추가] 핵심 기능 버튼 3종 (PI수량, SWAP, LP공급) */
        .action-row { display: flex; gap: 15px; margin-bottom: 30px; }
        .action-btn { flex: 1; padding: 20px; border-radius: 12px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-white { background: white; color: black; }
        .btn-gold { background: var(--hk-gold); color: black; }
        .btn-green { background: #00c853; color: white; }
        .action-btn:hover { opacity: 0.8; transform: scale(0.98); }

        /* 6구 메뉴 그리드 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .menu-item { background: #111; padding: 40px 10px; border-radius: 20px; text-align: center; border: 1px solid #222; }
        .menu-item i { font-size: 32px; margin-bottom: 15px; display: block; }
        .menu-item span { font-size: 18px; font-weight: bold; }

        /* SNS & 보안 & APY (기존 동일 정렬) */
        .sns-row { display: flex; gap: 15px; margin-bottom: 30px; }
        .sns-row a { flex: 1; padding: 20px; border-radius: 12px; text-decoration: none; color: white; font-weight: bold; text-align: center; font-size: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .yt { background: var(--hk-red); } .tk { background: #000; border: 1px solid #333; }

        .shield-box { background: rgba(0, 242, 255, 0.05); padding: 30px; border-radius: 20px; border: 1px solid var(--hk-cyan); margin-bottom: 40px; }
        .shield-list { list-style: none; color: #ccc; font-size: 18px; line-height: 2.2; }

        .footer-apy { text-align: center; color: var(--hk-gold); font-size: 45px; font-weight: 900; padding: 50px 0; border-top: 1px solid #333; }
        .policy-links { text-align: center; margin-top: -20px; padding-bottom: 50px; }
        .policy-links a { color: #555; text-decoration: none; margin: 0 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <div class="logo">HK WORLD BANK</div>
        <select class="lang-select" id="langSelect" onchange="translate()">
            <option value="ko">한국어 🇰🇷</option>
            <option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option>
        </select>
    </div>

    <div class="dashboard">
        <div class="ledger-title" id="t-ledger">메인 자산 통합 원장</div>
        <div class="balance">400.0212 <span class="unit">Pi</span></div>
        <div class="gcv-badge" id="t-gcv">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="action-row">
        <button class="action-btn btn-white" id="b-pi">PI 수량</button>
        <button class="action-btn btn-gold" id="b-swap">SWAP</button>
        <button class="action-btn btn-green" id="b-lp">LP 공급</button>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><i class="fas fa-paper-plane" style="color:#007AFF"></i><span data-k="send">송금</span></div>
        <div class="menu-item"><i class="fas fa-shopping-cart" style="color:#FF9500"></i><span data-k="pay">결제</span></div>
        <div class="menu-item"><i class="fas fa-piggy-bank" style="color:var(--hk-gold)"></i><span data-k="save">예치</span></div>
        <div class="menu-item"><i class="fas fa-gift" style="color:var(--hk-red)"></i><span data-k="reward">보상</span></div>
        <div class="menu-item"><i class="fas fa-balance-scale" style="color:var(--hk-purple)"></i><span data-k="ubi">기본소득</span></div>
        <div class="menu-item"><i class="fas fa-sync-alt" style="color:var(--hk-cyan)"></i><span data-k="swap2">스왑</span></div>
    </div>

    <div class="sns-row">
        <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="yt"><i class="fab fa-youtube"></i> YOUTUBE</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="tk"><i class="fab fa-tiktok"></i> TIKTOK</a>
    </div>

    <div class="shield-box">
        <div style="color:var(--hk-cyan); font-weight:bold; margin-bottom:15px;"><i class="fas fa-shield-halved"></i> HK QUANTUM SHIELD ACTIVE</div>
        <ul class="shield-list">
            <li id="s1">● 개인정보보호법 준수: 양자 암호화 보안 적용</li>
            <li id="s2">● Form of Private: 자산 보호 프로토콜 가동</li>
            <li id="s3">● HK-ROBOT: AI 실시간 위협 탐지 중</li>
        </ul>
    </div>

    <div class="footer-apy" id="t-apy">예치 (APY 31.4%)</div>
    <div class="policy-links">
        <a href="#" id="f-p">개인정보처리방안</a> | <a href="#">이용약관</a> | <a href="#">보안정책</a>
    </div>
</div>

<script>
    const data = {
        ko: { ledger: "메인 자산 통합 원장", gcv: "가치 평가: $ 125,663,600 (GCV)", pi: "PI 수량", swap: "SWAP", lp: "LP 공급", send: "송금", pay: "결제", save: "예치", reward: "보상", ubi: "기본소득", swap2: "스왑", apy: "예치 (APY 31.4%)", s1: "● 개인정보보호법 준수: 양자 암호화 보안 적용", s2: "● Form of Private: 자산 보호 프로토콜 가동", s3: "● HK-ROBOT: AI 실시간 위협 탐지 중", p: "개인정보처리방안" },
        en: { ledger: "Main Asset Ledger", gcv: "Evaluation: $ 125,663,600 (GCV)", pi: "PI Amount", swap: "SWAP", lp: "LP Supply", send: "Transfer", pay: "Payment", save: "Deposit", reward: "Reward", ubi: "Basic Income", swap2: "Swap", apy: "Deposit (APY 31.4%)", s1: "● Privacy Law: Quantum Encryption Active", s2: "● Form of Private: Asset Protection Active", s3: "● HK-ROBOT: AI Threat Detection Active", p: "Privacy Policy" },
        zh: { ledger: "主资产整合账本", gcv: "价值评估: $ 125,663,600 (GCV)", pi: "PI 数量", swap: "SWAP", lp: "LP 供应", send: "转账", pay: "支付", save: "存款", reward: "奖励", ubi: "基本收入", swap2: "交换", apy: "存款 (APY 31.4%)", s1: "● 隐私法合规：应用量子加密安全", s2: "● Form of Private: 资产保护协议启动", s3: "● HK-ROBOT: AI 实时威胁检测中", p: "隐私权政策" }
    };

    function translate() {
        const sel = document.getElementById('langSelect').value;
        const d = data[sel];
        document.getElementById('t-ledger').innerText = d.ledger;
        document.getElementById('t-gcv').innerText = d.gcv;
        document.getElementById('b-pi').innerText = d.pi;
        document.getElementById('b-swap').innerText = d.swap;
        document.getElementById('b-lp').innerText = d.lp;
        document.getElementById('t-apy').innerText = d.apy;
        document.getElementById('s1').innerText = d.s1;
        document.getElementById('s2').innerText = d.s2;
        document.getElementById('s3').innerText = d.s3;
        document.getElementById('f-p').innerText = d.p;
        document.querySelectorAll('[data-k]').forEach(el => el.innerText = d[el.getAttribute('data-k')]);
    }
</script>

</body>
</html>
