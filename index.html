<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --hk-gold: #FFD700; --hk-dark: #000; --hk-green: #00FF00; --hk-blue: #007AFF; --hk-cyan: #00FFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; word-break: keep-all; }
        body { background-color: var(--hk-dark); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 480px; padding: 20px; }

        /* 상단 언어 선택 */
        .top-nav { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .lang-select { background: #111; color: var(--hk-gold); border: 1px solid var(--hk-gold); padding: 6px 10px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; }

        .brand { font-size: 32px; font-weight: 900; color: var(--hk-gold); margin: 20px 0; letter-spacing: -1px; text-align: center; }

        /* 자산 카드 */
        .asset-card { background: linear-gradient(180deg, #1a1a1a, #000); border-radius: 25px; padding: 30px 15px; text-align: center; border: 1px solid #333; margin-bottom: 25px; }
        .asset-val { font-size: 40px; font-weight: 900; margin: 10px 0; }
        .gcv-badge { display: inline-block; padding: 8px 20px; border-radius: 50px; border: 1.5px solid var(--hk-green); color: var(--hk-green); font-size: 14px; font-weight: bold; }

        /* 메뉴 그리드 */
        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .grid-box { background: #111; padding: 20px 5px; border-radius: 15px; text-align: center; border: 1px solid #222; }
        .grid-box i { font-size: 24px; margin-bottom: 8px; display: block; }
        .grid-box span { font-size: 13px; font-weight: bold; }

        /* 3대 핵심 버튼 */
        .action-btns { display: flex; gap: 8px; margin-bottom: 15px; }
        .act-btn { flex: 1; padding: 15px 5px; border-radius: 10px; border: none; font-weight: 900; font-size: 14px; cursor: pointer; }
        .white { background: #fff; color: #000; }
        .gold { background: var(--hk-gold); color: #000; }
        .green { background: #00c853; color: #fff; }

        /* 고객지원센터 */
        .cs-wide { width: 100%; padding: 18px; background: #ff4444; color: #fff; border: none; border-radius: 12px; font-weight: 900; font-size: 16px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* SNS 버튼 가로 배치 (형님 사진 반영) */
        .sns-row { display: flex; gap: 10px; margin-bottom: 25px; }
        .sns-link { flex: 1; padding: 15px; border-radius: 10px; text-decoration: none; color: #fff; text-align: center; font-weight: 900; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* 퀀텀 쉴드 보안 섹션 (사진 속 디자인 완벽 재현) */
        .security-deep { background: rgba(0, 0, 0, 0.5); border: 1px solid #333; border-radius: 20px; padding: 20px; margin-bottom: 30px; text-align: left; }
        .sec-title { color: var(--hk-cyan); font-weight: 900; margin-bottom: 15px; font-size: 16px; letter-spacing: 1px; }
        .sec-list { list-style: none; }
        .sec-list li { font-size: 14px; color: #eee; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 10px; line-height: 1.4; }
        .sec-list li::before { content: '●'; color: #8a8a8a; font-size: 12px; margin-top: 2px; }

        footer { text-align: center; border-top: 1px solid #222; padding-top: 30px; }
        .apy-footer { color: var(--hk-gold); font-size: 32px; font-weight: 900; margin-bottom: 15px; }
        .policy-txt { color: #555; text-decoration: none; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-nav">
        <select class="lang-select" id="langSel" onchange="applyLang()">
            <option value="ko">한국어 🇰🇷</option><option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option><option value="ar">العربية 🇸🇦</option>
            <option value="hi">हिन्दी 🇮🇳</option><option value="es">Español 🇪🇸</option>
            <option value="pt">Português 🇧🇷</option><option value="uk">Українська 🇺🇦</option>
            <option value="ja">日本語 🇯🇵</option><option value="ru">Русский 🇷🇺</option>
            <option value="vi">Tiếng Việt 🇻🇳</option><option value="th">ไทย 🇹🇭</option>
            <option value="de">Deutsch 🇩🇪</option><option value="fr">Français 🇫🇷</option>
            <option value="it">Italiano 🇮🇹</option>
        </select>
    </div>

    <div class="brand">HK WORLD BANK</div>

    <div class="asset-card">
        <div id="t-ledger" style="color:var(--hk-gold); font-weight:bold; font-size:14px; margin-bottom:10px;">메인 자산 통합 원장</div>
        <div class="asset-val">400.0212 <span style="color:var(--hk-gold); font-size:0.5em;">Pi</span></div>
        <div class="gcv-badge" id="t-gcv">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="grid-6">
        <div class="grid-box"><i class="fas fa-paper-plane" style="color:var(--hk-blue)"></i><span data-k="send">송금</span></div>
        <div class="grid-box"><i class="fas fa-shopping-cart" style="color:#FF9500"></i><span data-k="pay">결제</span></div>
        <div class="grid-box"><i class="fas fa-piggy-bank" style="color:var(--hk-gold)"></i><span data-k="save">예치</span></div>
        <div class="grid-box"><i class="fas fa-gift" style="color:#FF3B30"></i><span data-k="reward">보상</span></div>
        <div class="grid-box"><i class="fas fa-balance-scale" style="color:#AF52DE"></i><span data-k="ubi">기본소득</span></div>
        <div class="grid-box"><i class="fas fa-rotate" style="color:var(--hk-cyan)"></i><span data-k="swap2">스왑</span></div>
    </div>

    <div class="action-btns">
        <button class="act-btn white" id="b-pi">PI 수량</button>
        <button class="act-btn gold" id="b-swap">SWAP</button>
        <button class="act-btn green" id="b-lp">LP 공급</button>
    </div>

    <button class="cs-wide" id="t-cs"><i class="fas fa-headset"></i> 글로벌 고객지원센터</button>

    <div class="sns-row">
        <a href="https://www.youtube.com/@Hyekong2025" class="sns-link" style="background:#f00;"><i class="fab fa-youtube"></i> YOUTUBE</a>
        <a href="https://www.tiktok.com/@hyekong_hyungnim" class="sns-link" style="background:#333; border:1px solid #555;"><i class="fab fa-tiktok"></i> TIKTOK</a>
    </div>

    <div class="security-deep">
        <div class="sec-title">HK QUANTUM SHIELD ACTIVE</div>
        <ul class="sec-list">
            <li>개인정보보호법 준수: 양자 암호화 보안 적용</li>
            <li>Form of Private: 자산 보호 프로토콜 가동</li>
            <li>HK-ROBOT: AI 실시간 위협 탐지 중</li>
        </ul>
    </div>

    <footer>
        <div class="apy-footer" id="t-apy">예치 (APY 31.4%)</div>
        <a href="#" class="policy-txt" id="t-policy">개인정보처리방안</a>
        <p style="color:#333; font-size:10px; margin-top:20px;">Chairman Lee Jaewan (Hyekong) | HK Group &copy; 2026</p>
    </footer>
</div>

<script>
    const i18n = {
        ko: { ledger:"메인 자산 통합 원장", gcv:"가치 평가: $ 125,663,600 (GCV)", send:"송금", pay:"결제", save:"예치", reward:"보상", ubi:"기본소득", swap2:"스왑", pi:"PI 수량", swap:"SWAP", lp:"LP 공급", cs:"글로벌 고객지원센터", apy:"예치 (APY 31.4%)", policy:"개인정보처리방안" },
        en: { ledger:"Main Asset Ledger", gcv:"Value: $ 125,663,600 (GCV)", send:"Send", pay:"Payment", save:"Deposit", reward:"Reward", ubi:"UBI", swap2:"Swap", pi:"PI Balance", swap:"SWAP", lp:"LP Supply", cs:"Global CS Center", apy:"Deposit (APY 31.4%)", policy:"Privacy Policy" },
        // ... (기존 15개국 데이터 유지)
    };

    function applyLang() {
        const lang = document.getElementById('langSel').value;
        const d = i18n[lang] || i18n['en'];
        document.getElementById('t-ledger').innerText = d.ledger;
        document.getElementById('t-gcv').innerText = d.gcv;
        document.getElementById('b-pi').innerText = d.pi;
        document.getElementById('b-swap').innerText = d.swap;
        document.getElementById('b-lp').innerText = d.lp;
        document.getElementById('t-cs').innerText = d.cs;
        document.getElementById('t-apy').innerText = d.apy;
        document.getElementById('t-policy').innerText = d.policy;
        document.querySelectorAll('[data-k]').forEach(el => el.innerText = d[el.getAttribute('data-k')]);
    }
</script>
</body>
</html>
