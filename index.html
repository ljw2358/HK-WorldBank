<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Oswald:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #000000;
            --main-gold: #FFD700;
            --neon-green: #39FF14;
            --sub-orange: #FF8C00;
            --text-white: #FFFFFF;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; overflow-x: hidden;
        }

        .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }

        /* ✅ 언어 선택: 우측 상단 귀퉁이에 아주 작게 배치 ✅ */
        .header-top { 
            width: 100%; 
            padding: 10px 15px 0 0; /* 우측 상단 바짝 붙임 */
            display: flex; 
            justify-content: flex-end; 
            box-sizing: border-box; 
        }
        
        .lang-select {
            background: transparent; /* 배경 투명하게 */
            color: var(--main-gold);
            border: none; /* 테두리 제거 */
            font-size: 11px; /* 아주 작게 */
            font-weight: bold;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            text-decoration: underline; /* 링크 느낌 */
        }

        .brand-title { font-family: 'Oswald', sans-serif; font-size: 38px; color: var(--main-gold); text-align: center; margin: 5px 0 5px; line-height: 1.1; }
        .secure-node { color: var(--neon-green); font-size: 11px; text-align: center; margin-bottom: 15px; font-weight: bold; letter-spacing: 1px; }

        /* 자산 카드 */
        .asset-box { width: 90%; background: #111; border-radius: 25px; padding: 25px 15px; text-align: center; position: relative; border: 1px solid #222; }
        .apr-tag { position: absolute; right: 20px; top: 12px; color: var(--neon-green); font-weight: bold; font-size: 12px; }
        .ledger-label { color: var(--main-gold); font-size: 16px; margin-bottom: 15px; }
        .balance-main { font-size: 45px; font-weight: 800; margin-bottom: 20px; }
        .balance-main span { color: var(--sub-orange); font-size: 22px; }
        .gcv-value { border: 2px solid var(--neon-green); border-radius: 50px; padding: 12px; color: var(--neon-green); font-weight: bold; font-size: 15px; display: block; }

        /* 메뉴 그리드 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 90%; margin-top: 25px; }
        .menu-item { text-align: center; }
        .menu-item .icon-box { background: #1a1a1a; width: 55px; height: 55px; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; border: 1px solid #333; }
        .menu-item i { font-size: 24px; color: var(--main-gold); }
        .menu-item span { font-size: 12px; color: #ccc; }

        /* 유동성 정보 */
        .staking-info { width: 85%; margin-top: 30px; padding-left: 12px; border-left: 4px solid var(--main-gold); align-self: flex-start; margin-left: 5%; }
        .staking-info .label { color: var(--sub-orange); font-size: 15px; margin-bottom: 3px; font-weight: bold; }
        .staking-info .amount { font-size: 26px; font-weight: bold; letter-spacing: 0.5px; }
        .staking-info .status { color: #00e5ff; font-size: 12px; font-weight: bold; }

        /* 하단 3색 액션 버튼 */
        .action-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 90%; margin-top: 25px; }
        .btn { padding: 12px 0; border-radius: 8px; font-weight: bold; font-size: 12px; border: none; color: white; cursor: pointer; }
        .btn-gray { background: #2a2a2a; border: 1.5px solid var(--main-gold); }
        .btn-orange { background: var(--sub-orange); }
        .btn-green { background: #22c55e; }

        /* 고객지원 */
        .cs-wide-btn { width: 90%; background: linear-gradient(to right, #ff8c00, #ff4500); color: white; padding: 15px; border-radius: 12px; margin-top: 20px; text-align: center; font-weight: bold; text-decoration: none; font-size: 15px; display: block; }

        /* SNS 섹션 */
        .sns-section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 90%; margin-top: 20px; }
        .sns-card { background: #111; border-radius: 15px; padding: 12px; text-align: center; border: 1px solid #222; text-decoration: none; color: white; }
        .sns-card i { font-size: 28px; margin-bottom: 5px; }
        .sns-card .yt { color: #ff0000; }
        .sns-card .tk { color: #ffffff; }
        .sns-card div { font-size: 12px; font-weight: bold; }

        footer { margin: 30px 0; text-align: center; font-size: 9px; color: #333; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <header class="header-top">
        <select class="lang-select">
            <option>Select Language</option>
            <option>한국어 (KR)</option>
            <option>English (US)</option>
            <option>العربية (Arabic)</option>
            <option>हिन्दी (Hindi)</option>
            <option>Bahasa Indonesia</option>
            <option>日本語 (JP)</option>
            <option>Español (ES)</option>
            <option>Português (PT)</option>
            <option>Українська (UA)</option>
            <option>Hausa (Nigeria)</option>
            <option>Русский (RU)</option>
            <option>Français (FR)</option>
            <option>Deutsch (DE)</option>
            <option>+ 50 More Languages</option>
        </select>
    </header>

    <h1 class="brand-title">HK WORLD<br>BANK</h1>

    <div class="asset-box">
        <div class="apr-tag">APR 31.4%</div>
        <div class="ledger-label">메인 자산 통합 원장</div>
        <div class="balance-main">400.0000 <span>Pi</span></div>

    </div>

    <div class="menu-grid">
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-paper-plane"></i></div><span>송금</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-cart-shopping"></i></div><span>결제</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-vault"></i></div><span>예치</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-gift"></i></div><span>보상</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-scale-balanced"></i></div><span>소득</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-rotate"></i></div><span>스왑</span></div>
    </div>

    <div class="staking-info">
        <div class="label" style="color: #ffaa00;">STAKING APR 31.4%</div>
        <div class="label">유동성 풀 $</div>
        <div class="amount">88,401,773,756</div>
        <div class="status">HK_퀀텀_쉴드_활성</div>
    </div>

    <div class="action-btns">
        <button class="btn btn-gray">Pi 수량</button>
        <button class="btn btn-orange">SWAP</button>
        <button class="btn btn-green">LP 공급</button>
    </div>

    <a href="#" class="cs-wide-btn"><i class="fa-solid fa-headset"></i> 24/7 글로벌 고객지원센터</a>

    <div class="sns-section">
        <a href="https://youtube.com/@hyekong2025" class="sns-card">
            <i class="fa-brands fa-youtube yt"></i>
            <div>YouTube</div>
        </a>
        <a href="https://tiktok.com/@hyekong2025" class="sns-card">
            <i class="fa-brands fa-tiktok tk"></i>
            <div>TikTok</div>
        </a>
    </div>

    <footer>
        © 2026 HK GROUP GLOBAL HEGEMONY.<br>
        CHAIRMAN LEE JAEWAN. ALL RIGHTS RESERVED.
    </footer>
</div>

</body>
</html>
