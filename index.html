<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Oswald:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #000000;
            --main-gold: #FFD700;
            --neon-green: #39FF14;
            --sub-orange: #FF8C00;
            --text-white: #FFFFFF;
            --icon-box-bg: rgba(42, 42, 42, 0.4); 
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        header { width: 100%; padding: 20px; display: flex; justify-content: flex-end; box-sizing: border-box; }
        .lang-select { background: rgba(255, 215, 0, 0.1); color: var(--main-gold); border: 1px solid var(--main-gold); padding: 8px 15px; border-radius: 8px; font-size: 14px; cursor: pointer; }

        .brand-section { text-align: center; margin-top: 10px; }
        .brand-title { font-family: 'Oswald', sans-serif; font-size: 45px; line-height: 1.0; color: var(--main-gold); text-transform: uppercase; margin-bottom: 12px; }

        .asset-card { width: 90%; max-width: 380px; background: linear-gradient(145deg, #1f1f1f, #0a0a0a); border-radius: 35px; padding: 35px 20px; margin-top: 30px; text-align: center; border: 1px solid #2a2a2a; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        .ledger-title { color: var(--main-gold); font-size: 19px; margin-bottom: 30px; }
        .pi-balance { font-size: 52px; font-weight: 800; margin-bottom: 30px; }
        .pi-balance span { color: var(--sub-orange); font-size: 26px; }
        .gcv-box { border: 2px solid var(--neon-green); border-radius: 50px; padding: 18px; color: var(--neon-green); font-weight: bold; font-size: 17px; }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; width: 90%; max-width: 380px; margin-top: 45px; }
        .menu-item { text-align: center; }
        .menu-item .icon-wrapper { background-color: var(--icon-box-bg); width: 65px; height: 65px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; border: 1px solid #333; }
        
        /* 📸 152번 줄 오타(350x)를 35px로 완벽 수정! 📸 */
        .menu-item img { width: 35px; height: 35px; object-fit: contain; }
        .menu-item span { font-size: 14px; font-weight: 500; color: #ddd; display: block; }

        .cs-btn { width: 90%; max-width: 380px; background: linear-gradient(to right, #ff8c00, #ff4500); color: white; padding: 18px; border-radius: 15px; margin-top: 35px; text-align: center; font-weight: bold; text-decoration: none; font-size: 17px; display: block; }

        footer { margin: 60px 0 40px; text-align: center; font-size: 11px; color: #444; line-height: 1.8; }
    </style>
</head>
<body>

    <header>
        <select class="lang-select" id="langSelector" onchange="changeLanguage()">
            <option value="ko">KR (한국어)</option>
            <option value="en">EN (English)</option>
            <option value="vi">VI (Tiếng Việt)</option>
            <option value="zh">ZH (中文)</option>
            <option value="ja">JA (日本語)</option>
        </select>
    </header>

    <div class="brand-section">
        <h1 class="brand-title">HK WORLD<br>BANK</h1>
    </div>

    <div class="asset-card">
        <div class="ledger-title" id="ledgerTitle">메인 자산 통합 원장</div>
        <div class="pi-balance">400.0000 <span>Pi</span></div>
        <div class="gcv-box" id="gcvBox">가치 평가: $ 125,663,600<br>(GCV)</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><div class="icon-wrapper"><img src="https://em-content.zobj.net/source/microsoft-teams/363/airplane_2708-fe0f.png"></div><span id="m1">송금</span></div>
        <div class="menu-item"><div class="icon-wrapper"><img src="https://em-content.zobj.net/source/microsoft-teams/363/shopping-bags_1f6cd-fe0f.png"></div><span id="m2">결제</span></div>
        <div class="menu-item"><div class="icon-wrapper"><img src="https://em-content.zobj.net/source/microsoft-teams/363/fork-and-knife_1f37d-fe0f.png"></div><span id="m3">예치</span></div>
        <div class="menu-item"><div class="icon-wrapper"><img src="https://em-content.zobj.net/source/microsoft-teams/363/wrapped-gift_1f381.png"></div><span id="m4">보상</span></div>
        <div class="menu-item"><div class="icon-wrapper"><img src="https://em-content.zobj.net/source/microsoft-teams/363/balance-scale_2696-fe0f.png"></div><span id="m5">소득</span></div>
        <div class="menu-item"><div class="icon-wrapper"><img src="https://em-content.zobj.net/source/microsoft-teams/363/counterclockwise-arrows-button_1f504.png"></div><span id="m6">스왑</span></div>
    </div>

    <a href="#" class="cs-btn" id="csBtn"><i class="fa-solid fa-headset"></i> 24/7 글로벌 고객지원센터</a>

    <footer>
        © 2026 HK GROUP GLOBAL HEGEMONY.<br>
        CHAIRMAN LEE JAEWAN. ALL RIGHTS RESERVED.
    </footer>

    <script>
        const i18n = {
            ko: { ledgerTitle: "메인 자산 통합 원장", gcv: "가치 평가: $ 125,663,600<br>(GCV)", m1: "송금", m2: "결제", m3: "예치", m4: "보상", m5: "소득", m6: "스왑", csBtn: "24/7 글로벌 고객지원센터" },
            en: { ledgerTitle: "Main Asset Integrated Ledger", gcv: "Valuation: $ 125,663,600<br>(GCV)", m1: "Transfer", m2: "Payment", m3: "Deposit", m4: "Reward", m5: "Income", m6: "Swap", csBtn: "24/7 Global Support Center" },
            vi: { ledgerTitle: "Sổ cái tích hợp tài sản chính", gcv: "Định giá: $ 125,663,600<br>(GCV)", m1: "Gửi tiền", m2: "Thanh toán", m3: "Gửi tiết kiệm", m4: "Thưởng", m5: "Thu nhập", m6: "Hoán đổi", csBtn: "24/7 Trung tâm hỗ trợ" },
            zh: { ledgerTitle: "主要资产综合账簿", gcv: "估值: $ 125,663,600<br>(GCV)", m1: "转账", m2: "支付", m3: "存款", m4: "奖励", m5: "收入", m6: "交换", csBtn: "24/7 全球支持中心" },
            ja: { ledgerTitle: "主要資産統合元帳", gcv: "評価額: $ 125,663,600<br>(GCV)", m1: "送金", m2: "決済", m3: "預金", m4: "報酬", m5: "所得", m6: "스왑", csBtn: "24/7 グローバルサポート" }
        };

        function changeLanguage() {
            const lang = document.getElementById('langSelector').value;
            const data = i18n[lang] || i18n['en'];
            document.getElementById('ledgerTitle').innerText = data.ledgerTitle;
            document.getElementById('gcvBox').innerHTML = data.gcv;
            document.getElementById('m1').innerText = data.m1;
            document.getElementById('m2').innerText = data.m2;
            document.getElementById('m3').innerText = data.m3;
            document.getElementById('m4').innerText = data.m4;
            document.getElementById('m5').innerText = data.m5;
            document.getElementById('m6').innerText = data.m6;
            document.getElementById('csBtn').innerHTML = `<i class="fa-solid fa-headset"></i> ` + data.csBtn;
        }
    </script>
</body>
</html>
