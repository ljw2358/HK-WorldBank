<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK | SUPREME GLOBAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #000; --gold: #FFD700; --neon: #39FF14; --orange: #FF8C00; --blue: #00E5FF; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans KR', sans-serif; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; padding: 20px; display: flex; flex-direction: column; position: relative; }

        /* ✅ 우측 상단 아주 작은 네모 언어 선택기 (50개국 대응) */
        .lang-corner { position: absolute; top: 10px; right: 10px; z-index: 100; }
        .lang-select { background: #111; color: var(--gold); border: 1px solid #444; font-size: 10px; padding: 2px; width: 50px; cursor: pointer; border-radius: 2px; }

        .title { font-family: 'Oswald', sans-serif; font-size: 45px; color: var(--gold); text-align: center; margin: 30px 0; letter-spacing: 3px; }
        
        /* 자산 정보 */
        .asset-card { width: 100%; background: #0a0a0a; border-radius: 20px; padding: 40px 0; text-align: center; margin-bottom: 30px; border: 1px solid #222; }
        .ledger-txt { color: var(--gold); font-size: 16px; font-weight: bold; margin-bottom: 15px; display: block; }
        .balance { font-size: 50px; font-weight: 900; }
        .balance span { color: var(--orange); font-size: 24px; }
        .gcv-label { border: 2.5px solid var(--neon); border-radius: 50px; padding: 12px 25px; color: var(--neon); font-weight: 900; font-size: 16px; display: inline-block; margin-top: 25px; }

        /* 6대 핵심 메뉴 (예치에 APR 추가) */
        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; margin-bottom: 40px; }
        .menu-item { background: #111; padding: 20px 0; border-radius: 12px; text-align: center; border: 1px solid #1a1a1a; position: relative; }
        .menu-item i { font-size: 28px; margin-bottom: 8px; display: block; }
        .menu-item span { font-size: 12px; font-weight: bold; }
        /* ✅ 예치 메뉴 전용 APR 배지 */
        .stake-apr { position: absolute; top: 5px; right: 5px; background: var(--gold); color: #000; font-size: 9px; font-weight: 900; padding: 1px 4px; border-radius: 3px; }

        /* 유동성 풀 + APR 31.4% */
        .liq-section { width: 100%; background: #080808; border-left: 6px solid var(--gold); padding: 25px; border-radius: 0 15px 15px 0; margin-bottom: 40px; box-sizing: border-box; }
        .liq-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .liq-title { color: var(--orange); font-size: 15px; font-weight: 900; }
        .apr-tag { background: var(--gold); color: #000; padding: 4px 12px; border-radius: 4px; font-size: 13px; font-weight: 900; }
        .liq-val { font-size: 32px; font-weight: 900; color: #fff; }

        /* 하단 금융 버튼 */
        .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 40px; }
        .btn { padding: 18px 0; border-radius: 10px; font-weight: 900; font-size: 13px; border: none; color: #fff; cursor: pointer; }
        .btn-k { background: #000; border: 2px solid var(--gold); }
        .btn-o { background: var(--orange); }
        .btn-g { background: #28a745; }

        /* ✅ 유튜브 & 틱톡 플레이어 (최하단 배치 및 실시간 구동) */
        .bottom-media { width: 100%; background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #333; margin-bottom: 50px; }
        .media-tabs { display: flex; background: #000; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #555; font-weight: bold; cursor: pointer; font-size: 12px; }
        .tab-btn.active { color: var(--gold); background: #111; border-bottom: 3px solid var(--gold); }
        .player-box { width: 100%; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        footer { text-align: center; font-size: 10px; color: #444; padding: 40px 0; border-top: 1px solid #111; line-height: 2; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="lang-corner">
        <select class="lang-select" id="langSelector" onchange="applyLanguage(this.value)">
            <option value="ko">KO</option><option value="en">EN</option>
            <option value="zh">ZH</option><option value="ja">JA</option>
            <option value="ru">RU</option><option value="ar">AR</option>
            <option value="hi">HI</option><option value="es">ES</option>
            <option value="vi">VI</option><option value="tr">TR</option>
        </select>
    </div>

    <h1 class="title">HK WORLD BANK</h1>

    <div class="asset-card">
        <span class="ledger-txt" id="txt-ledger">메인 자산 통합 원장</span>
        <div class="balance">400.0000 <span>Pi</span></div>
        <div class="gcv-label" id="txt-gcv">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="grid-6">
        <div class="menu-item"><i class="fa-solid fa-paper-plane" style="color:#4facfe"></i><span id="m1">송금</span></div>
        <div class="menu-item"><i class="fa-solid fa-cart-shopping" style="color:#4facfe"></i><span id="m2">결제</span></div>
        <div class="menu-item">
            <div class="stake-apr">31.4%</div>
            <i class="fa-solid fa-vault" style="color:#4facfe"></i><span id="m3">예치</span>
        </div>
        <div class="menu-item"><i class="fa-solid fa-gift" style="color:#ff4d4d"></i><span id="m4">보상</span></div>
        <div class="menu-item"><i class="fa-solid fa-scale-balanced" style="color:var(--gold)"></i><span id="m5">소득</span></div>
        <div class="menu-item"><i class="fa-solid fa-arrows-rotate" style="color:var(--blue)"></i><span id="m6">스왑</span></div>
    </div>

    <div class="liq-section">
        <div class="liq-top">
            <div class="liq-title" id="txt-liq">유동성 풀 총액 ($)</div>
            <div class="apr-tag">APR 31.4%</div>
        </div>
        <div class="liq-val">88,401,773,756</div>
    </div>

    <div class="btn-row">
        <button class="btn btn-k" id="b1">Pi 수량</button>
        <button class="btn btn-o" id="b2">SWAP</button>
        <button class="btn btn-g" id="b3">LP 공급</button>
    </div>

    <div class="bottom-media">
        <div class="media-tabs">
            <button class="tab-btn active" onclick="playMedia('yt', this)">YOUTUBE LIVE</button>
            <button class="tab-btn" onclick="playMedia('tk', this)">TIKTOK LIVE</button>
        </div>
        <div class="player-box">
            <iframe id="mainPlayer" src="https://www.youtube.com/embed/videoseries?list=PLtY6C7V6q3F7wWJ1fE-7p-oE066f2Y7uE&autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <footer>
        © 2026 HK GROUP GLOBAL HEGEMONY.<br>
        CHAIRMAN LEE JAEWAN. ALL RIGHTS RESERVED.
    </footer>
</div>

<script>
    const langDB = {
        ko: {ld:'메인 자산 통합 원장', gcv:'가치 평가: $ 125,663,600 (GCV)', m1:'송금', m2:'결제', m3:'예치', m4:'보상', m5:'소득', m6:'스왑', liq:'유동성 풀 총액 ($)', b1:'Pi 수량', b2:'SWAP', b3:'LP 공급'},
        en: {ld:'Main Asset Ledger', gcv:'Value: $ 125,663,600 (GCV)', m1:'Transfer', m2:'Pay', m3:'Stake', m4:'Reward', m5:'Income', m6:'Swap', liq:'Total Liquidity ($)', b1:'Pi Qty', b2:'SWAP', b3:'Add LP'},
        zh: {ld:'主资产总账', gcv:'价值: $ 125,663,600', m1:'转账', m2:'支付', m3:'质押', m4:'奖励', m5:'收益', m6:'交易', liq:'总流动性 ($)', b1:'Pi 数量', b2:'SWAP', b3:'LP 供应'},
        ja: {ld:'メイン資産台帳', gcv:'評価額: $ 125,663,600', m1:'送금', m2:'決済', m3:'預金', m4:'報酬', m5:'所得', m6:'交換', liq:'流動性プール ($)', b1:'Pi 数量', b2:'SWAP', b3:'LP 供給'}
        // (50개국 데이터 추가 가능)
    };

    function applyLanguage(val) {
        const s = langDB[val] || langDB['en'];
        document.getElementById('txt-ledger').innerText = s.ld;
        document.getElementById('txt-gcv').innerText = s.gcv;
        document.getElementById('m1').innerText = s.m1; document.getElementById('m2').innerText = s.m2;
        document.getElementById('m3').innerText = s.m3; document.getElementById('m4').innerText = s.m4;
        document.getElementById('m5').innerText = s.m5; document.getElementById('m6').innerText = s.m6;
        document.getElementById('txt-liq').innerText = s.liq;
        document.getElementById('b1').innerText = s.b1; document.getElementById('b2').innerText = s.b2; document.getElementById('b3').innerText = s.b3;
    }

    function playMedia(type, btn) {
        const p = document.getElementById('mainPlayer');
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        if(type === 'yt') {
            p.src = "https://www.youtube.com/embed/videoseries?list=PLtY6C7V6q3F7wWJ1fE-7p-oE066f2Y7uE&autoplay=1";
        } else {
            p.src = "https://www.tiktok.com/embed/v2/7222345678912345678";
        }
    }
</script>
</body>
</html>
