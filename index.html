<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK - FINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 10px; box-sizing: border-box; }
        
        /* 1 & 4. 언어 선택: 우측 상단 모퉁이 밀착, 아주 작게 */
        .header-top { display: flex; justify-content: flex-end; width: 100%; margin-bottom: 5px; }
        .lang-select { 
            background: #111; color: #FFB400; border: 1.2px solid #FFB400;
            padding: 2px 4px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; width: 55px;
            outline: none; cursor: pointer;
        }

        .brand h1 { color: #FFB400; font-size: 1.8rem; margin: 0; font-weight: 900; }
        .secure-status { color: #00E676; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; }

        /* 자산 대시보드 */
        .asset-box { background: #111; border-radius: 20px; padding: 20px 10px; text-align: center; border: 1px solid #333; margin-bottom: 15px; }
        .pi-main { font-size: 2.8rem; font-weight: 900; border-bottom: 3px solid #FFB400; display: inline-block; margin-bottom: 8px; }
        .gcv-badge { border: 2px solid #00E676; border-radius: 30px; padding: 5px 12px; color: #00E676; font-size: 0.9rem; font-weight: 900; display: inline-block; }

        /* 메뉴 그리드 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .menu-item { background: #151515; border-radius: 12px; padding: 15px 2px; text-align: center; border: 1px solid #222; }
        .m-icon { font-size: 1.6rem; display: block; margin-bottom: 4px; }
        .m-text { font-size: 0.85rem; font-weight: bold; }

        /* 5. 유튜브 & 틱톡 버튼 하단 배치 */
        .sns-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .sns-link { 
            background: #111; border: 1px solid #333; border-radius: 10px; padding: 12px;
            text-decoration: none; color: #fff; text-align: center; font-size: 0.75rem; font-weight: bold;
        }

        .footer { text-align: center; font-size: 0.7rem; color: #444; border-top: 1px solid #222; padding: 15px 0 30px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="header-top">
        <select class="lang-select" id="langBox" onchange="changeLang(this.value)">
            <option value="KR">KR</option>
            <option value="US">US</option>
            <option value="CN">CN</option>
            <option value="JP">JP</option>
            <option value="VN">VN</option>
        </select>
    </div>

    <div class="brand">
        <h1>HK WORLD BANK</h1>
        <div class="secure-status">🚀 SECURE NODES: ACTIVE</div>
    </div>

    <div class="asset-box">
        <div id="lb_ledger" style="color:#FFB400; font-size:0.95rem; margin-bottom:5px;">메인 자산 통합 원장</div>
        <div class="pi-main"><span id="pi_val">400.0211</span> <span style="font-size:1.2rem; color:#FFB400;">Pi</span></div><br>
        <div id="lb_eval" class="gcv-badge">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><span class="m-icon">🚀</span><span id="m1" class="m-text">송금</span></div>
        <div class="menu-item"><span class="m-icon">🛒</span><span id="m2" class="m-text">결제</span></div>
        <div class="menu-item"><span class="m-icon">📀</span><span id="m3" class="m-text">예치</span></div>
        <div class="menu-item"><span class="m-icon">🎁</span><span id="m4" class="m-text">리워드</span></div>
        <div class="menu-item"><span class="m-icon">⚖️</span><span id="m5" class="m-text">기본소득</span></div>
        <div class="menu-item"><span class="m-icon">🔄</span><span id="m6" class="m-text">스왑</span></div>
    </div>

    <div class="sns-container">
        <a href="https://www.youtube.com/@hyekong2025" target="_blank" class="sns-link">
            <span style="color:red; font-size:1.1rem;">▶</span> YOUTUBE
        </a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="sns-link">
            <span style="font-size:1.1rem;">♪</span> TIKTOK
        </a>
    </div>

    <div class="footer">
        © 2026 HK GROUP GLOBAL MANAGEMENT. GCV<br>
        <strong>CHAIRMAN LEE JAE-WAN</strong>. ALL RIGHTS RESERVED.
    </div>

<script>
    // 해결: 전체 텍스트 변환 로직 (일부만 변하던 버그 수정)
    const dict = {
        'KR': ['메인 자산 통합 원장', '가치 평가', '송금', '결제', '예치', '리워드', '기본소득', '스왑'],
        'US': ['Main Asset Ledger', 'Evaluation', 'Send', 'Pay', 'Deposit', 'Reward', 'UBI', 'Swap'],
        'CN': ['资产总账', '价值评估', '转账', '支付', '存款', '奖励', '基本收入', '互换'],
        'JP': ['資産台帳', '価値評価', '送金', '決済', '預金', '報酬', '所得', 'スワップ'],
        'VN': ['Sổ cái tài sản', 'Giá trị', 'Gửi tiền', 'Thanh toán', 'Gửi', 'Thưởng', 'Thu nhập', 'Hoán đổi']
    };

    function changeLang(lang) {
        const s = dict[lang] || dict['US'];
        document.getElementById('lb_ledger').innerText = s[0];
        document.getElementById('lb_eval').innerText = s[1] + ': $ 125,663,600 (GCV)';
        document.getElementById('m1').innerText = s[2];
        document.getElementById('m2').innerText = s[3];
        document.getElementById('m3').innerText = s[4];
        document.getElementById('m4').innerText = s[5];
        document.getElementById('m5').innerText = s[6];
        document.getElementById('m6').innerText = s[7];
    }

    // 숫자 애니메이션
    let p = 400.0211;
    setInterval(() => {
        p += 0.0001;
        document.getElementById('pi_val').innerText = p.toFixed(4);
    }, 2000);
</script>
</body>
</html>
