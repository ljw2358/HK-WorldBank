<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        .main-card { max-width: 430px; margin: 0 auto; background: #000; min-height: 100vh; overflow: hidden; }
        .asset-gradient {
            background: linear-gradient(to bottom, #FFFFFF 30%, #FFD700 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900;
        }
        .gcv-border { border: 2px solid #00FF00; border-radius: 50px; background: rgba(0, 255, 0, 0.05); }
        #lang-dropdown { display: none; position: absolute; right: 20px; top: 60px; background: #111; border: 1px solid #333; border-radius: 10px; z-index: 999; }
        .lang-opt { padding: 12px 20px; border-bottom: 1px solid #222; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="p-5 flex justify-between items-center">
        <h1 class="text-xl font-black text-yellow-500 italic">HK WORLD BANK</h1>
        <div class="relative">
            <button onclick="document.getElementById('lang-dropdown').style.display='block'" class="bg-zinc-900 border border-zinc-700 px-3 py-1 rounded-lg text-xs flex items-center gap-2">
                <img id="cur-flag" src="https://flagcdn.com/w20/kr.png" width="18"> <span id="cur-lang">KR</span>
            </button>
            <div id="lang-dropdown">
                <div class="lang-opt" onclick="setLanguage('KR')">한국어</div>
                <div class="lang-opt" onclick="setLanguage('US')">English</div>
                <div class="lang-opt" onclick="setLanguage('CN')">中文</div>
            </div>
        </div>
    </div>

    <div class="text-center mt-4 px-5">
        <p id="t-ledger" class="text-xs font-bold text-zinc-400 mb-2">메인 자산 통합 원장</p>
        <h2 class="text-[70px] asset-gradient leading-none italic">400.0212</h2>
        <p class="text-4xl font-black text-yellow-500 italic mt-1">Pi</p>
        <div class="mt-6 py-3 gcv-border">
            <span id="t-gcv" class="text-[#00FF00] font-bold text-lg italic">가치 평가: $ 125,663,600 (GCV)</span>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-3 px-5 mt-10 text-center">
        <div class="bg-zinc-900 p-5 rounded-2xl border border-zinc-800">
            <i class="fa-solid fa-paper-plane text-red-500 text-xl mb-2"></i>
            <p id="m1" class="text-[11px] font-bold">송금</p>
        </div>
        <div class="bg-zinc-900 p-5 rounded-2xl border border-zinc-800">
            <i class="fa-solid fa-cart-shopping text-zinc-500 text-xl mb-2"></i>
            <p id="m2" class="text-[11px] font-bold">결제</p>
        </div>
        <div class="bg-zinc-900 p-5 rounded-2xl border border-yellow-600 ring-1 ring-yellow-500/30">
            <i class="fa-solid fa-vault text-yellow-500 text-xl mb-2"></i>
            <p id="m3" class="text-[11px] font-bold text-yellow-500">예치(31.4%)</p>
        </div>
    </div>

    <div class="mt-10 px-8 border-l-4 border-yellow-500">
        <p id="t-stk" class="text-yellow-500 text-[10px] font-black uppercase">STAKING 31.4% | 유동성 풀 $</p>
        <h3 class="text-2xl font-black mt-1">88,401,819,601</h3>
    </div>

    <div class="px-5 mt-10 space-y-3">
        <button id="btn-cs" class="w-full bg-red-600 py-4 rounded-xl font-black text-lg">
            <i class="fa-solid fa-headset mr-2"></i> 고객센터
        </button>
        <div class="flex gap-3">
            <a href="https://www.youtube.com/@Hyekong2025" target="_blank" class="flex-1 bg-red-700 py-4 rounded-xl flex justify-center items-center gap-2 font-black text-sm">
                <i class="fa-brands fa-youtube text-xl"></i> YOUTUBE
            </a>
            <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="flex-1 bg-zinc-800 border border-zinc-600 py-4 rounded-xl flex justify-center items-center gap-2 font-black text-sm">
                <i class="fa-brands fa-tiktok text-xl"></i> TIKTOK
            </a>
        </div>
    </div>

    <div class="mt-12 px-5 pb-10">
        <div class="bg-zinc-950 p-5 rounded-2xl border border-zinc-900 text-[9px] text-zinc-500 space-y-1">
            <p class="text-cyan-500 font-bold mb-2 text-center">HK_QUANTUM_SHIELD_ACTIVE</p>
            <p id="s1">● 개인정보보호법 준수: 양자 암호화 보안</p>
            <p id="s2">● Form of Private: 탈중앙화 자산 보호</p>
            <p id="s3">● HK-ROBOT: AI 실시간 탐지 시스템</p>
        </div>
    </div>
</div>

<script>
    function setLanguage(lang) {
        document.getElementById('lang-dropdown').style.display='none';
        const flag = document.getElementById('cur-flag');
        const code = document.getElementById('cur-lang');
        
        const data = {
            'KR': { f:'kr', l:'메인 자산 통합 원장', g:'가치 평가: $ 125,663,600 (GCV)', m1:'송금', m2:'결제', m3:'예치(31.4%)', cs:'고객센터', stk:'STAKING 31.4% | 유동성 풀 $', s1:'● 개인정보보호법 준수: 양자 암호화 보안', s2:'● Form of Private: 탈중앙화 자산 보호', s3:'● HK-ROBOT: AI 실시간 탐지 시스템' },
            'US': { f:'us', l:'MAIN ASSET LEDGER', g:'VALUE: $ 125,663,600 (GCV)', m1:'SEND', m2:'PAY', m3:'STAKE(31.4%)', cs:'CUSTOMER CENTER', stk:'STAKING 31.4% | LIQUIDITY POOL $', s1:'● Privacy Act: Quantum Encryption', s2:'● Form of Private: Asset Protection', s3:'● HK-ROBOT: AI Detection System' },
            'CN': { f:'cn', l:'主资产综合账本', g:'估值: $ 125,663,600 (GCV)', m1:'转账', m2:'支付', m3:'质押(31.4%)', cs:'客服中心', stk:'质押 31.4% | 流动性池 $', s1:'● 隐私法：应用量子加密安全', s2:'● 隐私形式：去中心化资产保护', s3:'● HK-ROBOT：AI 实时威胁检测' }
        };

        const s = data[lang];
        flag.src = `https://flagcdn.com/w20/${s.f}.png`;
        code.innerText = lang;
        document.getElementById('t-ledger').innerText = s.l;
        document.getElementById('t-gcv').innerText = s.g;
        document.getElementById('m1').innerText = s.m1;
        document.getElementById('m2').innerText = s.m2;
        document.getElementById('m3').innerText = s.m3;
        document.getElementById('btn-cs').innerHTML = `<i class="fa-solid fa-headset mr-2"></i> ${s.cs}`;
        document.getElementById('t-stk').innerText = s.stk;
        document.getElementById('s1').innerText = s.s1;
        document.getElementById('s2').innerText = s.s2;
        document.getElementById('s3').innerText = s.s3;
    }

    // 드롭다운 외 클릭 시 닫기
    window.onclick = function(event) {
        if (!event.target.closest('.relative')) {
            document.getElementById('lang-dropdown').style.display = 'none';
        }
    }
</script>

</body>
</html>
