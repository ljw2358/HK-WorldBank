<!DOCTYPE html>
<html lang="ko">
<head>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
  Pi.init({ version: "1.5", sandbox: false }); // 파이 네트워크와 연결 시작!
</script>   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK GLOBAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFB400; --green: #00E676; --red: #FF5252; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; min-height: 100vh; padding: 15px; position: relative; }

        /* 상단 네비 및 15개국 선택 */
        .top-nav { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .brand h1 { color: var(--gold); font-size: 1.6rem; margin: 0; font-weight: 900; }
        #langSel { 
            background: #111; color: var(--gold); border: 1px solid var(--gold);
            padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold;
        }

        /* 자산 대시보드 - 글자크기 대폭 줄임 */
        .card { background: #0a0a0a; border-radius: 20px; padding: 20px 10px; text-align: center; border: 1px solid #222; margin-bottom: 15px; }
        #lb_main { color: var(--gold); font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; }
        .pi-num { font-size: 2.8rem; font-weight: 900; margin-bottom: 10px; color: #fff; }
        .gcv-badge { border: 1.5px solid var(--green); border-radius: 30px; padding: 5px 15px; color: var(--green); font-size: 0.85rem; font-weight: 900; display: inline-block; }

        /* 6개 메뉴 그리드 */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .item { background: #0c0c0c; border-radius: 12px; padding: 15px 5px; text-align: center; border: 1px solid #1a1a1a; }
        .icon { font-size: 1.3rem; display: block; margin-bottom: 5px; }
        .menu-txt { font-size: 0.8rem; font-weight: bold; }

        /* 스테이킹 정보 */
        .info-bar { border-left: 4px solid var(--gold); background: #0a0a0a; padding: 10px; margin-bottom: 15px; }
        #lb_pool { color: var(--gold); font-size: 0.75rem; font-weight: 900; margin-bottom: 3px; }
        .pool-v { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.5px; }

        /* 액션 버튼 */
        .btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn { border-radius: 8px; padding: 10px 2px; font-size: 0.8rem; font-weight: 900; border: none; }

        /* 고객지원 센터 */
        .cs-btn { background: var(--red); color: #fff; border-radius: 10px; padding: 15px; text-align: center; font-size: 1rem; font-weight: 900; border: none; width: 100%; margin-bottom: 20px; }

        /* ✨ 유튜브 & 틱톡 프리미엄 디자인 ✨ */
        .sns-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .sns-box { text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 12px; border-radius: 15px; color: #fff; font-weight: 900; font-size: 0.95rem; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .yt { background: #FF0000; }
        .tk { background: #000; border: 1px solid #fff; }
        .sns-box img { width: 20px; height: 20px; margin-right: 8px; }

        .footer { text-align: center; font-size: 0.7rem; color: #444; border-top: 1px solid #111; padding-top: 15px; padding-bottom: 40px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-nav">
        <div class="brand"><h1>HK WORLD BANK</h1></div>
        <select id="langSel" onchange="runLang(this.value)">
            <option value="KR">🇰🇷 KR</option><option value="US">🇺🇸 US</option><option value="CN">🇨🇳 CN</option>
            <option value="JP">🇯🇵 JP</option><option value="VN">🇻🇳 VN</option><option value="PH">🇵🇭 PH</option>
            <option value="ID">🇮🇩 ID</option><option value="TH">🇹🇭 TH</option><option value="IN">🇮🇳 IN</option>
            <option value="AR">🇸🇦 AR</option><option value="RU">🇷🇺 RU</option><option value="FR">🇫🇷 FR</option>
            <option value="DE">🇩🇪 DE</option><option value="BR">🇧🇷 BR</option><option value="TR">🇹🇷 TR</option>
        </select>
    </div>

    <div class="card">
        <div id="lb_main">메인 자산 통합 원장</div>
        <div class="pi-num"><span id="pi_live">400.0211</span> <span style="font-size:1rem; color:var(--gold);">Pi</span></div>
        <div id="lb_gcv" class="gcv-badge">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="grid">
        <div class="item">🚀<span id="m1" class="menu-txt">송금</span></div>
        <div class="item">🛒<span id="m2" class="menu-txt">결제</span></div>
        <div class="item">📀<span id="m3" class="menu-txt">예치</span></div>
        <div class="item">🎁<span id="m4" class="menu-txt">보상</span></div>
        <div class="item">⚖️<span id="m5" class="menu-txt">기본소득</span></div>
        <div class="item">🔄<span id="m6" class="menu-txt">스왑</span></div>
    </div>

    <div class="info-bar">
        <div id="lb_pool">STAKING 31.4% | 유동성 풀 $</div>
        <div id="pool_live" class="pool-v">88,401,818,262</div>
    </div>

    <div class="btns">
        <button id="b1" class="btn" style="background:#eee;">Pi 수량</button>
        <button id="b2" class="btn" style="background:var(--gold);">SWAP</button>
        <button id="b3" class="btn" style="background:var(--green);">LP 공급</button>
    </div>

    <button id="b_cs" class="cs-btn">🎧 글로벌 고객지원센터</button>

    <div class="sns-wrap">
        <a href="https://www.youtube.com/@hyekong2025" target="_blank" class="sns-box yt">▶ YOUTUBE</a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="sns-box tk">♪ TIKTOK</a>
    </div>

    <div class="footer">
        © 2026 HK GROUP GLOBAL MANAGEMENT. GCV<br>
        <strong>CHAIRMAN LEE JAE-WAN [HK-ROBOTICS]</strong><br>
        <span style="color:#00E6F6;">🛡️ HK_QUANTUM_SHIELD_ACTIVE</span>
    </div>
</div>

<script>
    const dictionary = {
        'KR': ['메인 자산 통합 원장', '가치 평가', '송금', '결제', '예치', '보상', '기본소득', '스왑', '유동성 풀', 'Pi 수량', 'LP 공급', '글로벌 고객지원센터'],
        'US': ['Main Asset Ledger', 'Evaluation', 'Send', 'Pay', 'Deposit', 'Reward', 'UBI', 'Swap', 'Liquidity Pool', 'Pi Qty', 'LP Supply', 'Global Support Center'],
        'CN': ['资产总账', '价值评估', '转账', '支付', '存款', '奖励', '基本收入', '互换', '流动性池', 'Pi 数量', 'LP 供应', '全球客服中心'],
        'JP': ['資産台帳', '価値評価', '送금', '決済', '預金', '報酬', '所得', 'スワップ', '流動性', 'Pi 数量', 'LP 供給', 'サポートセンター'],

        'PH': ['Ledger', 'Ebalwasyon', 'Ipadala', 'Bayad', 'Deposito', 'Gantimpala', 'UBI', 'Swap', 'Pool', 'Dami', 'LP', 'Support'],
        'ID': ['Buku Besar', 'Evaluasi', 'Kirim', 'Bayar', 'Setoran', 'Hadiah', 'UBI', 'Swap', 'Pool', 'Jumlah', 'LP', 'Layanan'],

        'FR': ['Grand Livre', 'Évaluation', 'Envoyer', 'Payer', 'Dépôt', 'Prime', 'UBI', 'Swap', 'Pool', 'Qté', 'Offre', 'Support'],
        'DE': ['Hauptbuch', 'Bewertung', 'Senden', 'Zahlen', 'Einlage', 'Bonus', 'UBI', 'Swap', 'Pool', 'Menge', 'LP', 'Support'],
        'BR': ['Livro', 'Avaliação', 'Enviar', 'Pagar', 'Depósito', 'Prêmio', 'Renda', 'Troca', 'Pool', 'Qtd', 'Suporte', 'Suporte'],
        'TR': ['Defter', 'Değerleme', 'Gönder', 'Öde', 'Mevduat', 'Ödül', 'UBI', 'Takas', 'Likit', 'Miktar', 'Arz', 'Destek']
    };

    function runLang(l) {
        const s = dictionary[l];
        document.getElementById('lb_main').innerText = s[0];
        document.getElementById('lb_gcv').innerText = s[1] + ': $ 125,663,600 (GCV)';
        document.getElementById('m1').innerText = s[2]; document.getElementById('m2').innerText = s[3];
        document.getElementById('m3').innerText = s[4]; document.getElementById('m4').innerText = s[5];
        document.getElementById('m5').innerText = s[6]; document.getElementById('m6').innerText = s[7];
        document.getElementById('lb_pool').innerText = 'STAKING 31.4% | ' + s[8] + ' $';
        document.getElementById('b1').innerText = s[9]; document.getElementById('b2').innerText = s[7];
        document.getElementById('b3').innerText = s[10]; document.getElementById('b_cs').innerText = '🎧 ' + s[11];
    }

    let p = 400.0211; let v = 88401818262;
    setInterval(() => {
        p += 0.0001; v += Math.floor(Math.random()*1500);
        document.getElementById('pi_live').innerText = p.toFixed(4);
        document.getElementById('pool_live').innerText = v.toLocaleString();
    }, 1800);
</script>

<script>
    window.onload = function() {
        const payBtn = document.querySelector('.grid .item:nth-child(2)');
        if(payBtn) {
            payBtn.onclick = startPayment;
            payBtn.style.cursor = 'pointer';
        }
    };

    async function startPayment() {
      try {
        const payment = await Pi.createPayment({
          amount: 0.1, 
          memo: "HK World Bank Test Payment",
          metadata: { orderId: "order-101" }
        }, {
          onReadyForServerApproval: (id) => { console.log(id); },
          onReadyForServerCompletion: (id, txid) => { alert("결제 완료!"); },
          onCancel: (id) => { console.log("취소됨"); },
          onError: (err) => { alert("에러: " + err.message); }
        });
      } catch (err) {
        //alert("Pi Browser 앱 주소창에 직접 입력하세요!");
      }
    }
</script>
</body>
</html>
