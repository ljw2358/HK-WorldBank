<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Oswald:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #000000;
            --main-gold: #FFD700;
            --neon-green: #39FF14;
            --sub-orange: #FF8C00;
            --text-white: #FFFFFF;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; overflow-x: hidden;
        }

        .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; padding-bottom: 30px; }

        /* ✅ 초소형 언어 선택 박스 (우측 상단) ✅ */
        .header-top { 
            width: 100%; 
            padding: 8px 12px 0 0; 
            display: flex; 
            justify-content: flex-end; 
            box-sizing: border-box; 
        }
        
        .lang-select {
            background: rgba(255, 215, 0, 0.1);
            color: var(--main-gold);
            border: 0.5px solid var(--main-gold);
            font-size: 9px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            border-radius: 4px;
            padding: 2px 4px;
        }

        .brand-title { font-family: 'Oswald', sans-serif; font-size: 34px; color: var(--main-gold); text-align: center; margin: 0 0 4px; line-height: 1.1; }
        .secure-node { color: var(--neon-green); font-size: 10.5px; text-align: center; margin-bottom: 10px; font-weight: bold; letter-spacing: 0.5px; }

        .asset-box { width: 92%; background: #111; border-radius: 18px; padding: 18px 15px; text-align: center; position: relative; border: 1px solid #222; }
        .apr-tag { position: absolute; right: 15px; top: 10px; color: var(--neon-green); font-weight: bold; font-size: 10px; }
        .ledger-label { color: var(--main-gold); font-size: 14px; margin-bottom: 12px; }
        .balance-main { font-size: 40px; font-weight: 800; margin-bottom: 12px; }
        .balance-main span { color: var(--sub-orange); font-size: 18px; }
        .gcv-value { border: 1.5px solid var(--neon-green); border-radius: 50px; padding: 8px; color: var(--neon-green); font-weight: bold; font-size: 13px; display: block; }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 92%; margin-top: 15px; }
        .menu-item { text-align: center; }
        .menu-item .icon-box { background: #1a1a1a; width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 5px; border: 1px solid #333; }
        .menu-item i { font-size: 20px; color: var(--main-gold); }
        .menu-item span { font-size: 11px; color: #ccc; }

        .staking-info { width: 88%; margin-top: 20px; padding-left: 10px; border-left: 3px solid var(--main-gold); align-self: flex-start; margin-left: 4%; }
        .staking-info .label { color: var(--sub-orange); font-size: 13px; margin-bottom: 2px; font-weight: bold; }
        .staking-info .amount { font-size: 22px; font-weight: bold; letter-spacing: 0.5px; }
        .staking-info .status { color: #00e5ff; font-size: 10px; font-weight: bold; }

        .action-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 92%; margin-top: 15px; }
        .btn { padding: 10px 0; border-radius: 6px; font-weight: bold; font-size: 11px; border: none; color: white; cursor: pointer; }
        .btn-gray { background: #2a2a2a; border: 1px solid var(--main-gold); }
        .btn-orange { background: var(--sub-orange); }
        .btn-green { background: #22c55e; }

        /* ✅ 고객지원 배너 크기 축소 ✅ */
        .cs-wide-btn { 
            width: 92%; 
            background: linear-gradient(to right, #ff8c00, #ff4500); 
            color: white; 
            padding: 10px; /* 높이 줄임 */
            border-radius: 8px; 
            margin-top: 15px; 
            text-align: center; 
            font-weight: bold; 
            text-decoration: none; 
            font-size: 13px; /* 폰트 살짝 축소 */
            display: block; 
        }

        .sns-section { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 92%; margin-top: 15px; }
        .sns-card { background: #111; border-radius: 10px; padding: 10px; text-align: center; border: 1px solid #222; text-decoration: none; color: white; }
        .sns-card i { font-size: 22px; margin-bottom: 4px; }
        .sns-card .yt { color: #ff0000; }
        .sns-card .tk { color: #ffffff; }
        .sns-card div { font-size: 10px; font-weight: bold; }

        footer { margin: 20px 0; text-align: center; font-size: 8px; color: #333; width: 100%; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <header class="header-top">
        <select class="lang-select" onchange="changeLang(this.value)">
            <option value="ko">KO</option>
            <option value="cn">中文 (CN)</option>
            <option value="en">EN (US)</option>
            <option value="ar">العربية</option>
            <option value="hi">हिन्दी</option>
            <option value="id">Bahasa</option>
            <option value="jp">日本語</option>
            <option value="es">Español</option>
            <option value="pt">Português</option>
            <option value="ua">Українська</option>
            <option value="ng">Hausa</option>
            <option value="ru">Русский</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="more">+ 50 More</option>
        </select>
    </header>

    <h1 class="brand-title">HK WORLD<br>BANK</h1>
    <div class="secure-node">🚀 SECURE NODE: HK-V190-SUPREME</div>

    <div class="asset-box">
        <div class="apr-tag">APR 31.4%</div>
        <div class="ledger-label">메인 자산 통합 원장</div>
        <div class="balance-main">400.0000 <span>Pi</span></div>
        <div class="gcv-value">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-paper-plane"></i></div><span>송금</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-cart-shopping"></i></div><span>결제</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-vault"></i></div><span>예치</span></div>
    </div>

    <div class="staking-info">
        <div class="label">유동성 풀 $</div>
        <div class="amount">88,401,773,756</div>
        <div class="status">HK_퀀텀_쉴드_활성</div>
    </div>

    <div class="action-btns">
        <button class="btn btn-gray">Pi 수량</button>
        <button class="btn btn-orange">SWAP</button>
        <button class="btn btn-green">LP 공급</button>
    </div>

    <a href="#" class="cs-wide-btn">24/7 글로벌 고객지원센터</a>

    <div class="sns-section">
        <a href="https://youtube.com/@hyekong2025" class="sns-card">
            <i class="fa-brands fa-youtube yt"></i>
            <div>YouTube</div>
        </a>
        <a href="https://tiktok.com/@hyekong2025" class="sns-card">
            <i class="fa-brands fa-tiktok tk"></i>
            <div>TikTok</div>
        </a>
    </div>

    <footer>
        © 2026 HK GROUP GLOBAL HEGEMONY.<br>
        CHAIRMAN LEE JAEWAN.
    </footer>
</div>

<script>
    // 언어 선택 시 작동하는 엔진
    function changeLang(val) {
        if(val === 'ko') return;
        alert("Preparing " + val.toUpperCase() + " service for HK World Bank Global Launch.");
    }
</script>

</body>
</html>
