<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WORLD BANK | SUPREME</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #000; --gold: #FFD700; --neon: #39FF14; --orange: #FF8C00; --blue: #00E5FF; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans KR', sans-serif; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* ✅ 글로벌 언어 선택바 (14개 언어) */
        .lang-header { width: 100%; display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .lang-box { border: 1.5px solid var(--gold); border-radius: 4px; background: #111; padding: 3px; }
        .lang-select { background: transparent; color: var(--gold); border: none; font-size: 11px; font-weight: bold; outline: none; cursor: pointer; }

        .title { font-family: 'Oswald', sans-serif; font-size: 38px; color: var(--gold); text-align: center; margin: 10px 0; }
        
        /* 자산 카드 */
        .asset-card { width: 100%; background: #0f0f0f; border-radius: 15px; padding: 25px 0; text-align: center; margin-bottom: 25px; border: 1px solid #222; }
        .ledger-txt { color: var(--gold); font-size: 14px; margin-bottom: 8px; display: block; }
        .balance { font-size: 45px; font-weight: 900; margin: 5px 0; }
        .balance span { color: var(--orange); font-size: 20px; }
        .gcv-label { border: 2px solid var(--neon); border-radius: 50px; padding: 8px 20px; color: var(--neon); font-weight: bold; font-size: 14px; display: inline-block; margin-top: 10px; }

        /* 6대 메뉴 */
        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; margin-bottom: 30px; }
        .menu-item { background: #080808; padding: 15px 0; border-radius: 10px; text-align: center; border: 1px solid #1a1a1a; }
        .menu-item i { font-size: 24px; margin-bottom: 8px; display: block; }
        .menu-item span { font-size: 11px; font-weight: bold; }

        /* ✅ 유동성 풀 + APR 통합 섹션 */
        .liq-card { width: 100%; background: #111; border-left: 4px solid var(--gold); padding: 15px; border-radius: 0 10px 10px 0; margin-bottom: 25px; box-sizing: border-box; }
        .liq-top { display: flex; justify-content: space-between; align-items: center; }
        .liq-title { color: var(--orange); font-size: 14px; font-weight: bold; }
        .apr-tag { background: var(--gold); color: #000; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 900; }
        .liq-val { font-size: 26px; font-weight: 900; margin-top: 5px; }
        .sh-status { color: var(--blue); font-size: 11px; font-weight: bold; margin-top: 5px; }

        /* 하단 버튼 */
        .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; margin-bottom: 20px; }
        .btn { padding: 13px 0; border-radius: 6px; font-weight: bold; font-size: 12px; border: none; color: #fff; cursor: pointer; }
        .btn-k { background: #000; border: 1.5px solid var(--gold); }
        .btn-o { background: var(--orange); }
        .btn-g { background: #28a745; }

        /* 고객센터 */
        .cs-banner { width: 100%; background: linear-gradient(90deg, #ff4e50, #f9d423); color: #fff; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; text-decoration: none; font-size: 14px; margin-bottom: 20px; }

        /* ✅ 유튜브 & 틱톡 복구 첨가! */
        .sns-row { display: flex; justify-content: center; gap: 40px; margin-bottom: 25px; width: 100%; }
        .sns-item { text-align: center; text-decoration: none; color: #fff; }
        .sns-item i { font-size: 32px; margin-bottom: 5px; display: block; }
        .sns-name { font-size: 10px; color: #666; font-weight: bold; }

        footer { text-align: center; font-size: 8px; color: #333; line-height: 1.6; border-top: 1px solid #111; padding-top: 15px; width: 100%; }
    </style>
</head>
<body>

<div class="app-container">

    <h1 class="title">HK WORLD BANK</h1>

        <div class="menu-item"><i class="fa-solid fa-arrows-rotate" style="color:var(--blue)"></i><span id="m6">스왑</span></div>
    </div>

    <div class="liq-card">
        <div class="liq-top">
            <div class="liq-title" id="txt-liq">유동성 풀 총액 ($)</div>
            <div class="apr-tag">APR 31.4%</div>

        <div class="liq-val">88,401,773,756</div>
        <div class="sh-status" id="txt-shield">HK_퀀텀_쉴드_시스템_작동중</div>
    </div>

    <div class="btn-row">
        <button class="btn btn-k" id="b1">Pi 수량</button>
        <button class="btn btn-o" id="b2">SWAP</button>
        <button class="btn btn-g" id="b3">LP 공급</button>
    </div>

    <a href="#" class="cs-banner" id="txt-cs">🎧 24/7 글로벌 고객지원센터</a>

    <div class="sns-row">
        <a href="#" class="sns-item"><i class="fa-brands fa-youtube" style="color:#ff0000;"></i><span class="sns-name">YOUTUBE</span></a>
        <a href="#" class="sns-item"><i class="fa-brands fa-tiktok"></i><span class="sns-name">TIKTOK</span></a>
    </div>

    <footer>
        © 2026 HK GROUP GLOBAL HEGEMONY.<br>
        CHAIRMAN LEE JAEWAN. ALL RIGHTS RESERVED.
    </footer>
</div>
