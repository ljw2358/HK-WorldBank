<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Oswald:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #000000;
            --main-gold: #FFD700;
            --neon-green: #39FF14;
            --sub-orange: #FF8C00;
            --text-white: #FFFFFF;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; overflow-x: hidden;
        }

        .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; padding-bottom: 25px; }

        /* ✅ 언어 선택: 우측 상단 아주 작은 네모 박스 ✅ */
        .header-top { 
            width: 100%; 
            padding: 10px 15px 0 0; 
            display: flex; 
            justify-content: flex-end; 
            box-sizing: border-box; 
        }
        
        .lang-box {
            border: 1px solid var(--main-gold); /* 네모 박스 강조 */
            padding: 1px 3px;
            border-radius: 2px;
            background: rgba(255, 215, 0, 0.05);
        }

        .lang-select {
            background: transparent;
            color: var(--main-gold);
            border: none;
            font-size: 9px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }

        .brand-title { font-family: 'Oswald', sans-serif; font-size: 34px; color: var(--main-gold); text-align: center; margin: 0 0 5px; line-height: 1.1; }
        .secure-node { color: var(--neon-green); font-size: 10px; text-align: center; margin-bottom: 12px; font-weight: bold; letter-spacing: 0.5px; }

        .asset-box { width: 92%; background: #111; border-radius: 18px; padding: 15px; text-align: center; border: 1px solid #222; }
        .balance-main { font-size: 38px; font-weight: 800; margin-bottom: 10px; }
        .balance-main span { color: var(--sub-orange); font-size: 18px; }
        .gcv-value { border: 1.5px solid var(--neon-green); border-radius: 50px; padding: 7px; color: var(--neon-green); font-weight: bold; font-size: 12.5px; display: block; }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 92%; margin-top: 15px; }
        .menu-item .icon-box { background: #1a1a1a; width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 0 auto 5px; border: 1px solid #333; }
        .menu-item i { font-size: 18px; color: var(--main-gold); }
        .menu-item span { font-size: 10.5px; color: #ccc; text-align: center; display: block;}

        /* 고객지원 배너 더욱 축소 */
        .cs-mini-btn { 
            width: 92%; 
            background: linear-gradient(to right, #e67e22, #d35400); 
            color: white; 
            padding: 8px; 
            border-radius: 6px; 
            margin-top: 15px; 
            text-align: center; 
            font-weight: bold; 
            text-decoration: none; 
            font-size: 12px; 
            display: block; 
        }

        .sns-section { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 92%; margin-top: 15px; }
        .sns-card { background: #111; border-radius: 10px; padding: 8px; text-align: center; border: 1px solid #222; text-decoration: none; color: white; }
        .sns-card i { font-size: 20px; margin-bottom: 3px; }
        
        footer { margin-top: 20px; text-align: center; font-size: 8px; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <header class="header-top">
        <div class="lang-box">
            <select class="lang-select" onchange="applyLang(this.value)">
                <option value="KO">KO</option>
                <option value="CN">中文</option>
                <option value="EN">EN</option>
                <option value="JP">JP</option>
                <option value="VN">VN</option>
            </select>
        </div>
    </header>

    <h1 class="brand-title">HK WORLD<br>BANK</h1>
    <div class="secure-node">🛡️ NODE: HK-V190-SUPREME</div>

    <div class="asset-box">
        <div class="balance-main" id="balanceText">400.0000 <span>Pi</span></div>
        <div class="gcv-value" id="gcvText">GCV: $ 125,663,600</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-paper-plane"></i></div><span class="m1">송금</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-cart-shopping"></i></div><span class="m2">결제</span></div>
        <div class="menu-item"><div class="icon-box"><i class="fa-solid fa-vault"></i></div><span class="m3">예치</span></div>
    </div>

    <a href="#" class="cs-mini-btn" id="csText">24/7 글로벌 고객지원센터</a>

    <div class="sns-section">
        <a href="https://youtube.com/@hyekong2025" class="sns-card">
            <i class="fa-brands fa-youtube" style="color:#ff0000;"></i>
            <div style="font-size:9px;">YouTube</div>
        </a>
        <a href="https://tiktok.com/@hyekong2025" class="sns-card">
            <i class="fa-brands fa-tiktok"></i>
            <div style="font-size:9px;">TikTok</div>
        </a>
    </div>

    <footer>© 2026 HK GROUP GLOBAL</footer>
</div>

<script>
    // ✅ 언어 변동 실제 작동 로직 ✅
    function applyLang(lang) {
        const data = {
            'KO': {m1:'송금', m2:'결제', m3:'예치', cs:'24/7 글로벌 고객지원센터'},
            'CN': {m1:'转账', m2:'支付', m3:'存款', cs:'24/7 全球客户 서비스'},
            'EN': {m1:'Send', m2:'Pay', m3:'Vault', cs:'24/7 Global CS Center'},
            'JP': {m1:'送金', m2:'決済', m3:'預金', cs:'24/7 グローバルサポート'}
        };
        
        if(data[lang]) {
            document.querySelector('.m1').innerText = data[lang].m1;
            document.querySelector('.m2').innerText = data[lang].m2;
            document.querySelector('.m3').innerText = data[lang].m3;
            document.getElementById('csText').innerText = data[lang].cs;
            console.log(lang + " 언어 적용 완료");
        }
    }
</script>

</body>
</html>
