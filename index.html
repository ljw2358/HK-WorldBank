<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; }
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon { display: none !important; }
        .goog-te-gadget-simple { background-color: #1a1a1a !important; border: 1px solid #ffc107 !important; padding: 8px 15px !important; border-radius: 20px !important; color: #fff !important; }
        .goog-te-gadget-simple span { color: #fff !important; }
        .goog-te-menu-value span:first-child::before { content: "Language"; font-size: 0.85rem; font-weight: bold; }
        .wrapper { width: 100%; max-width: 450px; min-height: 100vh; padding: 25px 20px; display: flex; flex-direction: column; align-items: center; }
        #google_translate_element { align-self: flex-end; margin-bottom: 20px; }
        .brand { width: 100%; color: #ffc107; font-size: 1.6rem; font-weight: 900; margin-bottom: 25px; text-align: left; }
        .card { width: 100%; background: linear-gradient(145deg, #1a1a1a, #000); border-radius: 20px; padding: 30px 20px; text-align: center; border: 1px solid #333; margin-bottom: 25px; }
        .main-ledger-label { color: #ffc107; font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; }
        .balance { font-size: 2.8rem; font-weight: 800; margin: 5px 0; letter-spacing: -1px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-bottom: 25px; }
        .btn { background: #222; padding: 20px 5px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 0.95rem; cursor: pointer; border: 1px solid #333; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .input-box { width: 100%; margin-bottom: 20px; }
        .num-field { width: 100%; padding: 18px; background: #111; border: 1px solid #444; border-radius: 15px; color: #fff; font-size: 1.4rem; text-align: center; outline: none; }
        .btn-yellow { background: #ffc107 !important; color: #000 !important; border: none; }
        .btn-green { background: #00e676 !important; color: #000 !important; border: none; }
        .btn-pink { background: #ff4081 !important; grid-column: span 2; margin-top: 5px; border: none; }
        .policy-box { background: #111; padding: 12px; border-radius: 10px; border: 1px solid #222; height: 100px; overflow-y: auto; font-size: 0.75rem; color: #888; text-align: left; width: 100%; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="google_translate_element"></div>
    <div class="brand">HK WORLD BANK</div>

    <div class="card">
        <div class="main-ledger-label">메인자산통합원장</div>
        <div class="balance">00.0247 <span style="font-size:1.3rem; color:#888;">Pi</span></div>
        <div style="color:#00e676; font-size:0.8rem; border:1px solid #00e676; border-radius:50px; padding:5px 10px; display:inline-block; margin-top:10px;">Value: $ 125,663,600 (GCV)</div>
    </div>

    <div class="grid">
        <div class="btn" onclick="payStep10()">🛒 결제 (TEST)</div>
        <div class="btn">💰 예치 (APY 31.4%)</div>
        <div class="btn">🌍 기본소득</div>
        <div class="btn">🔄 스왑</div>
    </div>

    <div class="input-box">
        <label style="color:#00e676; font-size:0.9rem; font-weight:bold; display:block; margin-bottom:10px;">유동성풀 (수량 입력)</label>
        <input type="number" id="lp_val" class="num-field" placeholder="0.00">
    </div>

    <div class="grid">
        <div class="btn btn-yellow">SWAP</div>
        <div class="btn btn-green" onclick="confirmLP()">유동성풀 공급</div>
        
        <a href="https://www.youtube.com/@HKWorldBank" target="_blank" class="btn" style="background:#cc0000 !important; color:#fff !important;">▶ YOUTUBE</a>
        <a href="https://www.tiktok.com/@hkworldbank" target="_blank" class="btn" style="background:#111 !important; color:#fff !important; border:1px solid #444;">♪ TIKTOK</a>
        
        <div class="btn btn-pink">🎧 Global Support Center</div>
    </div>

    <div class="policy-box">
        <strong>Terms & Privacy Policy</strong><br>
        모든 트랜잭션은 HK Quantum Shield로 보호됩니다. 자산 관리의 최종 책임은 사용자에게 있습니다.
    </div>
</div>

<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: false });

    async function payStep10() {
        try {
            await Pi.authenticate(['payments']);
            for(let i=1; i<=10; i++) {
                await Pi.createPayment({ amount: 0.0001, memo: "HKWB 결제 테스트 #"+i }, {
                    onReadyForServerApproval: (id) => {}, onReadyForServerCompletion: (id, tx) => {},
                    onCancel: () => {}, onError: () => {}
                });
                await new Promise(r => setTimeout(r, 1000));
            }
        } catch (e) { alert("인증 실패"); }
    }

    function confirmLP() {
        const amt = document.getElementById('lp_val').value;
        if(!amt) return alert("수량을 입력해주세요.");
        alert(amt + " Pi 공급 완료");
    }

    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'ko',
            includedLanguages: 'ko,en,ar,hi,es,pt,uk,ja,ru,vi,th,de,fr,it,tr,id,pl,nl,bn,zh-CN',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: true 
        }, 'google_translate_element');
    }
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
